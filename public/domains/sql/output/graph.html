<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:10px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;margin:0}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
.nb-btn{font-size:10px;padding:2px 7px;border-radius:3px;
  border:1px solid #ddd;background:#f0f0ea;cursor:pointer;color:#777;
  font-family:system-ui,sans-serif}
.nb-btn:hover{background:#e0e0d8;color:#444}
#notes-textarea{
  flex:0 0 auto;height:100px;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex:1;min-height:0;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555;display:flex;justify-content:space-between;align-items:center}
.note-entry .note-ts{font-weight:400;color:#bbb;font-size:10px}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
</style>
</head>
<body>
<div class="app">

<!-- LEFT: learning path sidebar -->
<aside id="path-sidebar">
  <div id="path-header">
    <h1>Learning Path</h1>
    <div class="domain-name">graph</div>
    <div id="path-count"></div>
  </div>
  <div id="path-steps">
    <div class="hint">Click any node in the graph<br>to see its learning path</div>
  </div>
</aside>

<!-- CENTRE TOP: concept graph -->
<div id="graph-panel">
  <div id="graph-container"></div>
</div>

<!-- CENTRE BOTTOM: explanation panel -->
<div id="explain-panel">
  <div class="empty">Select a node to see its definition, prerequisites, and learning context.</div>
</div>

<!-- RIGHT: notes sidebar -->
<aside id="notes-sidebar">
  <div id="notes-header">
    <div id="notes-header-top">
      <h2>Notes</h2>
      <div>
        <button class="nb-btn" id="nb-clear-btn" onclick="clearNote()">Clear</button>
        <button class="nb-btn" onclick="exportNotes()">Export</button>
      </div>
    </div>
    <div id="notes-node-label">no node selected</div>
  </div>
  <textarea id="notes-textarea" placeholder="Type notes here&#10;(auto-saved per node)"></textarea>
  <div id="notes-with-entries"></div>
</aside>

</div><!-- .app -->

const RAW = {"nodes": [{"id": "relation", "label": "relation", "kind": "primitive", "tier": 0, "defines": "first radical — a named, unordered set of tuples sharing the same schema; the fundamental data object in relational theory; reducibility stops here within SQL (set theory explains why a bag of tuples works, but that lives below the floor)", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "tuple", "label": "tuple", "kind": "primitive", "tier": 0, "defines": "first radical — a single, ordered list of attribute values conforming to the relation's schema; the atomic unit of stored data; a relation is a set of tuples", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "attribute", "label": "attribute", "kind": "primitive", "tier": 0, "defines": "second radical — a named, typed slot in a tuple; the part of the schema that gives each column its name and domain; joins and projections operate on attributes", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "domain", "label": "domain", "kind": "primitive", "tier": 0, "defines": "second radical — the set of permissible values for an attribute (INTEGER, TEXT, DATE, BOOLEAN, ...); enforces integrity at the cell level; not reducible to tuple or attribute concepts — it is the type system for relational data", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "schema", "label": "schema", "kind": "concept", "tier": 1, "defines": "the structural definition of a relation — the ordered list of (attribute, domain) pairs; the contract every stored tuple must satisfy; CREATE TABLE IS the schema in SQL", "prereqs": ["relation", "attribute", "domain"], "verifier": "python", "lab": "python (define a schema as a dict {col: type}; validate a tuple against it; verify type mismatches are caught)", "play": "define schema {\"name\": str, \"age\": int, \"email\": str}; try inserting (\"Alice\", \"thirty\", \"a@b.com\") and verify the type check fails", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "projection", "label": "projection", "kind": "concept", "tier": 1, "defines": "SELECT A₁, A₂, ... FROM R — extract a subset of columns from every tuple; reduces the width of the relation; the \"column filter\"; the most frequent clause in any SQL query", "prereqs": ["relation", "attribute"], "verifier": "python", "lab": "python (implement project(relation, cols); verify output has exactly the requested columns in order; check that duplicate tuples collapse when DISTINCT is applied)", "play": "project employees onto (name, salary); verify the result has 2 columns regardless of how many columns employees has; add DISTINCT and count how deduplication changes row count", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "selection", "label": "selection", "kind": "concept", "tier": 1, "defines": "SELECT * FROM R WHERE predicate — keep only tuples satisfying a predicate; the \"row filter\"; reduces the cardinality of the relation; the predicate can reference any attribute or literal", "prereqs": ["relation", "tuple"], "verifier": "python", "lab": "python (implement select(relation, predicate_fn); verify output is a subset of input tuples; test with =, <, >, LIKE-style matching)", "play": "select employees WHERE salary > 70000; count result rows; verify every returned tuple satisfies the predicate and no qualifying tuple is missing", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "rename", "label": "rename", "kind": "concept", "tier": 1, "defines": "AS alias — rename a relation or attribute in the query context; resolves ambiguity in self-joins and makes output schemas readable; no data is moved", "prereqs": ["relation", "attribute"], "verifier": "python", "lab": "python (implement rename(relation, new_name); verify schema reflects new attribute names)", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "cartesian_product", "label": "cartesian product", "kind": "concept", "tier": 2, "defines": "R × S — combine every tuple of R with every tuple of S; produces |R|×|S| tuples with |R.cols|+|S.cols| attributes; the brute-force combinator from which all joins derive; rarely useful alone but the semantic foundation of JOIN", "prereqs": ["relation", "tuple"], "verifier": "python", "lab": "python (implement cross_product(R, S); verify output cardinality = |R|*|S|; verify column count = |R.cols|+|S.cols|)", "play": "cross-product a 3-row and 4-row table; verify 12 rows in the result; count redundant combinations — that combinatorial explosion is WHY we add a WHERE predicate", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "join", "label": "join", "kind": "concept", "tier": 3, "defines": "combine tuples from two relations that satisfy a join condition — INNER JOIN is cartesian_product followed by selection on the join predicate; LEFT/RIGHT/FULL OUTER preserve non-matching rows; the most powerful and most expensive SQL operation", "prereqs": ["cartesian_product", "selection", "projection"], "verifier": "python", "lab": "python (implement nested-loop join; verify output matches cartesian_product followed by selection; compare with hash join performance on large tables)", "play": "join employees (id, name, dept_id) with departments (dept_id, dept_name) ON employees.dept_id = departments.dept_id; verify every result row has matching dept_id values; test that LEFT JOIN preserves employees with no department", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "aggregate", "label": "aggregate", "kind": "concept", "tier": 3, "defines": "GROUP BY + aggregate functions (COUNT, SUM, AVG, MIN, MAX) — partition tuples into groups by group-key values, then reduce each group to one output tuple; the mechanism for summary statistics; HAVING filters after aggregation (WHERE filters before)", "prereqs": ["relation", "tuple"], "verifier": "python", "lab": "python (implement group_by(relation, key_cols, agg_fns); verify output has one row per distinct key combination; test COUNT(*), SUM, AVG on a numeric column)", "play": "compute average salary by department; verify COUNT(*) per group sums to total rows; add HAVING AVG(salary) > 60000 and verify the filter applies to group-level values", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "subquery", "label": "subquery", "kind": "concept", "tier": 4, "defines": "a complete SELECT statement nested inside another query — in WHERE (correlated or uncorrelated), FROM (derived table), or SELECT (scalar subquery); composability is the hallmark of relational algebra made concrete", "prereqs": ["selection", "projection", "aggregate"], "verifier": "python", "lab": "python (implement a correlated subquery evaluator; verify it produces the same result as the equivalent join; compare performance — correlated subqueries re-execute once per outer row)", "play": "SELECT name FROM employees WHERE salary > (SELECT AVG(salary) FROM employees); implement as a Python subquery and as a join with the precomputed average; verify identical results", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "index", "label": "index", "kind": "concept", "tier": 3, "defines": "an auxiliary data structure (B-tree or hash) on one or more attributes that enables the query engine to skip a full table scan for selection and join predicates; CREATE INDEX trades write overhead and storage for O(log n) or O(1) lookup; the single biggest practical performance lever", "prereqs": ["relation", "attribute", "domain"], "verifier": "python", "lab": "python (implement a simple B-tree index on a list of (key, row_id) pairs; compare scan vs. index lookup time for n = 10⁴, 10⁵, 10⁶; plot log-linear vs. linear scaling)", "play": "create an index on employees.salary; time SELECT * WHERE salary = 75000 with and without the index on 10⁶ rows; measure the speedup factor", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "transaction", "label": "transaction", "kind": "concept", "tier": 4, "defines": "a sequence of SQL statements treated as a single atomic unit — either all commit (COMMIT) or all roll back (ROLLBACK); guaranteed to satisfy ACID (Atomicity, Consistency, Isolation, Durability); the mechanism that makes concurrent multi-statement updates safe", "prereqs": ["relation", "tuple"], "verifier": "python", "lab": "python (implement a simple two-phase commit simulation; inject a failure mid-transaction and verify rollback restores original state; verify isolation by interleaving two transactions)", "play": "transfer $100 from account A to account B — debit A, credit B; simulate a crash after the debit; verify rollback prevents A losing $100 with no corresponding credit to B", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "normalization", "label": "normalization", "kind": "concept", "tier": 4, "defines": "the decomposition of a relation into smaller relations to eliminate redundancy and update anomalies — 1NF (atomic values), 2NF (no partial dependencies), 3NF (no transitive dependencies), BCNF (every determinant is a key); the formal theory of \"what belongs in which table\"", "prereqs": ["relation", "attribute", "schema"], "verifier": "python", "lab": "python (given a relation and functional dependencies, compute closure of a key; identify 2NF/3NF violations; implement a BCNF decomposition algorithm and verify lossless join and dependency preservation)", "play": "normalize Orders(order_id, product_id, product_name, customer_id, customer_city); identify that product_name depends on product_id (not the full key) and customer_city depends on customer_id; decompose to 3NF and verify no redundancy remains", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "view", "label": "view", "kind": "concept", "tier": 4, "defines": "a named, stored SELECT query that appears to users as a relation — virtual table; provides abstraction (hide complex joins), access control (expose only needed columns), and logical independence (schema changes behind the view need not break applications)", "prereqs": ["projection", "selection", "join"], "verifier": "python", "lab": "python (implement a View class wrapping a query function; verify it re-executes on each access like a virtual table; test that filtering a view is equivalent to adding the filter to the underlying query)", "play": "create a view high_earners AS SELECT name, salary FROM employees WHERE salary > 80000; query it like a table; verify the underlying employees table is unchanged; count rows in the view vs. the full table", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "window_function", "label": "window function", "kind": "concept", "tier": 5, "defines": "compute an aggregate over a sliding \"window\" of related rows without collapsing them — PARTITION BY + ORDER BY + frame clause; enables running totals, rankings, moving averages; unlike GROUP BY, the individual tuple is preserved in the output", "prereqs": ["aggregate", "join"], "verifier": "python", "lab": "python (implement RANK() OVER (PARTITION BY dept ORDER BY salary DESC); verify rank values within each partition; compare with equivalent self-join / correlated subquery formulation)", "play": "compute each employee's salary rank within their department; verify the highest-paid in each department gets rank 1; test DENSE_RANK vs. RANK for tied salaries", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "query_plan", "label": "query plan", "kind": "concept", "tier": 5, "defines": "the sequence of relational operators the query optimizer chooses to execute a SQL statement — join order, index usage, sort vs. hash aggregation; EXPLAIN reveals it; the optimizer's job is to find the lowest-cost plan among the (n-1)! join orderings for n tables", "prereqs": ["join", "selection", "index"], "verifier": "python", "lab": "python (implement a cost-model estimator: estimate rows after selection using selectivity; estimate join cost as nested-loop vs. hash-join; choose the cheaper plan)", "play": "for a 3-table join, enumerate all 6 join orderings; assign random row counts and join selectivities; verify the cost model picks the ordering with the smallest intermediate result", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "analytics_dashboards", "label": "analytics dashboards", "kind": "application", "tier": 0, "defines": "summary metrics (revenue by quarter, user retention by cohort) are GROUP BY + aggregate queries; trends are window_function moving averages; dashboards query views that pre-join the star schema", "prereqs": ["aggregate", "window_function", "view"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "web_application_backend", "label": "web application backend", "kind": "application", "tier": 0, "defines": "every user profile page is a join (user + settings + preferences); every checkout is a transaction (debit inventory, create order, charge payment); every search is an indexed selection", "prereqs": ["join", "transaction", "index"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "data_warehouse", "label": "data warehouse", "kind": "application", "tier": 0, "defines": "normalized OLTP data is denormalized into star schemas for analytics; columnar storage and vectorized aggregate execution make GROUP BY on billions of rows feasible; the query planner chooses among parallel scan strategies", "prereqs": ["normalization", "aggregate", "query_plan"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "full_text_search", "label": "full text search", "kind": "application", "tier": 0, "defines": "an inverted index (token → list of row ids) is a specialized index that supports LIKE / text-match predicates in O(|results|) rather than O(n); the foundation of every search box backed by a database", "prereqs": ["index", "selection"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "event_sourcing", "label": "event sourcing", "kind": "application", "tier": 0, "defines": "every state change is appended as an immutable tuple (event log); current state is a subquery that aggregates the log; transactions guarantee no event is lost or duplicated; the pattern that makes undo/replay possible at the system level", "prereqs": ["transaction", "subquery"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}], "edges": [{"from": "relation", "to": "schema"}, {"from": "relation", "to": "projection"}, {"from": "relation", "to": "selection"}, {"from": "relation", "to": "rename"}, {"from": "relation", "to": "cartesian_product"}, {"from": "relation", "to": "aggregate"}, {"from": "relation", "to": "index"}, {"from": "relation", "to": "transaction"}, {"from": "relation", "to": "normalization"}, {"from": "tuple", "to": "selection"}, {"from": "tuple", "to": "cartesian_product"}, {"from": "tuple", "to": "aggregate"}, {"from": "tuple", "to": "transaction"}, {"from": "attribute", "to": "schema"}, {"from": "attribute", "to": "projection"}, {"from": "attribute", "to": "rename"}, {"from": "attribute", "to": "index"}, {"from": "attribute", "to": "normalization"}, {"from": "domain", "to": "schema"}, {"from": "domain", "to": "index"}, {"from": "schema", "to": "normalization"}, {"from": "projection", "to": "join"}, {"from": "projection", "to": "subquery"}, {"from": "projection", "to": "view"}, {"from": "selection", "to": "join"}, {"from": "selection", "to": "subquery"}, {"from": "selection", "to": "view"}, {"from": "selection", "to": "query_plan"}, {"from": "selection", "to": "full_text_search"}, {"from": "cartesian_product", "to": "join"}, {"from": "join", "to": "view"}, {"from": "join", "to": "window_function"}, {"from": "join", "to": "query_plan"}, {"from": "join", "to": "web_application_backend"}, {"from": "aggregate", "to": "subquery"}, {"from": "aggregate", "to": "window_function"}, {"from": "aggregate", "to": "analytics_dashboards"}, {"from": "aggregate", "to": "data_warehouse"}, {"from": "subquery", "to": "event_sourcing"}, {"from": "index", "to": "query_plan"}, {"from": "index", "to": "web_application_backend"}, {"from": "index", "to": "full_text_search"}, {"from": "transaction", "to": "web_application_backend"}, {"from": "transaction", "to": "event_sourcing"}, {"from": "normalization", "to": "data_warehouse"}, {"from": "view", "to": "analytics_dashboards"}, {"from": "window_function", "to": "analytics_dashboards"}, {"from": "query_plan", "to": "data_warehouse"}]};
const DOMAIN_KEY = "graph";

// ── index ──────────────────────────────────────────────────────────────────
const nodeIndex = {};
RAW.nodes.forEach(n => nodeIndex[n.id] = n);

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into
RAW.nodes.forEach(n => { prereqOf[n.id] = []; dependsOn[n.id] = []; });
RAW.edges.forEach(e => {
  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

// Compact layout: group by tier, sort alphabetically, left-align all nodes.
network.once('afterDrawing', function() {
  const pos = network.getPositions();
  const spacing = 140;

  // Group nodes by their BFS tier
  const byTier = {};
  RAW.nodes.forEach(n => {
    const tier = bfsLevels[n.id] ?? n.tier ?? 0;
    if (!byTier[tier]) byTier[tier] = [];
    byTier[tier].push(n.id);
  });

  // Sort each tier alphabetically, assign X starting from 0
  const tiers = Object.keys(byTier).map(Number).sort((a, b) => a - b);
  const tierSep = 85;
  tiers.forEach((tier, ti) => {
    const ids = byTier[tier].sort();
    const y = ti * tierSep;
    ids.forEach((id, i) => {
      network.moveNode(id, i * spacing, y);
    });
  });

  network.fit({ animation: false });
});

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  document.getElementById('explain-panel').innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  const parsed = _parseNote(localStorage.getItem(noteKey(nodeId)));
  return parsed ? parsed.text : '';
}

function saveNote(nodeId, text) {
  if (text.trim()) {
    const data = JSON.stringify({ text, ts: new Date().toISOString() });
    localStorage.setItem(noteKey(nodeId), data);
  } else {
    localStorage.removeItem(noteKey(nodeId));
  }
  renderNotesList();
}

function _parseNote(raw) {
  if (!raw) return null;
  try { const d = JSON.parse(raw); return { text: d.text || '', ts: d.ts || '' }; }
  catch (_) { return { text: raw, ts: '' }; }
}

function _fmtTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const yy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${yy}-${mm}-${dd} ${hh}:${mi}`;
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => {
      const parsed = _parseNote(localStorage.getItem(noteKey(n.id)));
      return {id: n.id, label: n.label, preview: (parsed?.text || '').slice(0, 60), ts: parsed?.ts || ''};
    });
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}<span class="note-ts">${_fmtTs(e.ts)}</span></div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  if (!currentNodeId) return;
  document.getElementById('notes-textarea').value = '';
  saveNote(currentNodeId, '');
  const btn = document.getElementById('nb-clear-btn');
  if (btn) { btn.textContent = 'Cleared!'; setTimeout(() => { btn.textContent = 'Clear'; }, 1000); }
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();

// When viewed directly (not in an iframe), inject a back link next to the
// "Learning Path" heading so it doesn't look like a title-bar element.
if (window.parent === window) {
  var h1 = document.querySelector('#path-header h1');
  if (h1) {
    var backLink = document.createElement('a');
    backLink.href = '../../';
    backLink.textContent = '← App';
    backLink.style.cssText = [
      'font-size:10px','color:#2563eb','font-family:system-ui,sans-serif',
      'text-decoration:none','font-weight:400','letter-spacing:normal',
      'text-transform:none','white-space:nowrap','flex-shrink:0'
    ].join(';');
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:baseline;gap:8px;';
    h1.parentNode.insertBefore(row, h1);
    row.appendChild(h1);
    row.appendChild(backLink);
  }
}
</script>
