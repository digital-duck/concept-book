<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — linalg_graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
#legend{
  position:absolute;top:10px;right:10px;
  background:rgba(255,255,255,.9);border:1px solid #ddd;
  border-radius:6px;padding:8px 10px;font-size:11px;
  display:flex;gap:10px;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:11px;height:11px;border-radius:2px;border:2px solid;flex-shrink:0}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:12px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
#notes-textarea{
  flex:1;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-actions{
  padding:8px 10px;border-top:1px solid #e8e8e0;flex-shrink:0;
  display:flex;gap:6px;align-items:center;
}
#notes-actions button{
  font-size:11px;padding:4px 10px;border-radius:4px;
  border:1px solid #ccc;background:#fff;cursor:pointer;color:#444;
}
#notes-actions button:hover{background:#f0f0e8}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex-shrink:0;
  max-height:35vh;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
</style>
</head>
<body>
<div class="app">

<!-- LEFT: learning path sidebar -->
<aside id="path-sidebar">
  <div id="path-header">
    <h1>Learning Path</h1>
    <div class="domain-name">linalg_graph</div>
    <div id="path-count"></div>
  </div>
  <div id="path-steps">
    <div class="hint">Click any node in the graph<br>to see its learning path</div>
  </div>
</aside>

<!-- CENTRE TOP: concept graph -->
<div id="graph-panel">
  <div id="graph-container"></div>
  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:#e8f5e9;border-color:#2e7d32"></div>primitive</div>
    <div class="leg"><div class="leg-dot" style="background:#e3f2fd;border-color:#1565c0"></div>concept</div>
    <div class="leg"><div class="leg-dot" style="background:#fff3e0;border-color:#ef6c00"></div>application</div>
  </div>
</div>

<!-- CENTRE BOTTOM: explanation panel -->
<div id="explain-panel">
  <div class="empty">Select a node to see its definition, prerequisites, and learning context.</div>
</div>

<!-- RIGHT: notes sidebar -->
<aside id="notes-sidebar">
  <div id="notes-header">
    <h2>Notes</h2>
    <div id="notes-node-label">no node selected</div>
  </div>
  <textarea id="notes-textarea" placeholder="Type notes here&#10;(auto-saved per node)"></textarea>
  <div id="notes-actions">
    <button onclick="exportNotes()">Export JSON</button>
    <button onclick="clearNote()">Clear</button>
  </div>
  <div id="notes-with-entries"></div>
</aside>

</div><!-- .app -->

<script>
const RAW = {"nodes": [{"id": "field_of_scalars", "label": "field of scalars", "kind": "primitive", "tier": 0, "defines": "the floor for scalars — we do not reduce the field", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "carrier_set", "label": "carrier set", "kind": "primitive", "tier": 0, "defines": "the floor for vectors — set theory is below the floor", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "vector_addition", "label": "vector addition", "kind": "primitive", "tier": 0, "defines": "first radical — closed binary operation on V", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "scalar_multiplication", "label": "scalar multiplication", "kind": "primitive", "tier": 0, "defines": "first radical — scalar scaling of a vector", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "inner_product", "label": "inner product", "kind": "primitive", "tier": 0, "defines": "second radical — geometry on V; not reducible to ⊕, ⊙", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "linear_combination", "label": "linear combination", "kind": "concept", "tier": 1, "defines": "Σ αᵢ ⊙ vᵢ — the atomic operation; almost all of linear algebra is a statement about this", "prereqs": ["vector_addition", "scalar_multiplication"], "verifier": "sympy", "lab": "sympy", "play": "pick vectors and scalars; check the result is still in V", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "subspace", "label": "subspace", "kind": "concept", "tier": 2, "defines": "subset of V closed under linear_combination", "prereqs": ["linear_combination"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "span", "label": "span", "kind": "concept", "tier": 2, "defines": "set of all linear combinations of a given set S — the smallest subspace containing S", "prereqs": ["linear_combination"], "verifier": "sympy", "lab": "sympy", "play": "build A; A.columnspace()", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "linear_independence", "label": "linear independence", "kind": "concept", "tier": 2, "defines": "no non-trivial linear combination is zero — uniqueness of the trivial combination", "prereqs": ["linear_combination"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "basis", "label": "basis", "kind": "concept", "tier": 3, "defines": "linearly independent spanning set — minimal generator or maximal independent set", "prereqs": ["linear_independence", "span"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "dimension", "label": "dimension", "kind": "concept", "tier": 4, "defines": "|basis| — well-defined by the exchange lemma (all bases have the same size)", "prereqs": ["basis"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "coordinates", "label": "coordinates", "kind": "concept", "tier": 4, "defines": "unique coefficients of a vector over a basis — isomorphism V ≅ Fⁿ", "prereqs": ["basis"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "linear_map", "label": "linear map", "kind": "concept", "tier": 2, "defines": "function f: V→W preserving linear_combination — f(αu+βv) = αf(u)+βf(v)", "prereqs": ["linear_combination"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "matrix", "label": "matrix", "kind": "concept", "tier": 5, "defines": "coordinate representation of a linear_map relative to chosen bases", "prereqs": ["linear_map", "coordinates"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "matrix_multiplication", "label": "matrix multiplication", "kind": "concept", "tier": 6, "defines": "coordinate form of map composition — definition is forced by (g∘f) → [g][f]", "prereqs": ["matrix", "linear_map"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "image", "label": "image", "kind": "concept", "tier": 3, "defines": "span of columns — {f(v) : v in domain}; the range of the map", "prereqs": ["span", "linear_map"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "kernel", "label": "kernel", "kind": "concept", "tier": 3, "defines": "{v : f(v) = 0} — the 'lost information' subspace", "prereqs": ["linear_map"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "rank", "label": "rank", "kind": "concept", "tier": 5, "defines": "dimension of the image — how much information is preserved", "prereqs": ["dimension", "image"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "nullity", "label": "nullity", "kind": "concept", "tier": 5, "defines": "dimension of the kernel — how much information is lost", "prereqs": ["dimension", "kernel"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "rank_nullity", "label": "rank nullity", "kind": "concept", "tier": 6, "defines": "rank + nullity = dim(domain) — information is neither created nor destroyed", "prereqs": ["rank", "nullity", "dimension"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "determinant", "label": "determinant", "kind": "concept", "tier": 3, "defines": "alternating multilinear form — signed volume scale factor of the map", "prereqs": ["linear_map"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "eigenpair", "label": "eigenpair", "kind": "concept", "tier": 3, "defines": "(λ, v≠0) with f(v) = λ ⊙ v — direction the map acts as pure ⊙", "prereqs": ["linear_map", "scalar_multiplication"], "verifier": "sympy", "lab": "sympy", "play": "build A; A.eigenvects(); perturb an entry; watch λ move", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "diagonalization", "label": "diagonalization", "kind": "concept", "tier": 4, "defines": "basis of eigenpairs — operator decouples into independent ⊙'s along eigenbasis", "prereqs": ["basis", "eigenpair"], "verifier": "sympy", "lab": "sympy", "play": "P, D = A.diagonalize(); verify A == P * D * P**(-1)", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "norm", "label": "norm", "kind": "concept", "tier": 1, "defines": "√⟨v,v⟩ — length induced by the inner product", "prereqs": ["inner_product"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "orthogonality", "label": "orthogonality", "kind": "concept", "tier": 1, "defines": "⟨u,v⟩ = 0 — generalised perpendicularity", "prereqs": ["inner_product"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "projection", "label": "projection", "kind": "concept", "tier": 3, "defines": "orthogonal projection onto a subspace — nearest-point map", "prereqs": ["orthogonality", "span"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "orthonormal_basis", "label": "orthonormal basis", "kind": "concept", "tier": 4, "defines": "basis with ⟨bᵢ, bⱼ⟩ = δᵢⱼ — coordinate geometry at its simplest", "prereqs": ["basis", "orthogonality", "norm"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "gram_schmidt", "label": "gram schmidt", "kind": "concept", "tier": 5, "defines": "algorithm producing orthonormal basis from any independent set", "prereqs": ["projection", "orthonormal_basis"], "verifier": "sympy", "lab": "sympy", "play": "take a random basis; apply Gram-Schmidt; verify columns are orthonormal", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "adjoint", "label": "adjoint", "kind": "concept", "tier": 3, "defines": "f* such that ⟨f(v), w⟩ = ⟨v, f*(w)⟩ for all v, w", "prereqs": ["inner_product", "linear_map"], "verifier": "sympy", "lab": "sympy", "play": "", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "spectral_theorem", "label": "spectral theorem", "kind": "concept", "tier": 5, "defines": "self-adjoint operator has orthonormal eigenbasis — both radicals meet here", "prereqs": ["adjoint", "eigenpair", "orthonormal_basis"], "verifier": "sympy", "lab": "sympy", "play": "build Hermitian A; verify A.diagonalize() columns are orthonormal", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "normal_modes", "label": "normal modes", "kind": "application", "tier": 0, "defines": "coupled oscillators → independent normal modes via eigenpairs", "prereqs": ["eigenpair"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "stability_analysis", "label": "stability analysis", "kind": "application", "tier": 0, "defines": "sign of eigenvalue determines stability of a fixed point", "prereqs": ["eigenpair"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "markov_stationary", "label": "markov stationary", "kind": "application", "tier": 0, "defines": "stationary distribution = eigenvector with eigenvalue 1", "prereqs": ["eigenpair"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "pagerank", "label": "pagerank", "kind": "application", "tier": 0, "defines": "dominant eigenvector of the (damped) link matrix", "prereqs": ["eigenpair"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "pca", "label": "pca", "kind": "application", "tier": 0, "defines": "principal components = eigenvectors of the covariance matrix", "prereqs": ["eigenpair", "inner_product"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "quantum_observable", "label": "quantum observable", "kind": "application", "tier": 0, "defines": "observables are self-adjoint; spectral theorem guarantees real eigenvalues", "prereqs": ["spectral_theorem"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "fourier_modes", "label": "fourier modes", "kind": "application", "tier": 0, "defines": "Fourier basis = orthonormal eigenbasis of the derivative operator", "prereqs": ["spectral_theorem"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}], "edges": [{"from": "vector_addition", "to": "linear_combination"}, {"from": "scalar_multiplication", "to": "linear_combination"}, {"from": "scalar_multiplication", "to": "eigenpair"}, {"from": "inner_product", "to": "norm"}, {"from": "inner_product", "to": "orthogonality"}, {"from": "inner_product", "to": "adjoint"}, {"from": "inner_product", "to": "pca"}, {"from": "linear_combination", "to": "subspace"}, {"from": "linear_combination", "to": "span"}, {"from": "linear_combination", "to": "linear_independence"}, {"from": "linear_combination", "to": "linear_map"}, {"from": "span", "to": "basis"}, {"from": "span", "to": "image"}, {"from": "span", "to": "projection"}, {"from": "linear_independence", "to": "basis"}, {"from": "basis", "to": "dimension"}, {"from": "basis", "to": "coordinates"}, {"from": "basis", "to": "diagonalization"}, {"from": "basis", "to": "orthonormal_basis"}, {"from": "dimension", "to": "rank"}, {"from": "dimension", "to": "nullity"}, {"from": "dimension", "to": "rank_nullity"}, {"from": "coordinates", "to": "matrix"}, {"from": "linear_map", "to": "matrix"}, {"from": "linear_map", "to": "matrix_multiplication"}, {"from": "linear_map", "to": "image"}, {"from": "linear_map", "to": "kernel"}, {"from": "linear_map", "to": "determinant"}, {"from": "linear_map", "to": "eigenpair"}, {"from": "linear_map", "to": "adjoint"}, {"from": "matrix", "to": "matrix_multiplication"}, {"from": "image", "to": "rank"}, {"from": "kernel", "to": "nullity"}, {"from": "rank", "to": "rank_nullity"}, {"from": "nullity", "to": "rank_nullity"}, {"from": "eigenpair", "to": "diagonalization"}, {"from": "eigenpair", "to": "spectral_theorem"}, {"from": "eigenpair", "to": "normal_modes"}, {"from": "eigenpair", "to": "stability_analysis"}, {"from": "eigenpair", "to": "markov_stationary"}, {"from": "eigenpair", "to": "pagerank"}, {"from": "eigenpair", "to": "pca"}, {"from": "norm", "to": "orthonormal_basis"}, {"from": "orthogonality", "to": "projection"}, {"from": "orthogonality", "to": "orthonormal_basis"}, {"from": "projection", "to": "gram_schmidt"}, {"from": "orthonormal_basis", "to": "gram_schmidt"}, {"from": "orthonormal_basis", "to": "spectral_theorem"}, {"from": "adjoint", "to": "spectral_theorem"}, {"from": "spectral_theorem", "to": "quantum_observable"}, {"from": "spectral_theorem", "to": "fourier_modes"}]};
const DOMAIN_KEY = "linalg_graph";

// ── index ──────────────────────────────────────────────────────────────────
const nodeIndex = {};
RAW.nodes.forEach(n => nodeIndex[n.id] = n);

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into
RAW.nodes.forEach(n => { prereqOf[n.id] = []; dependsOn[n.id] = []; });
RAW.edges.forEach(e => {
  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  document.getElementById('explain-panel').innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  return localStorage.getItem(noteKey(nodeId)) || '';
}

function saveNote(nodeId, text) {
  if (text.trim()) localStorage.setItem(noteKey(nodeId), text);
  else localStorage.removeItem(noteKey(nodeId));
  renderNotesList();
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => ({id: n.id, label: n.label, preview: localStorage.getItem(noteKey(n.id)).slice(0, 60)}));
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}</div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  document.getElementById('notes-textarea').value = '';
  if (currentNodeId) saveNote(currentNodeId, '');
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();
</script>
</body>
