<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — sage_learning_graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
#legend{
  position:absolute;top:10px;right:10px;
  background:rgba(255,255,255,.9);border:1px solid #ddd;
  border-radius:6px;padding:8px 10px;font-size:11px;
  display:flex;gap:10px;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:11px;height:11px;border-radius:2px;border:2px solid;flex-shrink:0}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:12px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
#notes-textarea{
  flex:1;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-actions{
  padding:8px 10px;border-top:1px solid #e8e8e0;flex-shrink:0;
  display:flex;gap:6px;align-items:center;
}
#notes-actions button{
  font-size:11px;padding:4px 10px;border-radius:4px;
  border:1px solid #ccc;background:#fff;cursor:pointer;color:#444;
}
#notes-actions button:hover{background:#f0f0e8}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex-shrink:0;
  max-height:35vh;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
</style>
</head>

<div class="app">

<!-- LEFT: learning path sidebar -->
<aside id="path-sidebar">
  <div id="path-header">
    <h1>Learning Path</h1>
    <div class="domain-name">sage_learning_graph</div>
    <div id="path-count"></div>
  </div>

<!-- CENTRE TOP: concept graph -->
<div id="graph-panel">

<!-- RIGHT: notes sidebar -->
<aside id="notes-sidebar">

    <button onclick="exportNotes()">Export JSON</button>
    <button onclick="clearNote()">Clear</button>
  </div>
  <div id="notes-with-entries"></div>
</aside>

</div><!-- .app -->

<script>
const RAW = {"nodes": [{"id": "exact_integer", "label": "exact integer", "kind": "primitive", "tier": 0, "defines": "the floor of exactness — Sage Integers are arbitrary-precision and never overflow or round; 2^100 is one exact number, not a float", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "exact_rational", "label": "exact rational", "kind": "primitive", "tier": 0, "defines": "the floor of exact division — 1/3 is a Rational that stays 1/3 forever; decimals appear only when you ask for them", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "symbolic_variable", "label": "symbolic variable", "kind": "primitive", "tier": 0, "defines": "the floor of generality — var('x') creates a symbol that stands for every number at once; algebra before arithmetic", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "parent_structure", "label": "parent structure", "kind": "primitive", "tier": 0, "defines": "the floor of structure — every Sage object lives in a parent (ZZ, QQ, GF(7), SR); asking .parent() tells you which mathematics you are doing", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "preparser", "label": "preparser", "kind": "concept", "tier": 1, "defines": "Sage's input language — ^ means power (not XOR), integer literals become exact Integers, and 1/2 is a Rational; preparser(False) drops back to plain Python", "prereqs": ["exact_integer"], "verifier": "sage", "lab": "sage preparser", "play": "type 2^10, 2**10, and 1/3 + 1/3 + 1/3 in a Sage cell; then preparser(False) and watch the same inputs change meaning", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "exact_vs_float", "label": "exact vs float", "kind": "concept", "tier": 1, "defines": "the central habit — compute exactly, convert to decimal only at the end with n(); floats are a display format, not a number system", "prereqs": ["exact_rational"], "verifier": "sage|sympy", "lab": "sage n()", "play": "compare (1/10 + 2/10 == 3/10) in Sage with 0.1 + 0.2 == 0.3 in plain Python; explain the difference", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "symbolic_expression", "label": "symbolic expression", "kind": "concept", "tier": 1, "defines": "expressions in the Symbolic Ring SR — built from symbols, composed with functions, carried exactly until you decide otherwise", "prereqs": ["symbolic_variable", "parent_structure"], "verifier": "sage|sympy", "lab": "sage SR", "play": "build (x+1)^5, expand it, factor it back; nothing was ever approximated", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "substitution_evaluation", "label": "substitution evaluation", "kind": "concept", "tier": 2, "defines": "subs() and n() — the bridge from the general symbol to the particular number, kept separate on purpose", "prereqs": ["symbolic_expression"], "verifier": "sage|sympy", "lab": "sage subs", "play": "substitute x=1/2 into a polynomial and keep the exact rational answer; only then call n(digits=50)", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "simplification", "label": "simplification", "kind": "concept", "tier": 2, "defines": "simplify_full(), trig identities, and is_zero() — deciding whether two expressions are the SAME mathematics; note expr == 0 builds an equation object, is_zero() answers it", "prereqs": ["symbolic_expression"], "verifier": "sage|sympy", "lab": "sage simplify_full", "play": "show sin(x)^2 + cos(x)^2 - 1 simplifies to 0; try is_zero() on expressions you believe are identities", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "algebraic_numbers", "label": "algebraic numbers", "kind": "concept", "tier": 2, "defines": "QQbar and AA — sqrt(2) as an exact algebraic number whose square is exactly 2; exactness beyond the rationals", "prereqs": ["exact_rational", "parent_structure"], "verifier": "sage", "lab": "sage QQbar", "play": "verify AA(sqrt(2))^2 == 2 exactly; then try the same with floating point and count the error digits", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "solving_equations", "label": "solving equations", "kind": "concept", "tier": 3, "defines": "solve() over the symbolic ring — exact roots with multiplicity, not numeric approximations; assume() narrows the search", "prereqs": ["simplification", "substitution_evaluation"], "verifier": "sage|sympy", "lab": "sage solve", "play": "solve x^2 == 2 and get ±sqrt(2) exactly; substitute each root back and watch it verify", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "calculus_sage", "label": "calculus sage", "kind": "concept", "tier": 3, "defines": "diff, integrate, limit, series — calculus done symbolically; the fundamental theorem checked on every example by differentiating the antiderivative back", "prereqs": ["symbolic_expression", "simplification"], "verifier": "sage|sympy", "lab": "sage diff/integrate", "play": "integrate log(x), differentiate the result, simplify the difference to zero — generate-then-verify by hand", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "polynomial_rings", "label": "polynomial rings", "kind": "concept", "tier": 3, "defines": "PolynomialRing(QQ, 'x') — polynomials as first-class citizens of a declared ring; factor(), gcd(), roots() answer exactly because the ring is known", "prereqs": ["parent_structure", "exact_integer"], "verifier": "sage", "lab": "sage PolynomialRing", "play": "factor x^12 - 1 over QQ, then over GF(7), and explain why the answers differ", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "exact_linear_algebra", "label": "exact linear algebra", "kind": "concept", "tier": 3, "defines": "matrix(QQ, ...) — RREF, kernels, eigenvalues computed exactly over the rationals or algebraics; no condition-number anxiety", "prereqs": ["parent_structure", "exact_rational"], "verifier": "sage", "lab": "sage matrix(QQ)", "play": "take a 3x3 rational matrix, get exact eigenvalues from the characteristic polynomial, and verify A*v == lambda*v with zero error", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "plotting_visualization", "label": "plotting visualization", "kind": "concept", "tier": 3, "defines": "plot, plot3d, implicit_plot — pictures generated from the exact objects themselves; visualization as a check on symbolic work", "prereqs": ["substitution_evaluation"], "verifier": "sage", "lab": "sage plot", "play": "plot a function and its derivative on one canvas; read the maxima of one off the zeros of the other", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "number_theory_sage", "label": "number theory sage", "kind": "concept", "tier": 4, "defines": "factor(), is_prime(), euler_phi(), CRT — industrial-strength number theory (PARI under the hood) at interactive speed", "prereqs": ["exact_integer", "polynomial_rings"], "verifier": "sage", "lab": "sage factor/PARI", "play": "factor a 40-digit number; verify the factorization by multiplying back exactly", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "interactive_notebooks", "label": "interactive notebooks", "kind": "concept", "tier": 4, "defines": "the Jupyter workflow — the sagemath kernel, @interact sliders, and notebooks as reproducible lab reports", "prereqs": ["plotting_visualization", "preparser"], "verifier": "sage", "lab": "sagemath Jupyter kernel", "play": "wrap a parameterized plot in @interact and explore a family of curves with a slider", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "finite_fields", "label": "finite fields", "kind": "concept", "tier": 5, "defines": "GF(p) and GF(p^n) — arithmetic that wraps around; the parents where cryptography lives", "prereqs": ["polynomial_rings", "number_theory_sage"], "verifier": "sage", "lab": "sage GF", "play": "build GF(7), verify every nonzero element has an inverse, and watch Fermat's little theorem hold elementwise", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "group_theory_sage", "label": "group theory sage", "kind": "concept", "tier": 5, "defines": "permutation groups, matrix groups, and GAP — symmetry as a computable object; orders, centers, and subgroup lattices on demand", "prereqs": ["parent_structure", "number_theory_sage"], "verifier": "sage", "lab": "sage/GAP PermutationGroup", "play": "build the symmetries of a square as a permutation group; verify its order is 8 and find its center", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "manifolds_geometry", "label": "manifolds geometry", "kind": "concept", "tier": 5, "defines": "SageManifolds — charts, metrics, connections, curvature; differential geometry as executable mathematics", "prereqs": ["calculus_sage", "exact_linear_algebra"], "verifier": "sage", "lab": "classical_mechanics_seed.sphere_scalar_curvature (SageManifolds; see cookbook/74_concept_book/classical_mechanics_seed.py)", "play": "build the round 2-sphere and compute its Ricci scalar — exactly 2/r^2, symbolically", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "conjecture_loop", "label": "conjecture loop", "kind": "concept", "tier": 6, "defines": "the experimental method — generate many exact examples fast, look for the pattern, hunt the counterexample before believing the conjecture", "prereqs": ["solving_equations", "number_theory_sage", "plotting_visualization"], "verifier": "sage", "lab": "sage list comprehension + exact arithmetic", "play": "test 'n^2 + n + 41 is prime' for n = 0..100; find the first counterexample and explain it", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "experimental_mathematics", "label": "experimental mathematics", "kind": "concept", "tier": 7, "defines": "the payoff — mathematics practiced as an experimental science; conjecture, compute, falsify or believe, then go prove it (the hand-off to a proof assistant)", "prereqs": ["conjecture_loop", "manifolds_geometry", "group_theory_sage"], "verifier": "sage", "lab": "sage (whole stack)", "play": "pick any integer sequence you can generate; search OEIS for it; form a conjecture about its growth and test it to n = 10^4", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "cryptography", "label": "cryptography", "kind": "application", "tier": 0, "defines": "RSA keys, discrete logs, and elliptic-curve arithmetic are finite-field number theory you can experiment with interactively before trusting them", "prereqs": ["finite_fields", "number_theory_sage"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "general_relativity", "label": "general relativity", "kind": "application", "tier": 0, "defines": "SageManifolds computes Christoffel symbols, geodesics, and curvature tensors for real metrics — research-grade GR from a free tool", "prereqs": ["manifolds_geometry", "calculus_sage"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "math_research", "label": "math research", "kind": "application", "tier": 0, "defines": "conjecture-hunting at scale — exact computation generates the evidence; the experimental loop is how modern conjectures are born", "prereqs": ["experimental_mathematics"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "stem_classroom", "label": "stem classroom", "kind": "application", "tier": 0, "defines": "a complete CAS with no license fee — every student gets the same exact mathematics; @interact turns lessons into laboratories", "prereqs": ["exact_vs_float", "plotting_visualization", "interactive_notebooks"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "spl_verifier_ladder", "label": "spl verifier ladder", "kind": "application", "tier": 0, "defines": "Sage is an engine-of-record in SPL's verifier ladder — the same exact checks this textbook teaches are what stamp machine_verified on generated content", "prereqs": ["exact_linear_algebra", "simplification"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}], "edges": [{"from": "exact_integer", "to": "preparser"}, {"from": "exact_integer", "to": "polynomial_rings"}, {"from": "exact_integer", "to": "number_theory_sage"}, {"from": "exact_rational", "to": "exact_vs_float"}, {"from": "exact_rational", "to": "algebraic_numbers"}, {"from": "exact_rational", "to": "exact_linear_algebra"}, {"from": "symbolic_variable", "to": "symbolic_expression"}, {"from": "parent_structure", "to": "symbolic_expression"}, {"from": "parent_structure", "to": "algebraic_numbers"}, {"from": "parent_structure", "to": "polynomial_rings"}, {"from": "parent_structure", "to": "exact_linear_algebra"}, {"from": "parent_structure", "to": "group_theory_sage"}, {"from": "preparser", "to": "interactive_notebooks"}, {"from": "exact_vs_float", "to": "stem_classroom"}, {"from": "symbolic_expression", "to": "substitution_evaluation"}, {"from": "symbolic_expression", "to": "simplification"}, {"from": "symbolic_expression", "to": "calculus_sage"}, {"from": "substitution_evaluation", "to": "solving_equations"}, {"from": "substitution_evaluation", "to": "plotting_visualization"}, {"from": "simplification", "to": "solving_equations"}, {"from": "simplification", "to": "calculus_sage"}, {"from": "simplification", "to": "spl_verifier_ladder"}, {"from": "solving_equations", "to": "conjecture_loop"}, {"from": "calculus_sage", "to": "manifolds_geometry"}, {"from": "calculus_sage", "to": "general_relativity"}, {"from": "polynomial_rings", "to": "number_theory_sage"}, {"from": "polynomial_rings", "to": "finite_fields"}, {"from": "exact_linear_algebra", "to": "manifolds_geometry"}, {"from": "exact_linear_algebra", "to": "spl_verifier_ladder"}, {"from": "plotting_visualization", "to": "interactive_notebooks"}, {"from": "plotting_visualization", "to": "conjecture_loop"}, {"from": "plotting_visualization", "to": "stem_classroom"}, {"from": "number_theory_sage", "to": "finite_fields"}, {"from": "number_theory_sage", "to": "group_theory_sage"}, {"from": "number_theory_sage", "to": "conjecture_loop"}, {"from": "number_theory_sage", "to": "cryptography"}, {"from": "interactive_notebooks", "to": "stem_classroom"}, {"from": "finite_fields", "to": "cryptography"}, {"from": "group_theory_sage", "to": "experimental_mathematics"}, {"from": "manifolds_geometry", "to": "experimental_mathematics"}, {"from": "manifolds_geometry", "to": "general_relativity"}, {"from": "conjecture_loop", "to": "experimental_mathematics"}, {"from": "experimental_mathematics", "to": "math_research"}]};
const DOMAIN_KEY = "sage_learning_graph";

// ── index ──────────────────────────────────────────────────────────────────
const nodeIndex = {};
RAW.nodes.forEach(n => nodeIndex[n.id] = n);

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into
RAW.nodes.forEach(n => { prereqOf[n.id] = []; dependsOn[n.id] = []; });
RAW.edges.forEach(e => {
  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  document.getElementById('explain-panel').innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  return localStorage.getItem(noteKey(nodeId)) || '';
}

function saveNote(nodeId, text) {
  if (text.trim()) localStorage.setItem(noteKey(nodeId), text);
  else localStorage.removeItem(noteKey(nodeId));
  renderNotesList();
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => ({id: n.id, label: n.label, preview: localStorage.getItem(noteKey(n.id)).slice(0, 60)}));
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}</div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  document.getElementById('notes-textarea').value = '';
  if (currentNodeId) saveNote(currentNodeId, '');
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();
</script>
</body>
