domain: college_physics_2e_ch2
primitives:
  reference_frame:
    defines: A coordinate backdrop relative to which the position of an object is described, often taken
      as the Earth or a moving vehicle.
    tier: 0
  position:
    defines: The location of an object at a particular time, specified relative to a chosen reference
      frame.
    tier: 0
  time:
    defines: The interval over which change occurs, measured in seconds (SI) and calibrated against a
      standard.
    tier: 0
  vector:
    defines: A quantity that has both magnitude and direction, represented graphically by an arrow whose
      length is proportional to magnitude.
    tier: 0
  scalar:
    defines: A quantity that has magnitude only, with no associated direction.
    tier: 0
concepts:
  coordinate_system:
    defines: A one-dimensional number line embedded in a reference frame that assigns positive and negative
      signs to the two possible directions of motion.
    composed_of:
    - reference_frame
    - vector
    tier: 1
  displacement:
    defines: The change in position of an object, Δx = x_f − x_i, which is a vector quantity carrying
      both magnitude and direction.
    composed_of:
    - position
    - vector
    tier: 1
  elapsed_time:
    defines: The difference between the ending and beginning times of a motion, Δt = t_f − t_0, measured
      in seconds.
    composed_of:
    - time
    tier: 1
  distance:
    defines: The magnitude of the displacement between two positions; a scalar with no directional sign.
    composed_of:
    - displacement
    - scalar
    tier: 2
  distance_traveled:
    defines: The total length of the path taken between two positions, which can exceed the magnitude
      of displacement when the path is not straight.
    composed_of:
    - displacement
    - scalar
    tier: 2
  average_velocity:
    defines: Displacement divided by elapsed time, v̄ = Δx/Δt; a vector quantity whose SI unit is m/s.
    composed_of:
    - displacement
    - elapsed_time
    tier: 2
  instantaneous_velocity:
    defines: The velocity of an object at a specific instant in time, obtained as the limiting value of
      average velocity over an infinitesimally small time interval.
    composed_of:
    - average_velocity
    tier: 3
  average_speed:
    defines: The total distance traveled divided by elapsed time; a scalar that can exceed the magnitude
      of average velocity for non-straight paths.
    composed_of:
    - distance_traveled
    - elapsed_time
    tier: 3
  average_acceleration:
    defines: The rate of change of velocity, ā = Δv/Δt; a vector whose SI unit is m/s².
    composed_of:
    - average_velocity
    - elapsed_time
    tier: 3
  instantaneous_speed:
    defines: The magnitude of the instantaneous velocity at a given moment; a scalar quantity with no
      direction.
    composed_of:
    - instantaneous_velocity
    - scalar
    tier: 4
  instantaneous_acceleration:
    defines: The acceleration of an object at a specific instant in time, obtained as the limiting value
      of average acceleration over an infinitesimally small interval.
    composed_of:
    - average_acceleration
    tier: 4
  deceleration:
    defines: Acceleration whose direction is opposite to the direction of velocity, always resulting in
      a decrease in speed.
    composed_of:
    - average_acceleration
    - average_velocity
    tier: 4
  kinematic_equations_constant_acceleration:
    defines: The four algebraic equations (v = v₀ + at; x = x₀ + v̄t; x = x₀ + v₀t + ½at²; v² = v₀² +
      2aΔx) that relate displacement, velocity, acceleration, and time under the assumption that acceleration
      is constant.
    composed_of:
    - displacement
    - elapsed_time
    - average_velocity
    - average_acceleration
    tier: 4
  acceleration_due_to_gravity:
    defines: The constant downward acceleration experienced by freely falling objects near Earth's surface,
      g ≈ 9.80 m/s², independent of the object's mass when air resistance is negligible.
    composed_of:
    - average_acceleration
    tier: 4
  free_fall:
    defines: The idealized state of motion in which an object accelerates solely under gravity with no
      air resistance or friction, allowing kinematic equations to be applied with a = −g.
    composed_of:
    - kinematic_equations_constant_acceleration
    - acceleration_due_to_gravity
    tier: 5
applications:
  graphical_analysis_of_motion:
    defines: The technique of extracting velocity from the slope of a position–time graph and acceleration
      from the slope of a velocity–time graph to describe and predict one-dimensional motion.
    needs:
    - average_velocity
    - average_acceleration
    tier: 4
  problem_solving_kinematics:
    defines: A six-step systematic approach—identify principles, list knowns, identify unknowns, select
      equations, substitute with units, and verify reasonableness—applied to one-dimensional motion problems.
    needs:
    - kinematic_equations_constant_acceleration
    tier: 5
  falling_objects_calculation:
    defines: The application of constant-acceleration kinematic equations with a = ±g to compute position,
      velocity, and time for objects in free fall near Earth's surface.
    needs:
    - free_fall
    tier: 6
