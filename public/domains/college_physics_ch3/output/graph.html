<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:10px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;margin:0}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
.nb-btn{font-size:10px;padding:2px 7px;border-radius:3px;
  border:1px solid #ddd;background:#f0f0ea;cursor:pointer;color:#777;
  font-family:system-ui,sans-serif}
.nb-btn:hover{background:#e0e0d8;color:#444}
#notes-textarea{
  flex:0 0 auto;height:100px;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex:1;min-height:0;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555;display:flex;justify-content:space-between;align-items:center}
.note-entry .note-ts{font-weight:400;color:#bbb;font-size:10px}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
/* ── concept detail panel ── */
#concept-detail{margin-top:14px;border-top:1px solid #e8e8e0;padding-top:10px;}
#concept-iframe{width:100%;height:500px;border:1px solid #e0e0d8;border-radius:4px;margin-top:6px;display:block;}
.concept-not-found{color:#e57373;font-size:12px;padding:6px 0;font-style:italic;}
</style>
</head>

<script>
const RAW = {"nodes": [{"id": "scalar", "label": "scalar", "kind": "primitive", "tier": 0, "defines": "A quantity that has magnitude but no direction, such as distance or speed.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "vector", "label": "vector", "kind": "primitive", "tier": 0, "defines": "A quantity that has both magnitude and direction, represented by an arrow whose length is proportional to its magnitude.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "displacement", "label": "displacement", "kind": "primitive", "tier": 0, "defines": "A vector quantity representing the change in position from one point to another.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "velocity", "label": "velocity", "kind": "primitive", "tier": 0, "defines": "Speed in a given direction; a vector quantity with both magnitude and direction.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "acceleration", "label": "acceleration", "kind": "primitive", "tier": 0, "defines": "The rate of change of velocity; a vector quantity assumed known from prior one-dimensional study.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "acceleration_due_to_gravity", "label": "acceleration due to gravity", "kind": "primitive", "tier": 0, "defines": "The constant downward acceleration (approximately 9.8 m/s²) experienced by objects near Earth's surface, acting only in the vertical direction.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "pythagorean_theorem", "label": "pythagorean theorem", "kind": "primitive", "tier": 0, "defines": "The mathematical relationship c² = a² + b² relating the two legs and hypotenuse of a right triangle, used without derivation to find vector magnitudes.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "trigonometric_functions", "label": "trigonometric functions", "kind": "primitive", "tier": 0, "defines": "The sine, cosine, and tangent ratios that relate angles to side lengths in a right triangle, assumed known and applied to vectors.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "one_dimensional_kinematics", "label": "one dimensional kinematics", "kind": "primitive", "tier": 0, "defines": "Equations of motion for constant acceleration along a single axis, reviewed as prior knowledge and extended to each axis independently in 2D.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "reference_frame", "label": "reference frame", "kind": "primitive", "tier": 0, "defines": "A coordinate system relative to which the position and motion of objects are described.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "two_dimensional_kinematics", "label": "two dimensional kinematics", "kind": "concept", "tier": 1, "defines": "The study of motion in a plane by describing it with horizontal and vertical vector components that together give the straight-line path.", "prereqs": ["vector", "displacement"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "vector_components", "label": "vector components", "kind": "concept", "tier": 1, "defines": "The perpendicular (x and y) parts into which a two-dimensional vector is decomposed, each acting independently along its own axis.", "prereqs": ["vector"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "resultant_vector", "label": "resultant vector", "kind": "concept", "tier": 1, "defines": "The single vector that is the sum of two or more vectors, representing the net effect of all combined vectors.", "prereqs": ["vector"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "scalar_multiplication_of_vectors", "label": "scalar multiplication of vectors", "kind": "concept", "tier": 1, "defines": "Multiplying a vector by a scalar changes its magnitude by that factor; a negative scalar also reverses the vector's direction.", "prereqs": ["vector", "scalar"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "independence_of_perpendicular_motions", "label": "independence of perpendicular motions", "kind": "concept", "tier": 2, "defines": "The principle that horizontal and vertical components of two-dimensional motion do not affect each other; motion along one axis has no influence on motion along the perpendicular axis.", "prereqs": ["two_dimensional_kinematics", "vector_components"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "graphical_vector_addition", "label": "graphical vector addition", "kind": "concept", "tier": 2, "defines": "The head-to-tail method of adding vectors by drawing each to scale and direction, with the resultant drawn from the tail of the first to the head of the last.", "prereqs": ["vector", "resultant_vector"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "vector_subtraction", "label": "vector subtraction", "kind": "concept", "tier": 2, "defines": "The operation of subtracting a vector by adding its negative—a vector of equal magnitude pointing in the opposite direction.", "prereqs": ["vector", "scalar_multiplication_of_vectors"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "resolving_vectors_into_components", "label": "resolving vectors into components", "kind": "concept", "tier": 2, "defines": "Decomposing a vector of known magnitude and direction into its perpendicular x- and y-components using Ax = A cosθ and Ay = A sinθ.", "prereqs": ["vector_components", "trigonometric_functions"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "relative_velocity", "label": "relative velocity", "kind": "concept", "tier": 2, "defines": "The velocity of an object as observed from a particular reference frame, obtained by vector addition of the object's velocity relative to a medium and the medium's velocity relative to the observer.", "prereqs": ["velocity", "reference_frame", "resultant_vector"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "analytical_vector_addition", "label": "analytical vector addition", "kind": "concept", "tier": 3, "defines": "Adding vectors by summing their corresponding perpendicular components, then using the Pythagorean theorem and inverse tangent to find the resultant's magnitude and direction.", "prereqs": ["resolving_vectors_into_components", "resultant_vector"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "classical_relativity", "label": "classical relativity", "kind": "concept", "tier": 3, "defines": "The study of how different observers in relative motion measure the same phenomenon, valid for speeds much less than the speed of light (below ~3000 km/s).", "prereqs": ["relative_velocity", "reference_frame"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "projectile_motion", "label": "projectile motion", "kind": "concept", "tier": 3, "defines": "Two-dimensional motion of an object subject only to gravitational acceleration, analyzed as independent constant-velocity horizontal motion and free-fall vertical motion.", "prereqs": ["independence_of_perpendicular_motions", "one_dimensional_kinematics", "acceleration_due_to_gravity", "vector_components"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "velocity_addition", "label": "velocity addition", "kind": "concept", "tier": 4, "defines": "The process of combining velocities from different reference frames using vector addition of components to find the resultant velocity relative to a chosen observer.", "prereqs": ["relative_velocity", "analytical_vector_addition"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "trajectory", "label": "trajectory", "kind": "concept", "tier": 4, "defines": "The parabolic path a projectile follows through the air, formed by combining constant horizontal velocity with uniformly accelerated vertical motion.", "prereqs": ["projectile_motion"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "projectile_range", "label": "projectile range", "kind": "concept", "tier": 4, "defines": "The horizontal distance traveled by a projectile on level ground, given by R = v₀² sin(2θ₀) / g, maximized at a launch angle of 45°.", "prereqs": ["projectile_motion", "trigonometric_functions"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "projectile_maximum_height", "label": "projectile maximum height", "kind": "concept", "tier": 4, "defines": "The peak altitude reached by a projectile, determined solely by its initial vertical velocity component via H = v₀y² / (2g).", "prereqs": ["projectile_motion"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "river_crossing_relative_velocity", "label": "river crossing relative velocity", "kind": "application", "tier": 5, "defines": "A real-world scenario in which a boat or swimmer crossing a flowing river illustrates how the velocity relative to the ground equals the vector sum of the vessel's velocity relative to the water and the current's velocity relative to the ground.", "prereqs": ["relative_velocity", "velocity_addition"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "projectile_motion_applications", "label": "projectile motion applications", "kind": "application", "tier": 5, "defines": "Real-world scenarios—including fireworks shells, volcanic ejecta, and sports projectiles—in which the range, maximum height, and impact velocity are predicted by resolving launch velocity into independent horizontal and vertical components.", "prereqs": ["trajectory", "projectile_range", "projectile_maximum_height"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}], "edges": [{"from": "scalar", "to": "scalar_multiplication_of_vectors"}, {"from": "vector", "to": "two_dimensional_kinematics"}, {"from": "vector", "to": "vector_components"}, {"from": "vector", "to": "resultant_vector"}, {"from": "vector", "to": "scalar_multiplication_of_vectors"}, {"from": "vector", "to": "graphical_vector_addition"}, {"from": "vector", "to": "vector_subtraction"}, {"from": "displacement", "to": "two_dimensional_kinematics"}, {"from": "velocity", "to": "relative_velocity"}, {"from": "acceleration_due_to_gravity", "to": "projectile_motion"}, {"from": "trigonometric_functions", "to": "resolving_vectors_into_components"}, {"from": "trigonometric_functions", "to": "projectile_range"}, {"from": "one_dimensional_kinematics", "to": "projectile_motion"}, {"from": "reference_frame", "to": "relative_velocity"}, {"from": "reference_frame", "to": "classical_relativity"}, {"from": "two_dimensional_kinematics", "to": "independence_of_perpendicular_motions"}, {"from": "vector_components", "to": "independence_of_perpendicular_motions"}, {"from": "vector_components", "to": "resolving_vectors_into_components"}, {"from": "vector_components", "to": "projectile_motion"}, {"from": "resultant_vector", "to": "graphical_vector_addition"}, {"from": "resultant_vector", "to": "relative_velocity"}, {"from": "resultant_vector", "to": "analytical_vector_addition"}, {"from": "scalar_multiplication_of_vectors", "to": "vector_subtraction"}, {"from": "independence_of_perpendicular_motions", "to": "projectile_motion"}, {"from": "resolving_vectors_into_components", "to": "analytical_vector_addition"}, {"from": "relative_velocity", "to": "classical_relativity"}, {"from": "relative_velocity", "to": "velocity_addition"}, {"from": "relative_velocity", "to": "river_crossing_relative_velocity"}, {"from": "analytical_vector_addition", "to": "velocity_addition"}, {"from": "projectile_motion", "to": "trajectory"}, {"from": "projectile_motion", "to": "projectile_range"}, {"from": "projectile_motion", "to": "projectile_maximum_height"}, {"from": "velocity_addition", "to": "river_crossing_relative_velocity"}, {"from": "trajectory", "to": "projectile_motion_applications"}, {"from": "projectile_range", "to": "projectile_motion_applications"}, {"from": "projectile_maximum_height", "to": "projectile_motion_applications"}]};
const DOMAIN_KEY = "graph";

// ── index ──────────────────────────────────────────────────────────────────
const nodeIndex = {};
RAW.nodes.forEach(n => nodeIndex[n.id] = n);

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into
RAW.nodes.forEach(n => { prereqOf[n.id] = []; dependsOn[n.id] = []; });
RAW.edges.forEach(e => {
  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

// Compact layout: group by tier, sort alphabetically, left-align all nodes.
network.once('afterDrawing', function() {
  const pos = network.getPositions();
  const spacing = 140;

  // Group nodes by their BFS tier
  const byTier = {};
  RAW.nodes.forEach(n => {
    const tier = bfsLevels[n.id] ?? n.tier ?? 0;
    if (!byTier[tier]) byTier[tier] = [];
    byTier[tier].push(n.id);
  });

  // Sort each tier alphabetically, assign X starting from 0
  const tiers = Object.keys(byTier).map(Number).sort((a, b) => a - b);
  const tierSep = 85;
  tiers.forEach((tier, ti) => {
    const ids = byTier[tier].sort();
    const y = ti * tierSep;
    ids.forEach((id, i) => {
      network.moveNode(id, i * spacing, y);
    });
  });

  network.fit({ animation: false });
});

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  const panel = document.getElementById('explain-panel');
  panel.innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;

  // ── concept HTML detail ──
  const conceptsBase = window.__cb_CONCEPTS_BASE;
  const conceptUrls = window.__cb_CONCEPT_URLS || {};
  const mappedUrl = conceptUrls[node.id];
  if (mappedUrl || conceptsBase) {
    const conceptUrl = mappedUrl || (conceptsBase + 'concept_' + encodeURIComponent(node.id) + '.html');
    const detail = document.createElement('div');
    detail.id = 'concept-detail';
    detail.innerHTML = '<div class="section-label">Concept Detail</div><div class="concept-loading" style="color:#aaa;font-size:12px;padding:6px 0">Loading…</div>';
    panel.appendChild(detail);
    fetch(conceptUrl)
      .then(r => {
        if (!r.ok) throw new Error('not found');
        return r.text();
      })
      .then(html => {
        const slot = detail.querySelector('.concept-loading');
        if (!slot) return;
        // Vite dev server returns the SPA index.html (200) for missing static files.
        // Verify we got a real concept page by checking for a known marker.
        if (html.includes('spl-credit') || html.includes('Powered by')) {
          const iframe = document.createElement('iframe');
          iframe.id = 'concept-iframe';
          iframe.src = conceptUrl;
          slot.replaceWith(iframe);
        } else {
          slot.className = 'concept-not-found';
          slot.textContent = 'Content not found — generate it first.';
        }
      })
      .catch(() => {
        const slot = detail.querySelector('.concept-loading');
        if (slot) { slot.className = 'concept-not-found'; slot.textContent = 'Content not found — generate it first.'; }
      });
  }
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  const parsed = _parseNote(localStorage.getItem(noteKey(nodeId)));
  return parsed ? parsed.text : '';
}

function saveNote(nodeId, text) {
  if (text.trim()) {
    const data = JSON.stringify({ text, ts: new Date().toISOString() });
    localStorage.setItem(noteKey(nodeId), data);
  } else {
    localStorage.removeItem(noteKey(nodeId));
  }
  renderNotesList();
}

function _parseNote(raw) {
  if (!raw) return null;
  try { const d = JSON.parse(raw); return { text: d.text || '', ts: d.ts || '' }; }
  catch (_) { return { text: raw, ts: '' }; }
}

function _fmtTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const yy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${yy}-${mm}-${dd} ${hh}:${mi}`;
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => {
      const parsed = _parseNote(localStorage.getItem(noteKey(n.id)));
      return {id: n.id, label: n.label, preview: (parsed?.text || '').slice(0, 60), ts: parsed?.ts || ''};
    });
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}<span class="note-ts">${_fmtTs(e.ts)}</span></div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  if (!currentNodeId) return;
  document.getElementById('notes-textarea').value = '';
  saveNote(currentNodeId, '');
  const btn = document.getElementById('nb-clear-btn');
  if (btn) { btn.textContent = 'Cleared!'; setTimeout(() => { btn.textContent = 'Clear'; }, 1000); }
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();

// When viewed directly (not in an iframe), inject a back link next to the
// "Learning Path" heading so it doesn't look like a title-bar element.
if (window.parent === window) {
  var h1 = document.querySelector('#path-header h1');
  if (h1) {
    var backLink = document.createElement('a');
    backLink.href = '../../';
    backLink.textContent = '← App';
    backLink.style.cssText = [
      'font-size:10px','color:#2563eb','font-family:system-ui,sans-serif',
      'text-decoration:none','font-weight:400','letter-spacing:normal',
      'text-transform:none','white-space:nowrap','flex-shrink:0'
    ].join(';');
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:baseline;gap:8px;';
    h1.parentNode.insertBefore(row, h1);
    row.appendChild(h1);
    row.appendChild(backLink);
  }
}
