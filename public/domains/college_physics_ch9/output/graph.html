<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
.graph-recenter-btn{
  position:absolute;right:16px;bottom:16px;z-index:50;
  padding:6px 14px;border-radius:6px;
  border:1px solid #1e3a5f;background:#1e3a5f;color:#fff;
  font-size:12px;font-weight:600;font-family:system-ui,sans-serif;
  box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer;
}
.graph-recenter-btn:hover{background:#28496f;border-color:#28496f}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:10px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;margin:0}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
.nb-btn{font-size:10px;padding:2px 7px;border-radius:3px;
  border:1px solid #ddd;background:#f0f0ea;cursor:pointer;color:#777;
  font-family:system-ui,sans-serif}
.nb-btn:hover{background:#e0e0d8;color:#444}
#notes-textarea{
  flex:0 0 auto;height:100px;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex:1;min-height:0;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555;display:flex;justify-content:space-between;align-items:center}
.note-entry .note-ts{font-weight:400;color:#bbb;font-size:10px}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
/* ── concept detail panel ── */
#concept-detail{margin-top:14px;border-top:1px solid #e8e8e0;padding-top:10px;}
#concept-iframe{width:100%;height:500px;border:1px solid #e0e0d8;border-radius:4px;margin-top:6px;display:block;}
.concept-not-found{color:#e57373;font-size:12px;padding:6px 0;font-style:italic;}
</style>
</head>

const RAW = {"nodes": [{"id": "force", "label": "force", "kind": "primitive", "tier": 0, "defines": "A push or pull that acts on a system, characterized by magnitude, direction, and point of application.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "net_external_force", "label": "net external force", "kind": "primitive", "tier": 0, "defines": "The vector sum of all external forces acting on a system.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "weight", "label": "weight", "kind": "primitive", "tier": 0, "defines": "The gravitational force acting on an object, equal to mass times the acceleration due to gravity.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "normal_force", "label": "normal force", "kind": "primitive", "tier": 0, "defines": "A contact force perpendicular to the surface that supports an object.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "angular_velocity", "label": "angular velocity", "kind": "primitive", "tier": 0, "defines": "The rate of change of angular position of a rotating body, treated as a given quantity in this chapter.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "mass", "label": "mass", "kind": "primitive", "tier": 0, "defines": "The quantity of matter in an object, used as a given property throughout the chapter.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "pivot_point", "label": "pivot point", "kind": "concept", "tier": 1, "defines": "The chosen reference point about which torques are calculated; any point may be selected, but the choice affects computed torque values.", "prereqs": ["force"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "center_of_gravity", "label": "center of gravity", "kind": "concept", "tier": 1, "defines": "The single point where the total weight of a body is assumed to be concentrated for the purpose of calculating torques.", "prereqs": ["weight", "mass"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "mechanical_advantage", "label": "mechanical advantage", "kind": "concept", "tier": 1, "defines": "The ratio of the output force to the input force for a simple machine, indicating how much the machine multiplies the applied force.", "prereqs": ["force"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "perpendicular_lever_arm", "label": "perpendicular lever arm", "kind": "concept", "tier": 2, "defines": "The shortest distance from the pivot point to the line along which the force acts, used to simplify torque calculations.", "prereqs": ["pivot_point", "force"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "fulcrum", "label": "fulcrum", "kind": "concept", "tier": 2, "defines": "The fixed pivot point of a lever about which the bar rotates.", "prereqs": ["pivot_point"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "simple_machine", "label": "simple machine", "kind": "concept", "tier": 2, "defines": "A device that multiplies or redirects an applied force, often trading force magnitude for distance, with mechanical advantage determined by lever-arm ratios.", "prereqs": ["force", "mechanical_advantage"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "torque", "label": "torque", "kind": "concept", "tier": 3, "defines": "The rotational effectiveness of a force, defined as the product of the force magnitude, the distance from the pivot point, and the sine of the angle between the force and the lever arm vector.", "prereqs": ["force", "perpendicular_lever_arm"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "lever", "label": "lever", "kind": "concept", "tier": 3, "defines": "A rigid bar that rotates about a fixed fulcrum and transmits force, with mechanical advantage equal to the ratio of input to output lever arms.", "prereqs": ["simple_machine", "fulcrum", "perpendicular_lever_arm"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "pulley", "label": "pulley", "kind": "concept", "tier": 3, "defines": "A simple machine consisting of a wheel and rope that changes the direction of a force and, in compound arrangements, multiplies it.", "prereqs": ["simple_machine"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "inclined_plane", "label": "inclined plane", "kind": "concept", "tier": 3, "defines": "A flat surface set at an angle to the horizontal that reduces the input force needed to raise a load by increasing the distance over which the force is applied.", "prereqs": ["simple_machine"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "equilibrium", "label": "equilibrium", "kind": "concept", "tier": 4, "defines": "A state of a system in which there is no linear or rotational acceleration, requiring both net external force and net external torque to be zero.", "prereqs": ["net_external_force", "torque"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "static_equilibrium", "label": "static equilibrium", "kind": "concept", "tier": 5, "defines": "A state of equilibrium in which the system is motionless and both the net external force and net external torque are zero.", "prereqs": ["equilibrium"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "dynamic_equilibrium", "label": "dynamic equilibrium", "kind": "concept", "tier": 5, "defines": "A state of equilibrium in which the system moves at constant velocity while the net external force and net external torque remain zero.", "prereqs": ["equilibrium"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "first_condition_equilibrium", "label": "first condition equilibrium", "kind": "concept", "tier": 5, "defines": "The requirement that the net external force on a system must be zero in every direction for equilibrium to be achieved.", "prereqs": ["net_external_force", "equilibrium"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "second_condition_equilibrium", "label": "second condition equilibrium", "kind": "concept", "tier": 5, "defines": "The requirement that the net external torque on a system about any pivot point must be zero for equilibrium to be achieved.", "prereqs": ["torque", "equilibrium", "pivot_point"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "stable_equilibrium", "label": "stable equilibrium", "kind": "concept", "tier": 5, "defines": "An equilibrium state in which a displaced system experiences a restoring net force or torque directed opposite to the displacement.", "prereqs": ["equilibrium", "center_of_gravity"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "unstable_equilibrium", "label": "unstable equilibrium", "kind": "concept", "tier": 5, "defines": "An equilibrium state in which a displaced system experiences a net force or torque in the same direction as the displacement, causing it to accelerate away.", "prereqs": ["equilibrium", "center_of_gravity"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "neutral_equilibrium", "label": "neutral equilibrium", "kind": "concept", "tier": 5, "defines": "An equilibrium state in which the system remains in equilibrium regardless of small displacements from its original position.", "prereqs": ["equilibrium"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "base_of_support", "label": "base of support", "kind": "concept", "tier": 6, "defines": "The area beneath a body bounded by its contact points with the ground, which must contain the vertical projection of the center of gravity for stable equilibrium.", "prereqs": ["center_of_gravity", "stable_equilibrium"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "free_body_diagram", "label": "free body diagram", "kind": "application", "tier": 5, "defines": "A diagram isolating a system and representing all external forces acting on it with labeled arrows, used as a problem-solving tool in static equilibrium analysis.", "prereqs": ["force", "equilibrium"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "statics", "label": "statics", "kind": "application", "tier": 6, "defines": "The branch of mechanics that studies forces acting on systems in equilibrium, where both linear and rotational accelerations are zero.", "prereqs": ["first_condition_equilibrium", "second_condition_equilibrium"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "posture_back_strain", "label": "posture back strain", "kind": "application", "tier": 6, "defines": "The application of static equilibrium principles to show how misalignment of the body's center of gravity over the hip pivot creates large torques that back muscles must counteract.", "prereqs": ["center_of_gravity", "torque", "static_equilibrium", "pivot_point"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "muscles_joints_statics", "label": "muscles joints statics", "kind": "application", "tier": 7, "defines": "The application of torque and equilibrium analysis to biological lever systems in the body, explaining why internal muscle forces are much larger than external limb forces.", "prereqs": ["torque", "equilibrium", "lever", "statics"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}], "edges": [{"from": "force", "to": "pivot_point"}, {"from": "force", "to": "mechanical_advantage"}, {"from": "force", "to": "perpendicular_lever_arm"}, {"from": "force", "to": "simple_machine"}, {"from": "force", "to": "torque"}, {"from": "force", "to": "free_body_diagram"}, {"from": "net_external_force", "to": "equilibrium"}, {"from": "net_external_force", "to": "first_condition_equilibrium"}, {"from": "weight", "to": "center_of_gravity"}, {"from": "mass", "to": "center_of_gravity"}, {"from": "pivot_point", "to": "perpendicular_lever_arm"}, {"from": "pivot_point", "to": "fulcrum"}, {"from": "pivot_point", "to": "second_condition_equilibrium"}, {"from": "pivot_point", "to": "posture_back_strain"}, {"from": "center_of_gravity", "to": "stable_equilibrium"}, {"from": "center_of_gravity", "to": "unstable_equilibrium"}, {"from": "center_of_gravity", "to": "base_of_support"}, {"from": "center_of_gravity", "to": "posture_back_strain"}, {"from": "mechanical_advantage", "to": "simple_machine"}, {"from": "perpendicular_lever_arm", "to": "torque"}, {"from": "perpendicular_lever_arm", "to": "lever"}, {"from": "fulcrum", "to": "lever"}, {"from": "simple_machine", "to": "lever"}, {"from": "simple_machine", "to": "pulley"}, {"from": "simple_machine", "to": "inclined_plane"}, {"from": "torque", "to": "equilibrium"}, {"from": "torque", "to": "second_condition_equilibrium"}, {"from": "torque", "to": "posture_back_strain"}, {"from": "torque", "to": "muscles_joints_statics"}, {"from": "lever", "to": "muscles_joints_statics"}, {"from": "equilibrium", "to": "static_equilibrium"}, {"from": "equilibrium", "to": "dynamic_equilibrium"}, {"from": "equilibrium", "to": "first_condition_equilibrium"}, {"from": "equilibrium", "to": "second_condition_equilibrium"}, {"from": "equilibrium", "to": "stable_equilibrium"}, {"from": "equilibrium", "to": "unstable_equilibrium"}, {"from": "equilibrium", "to": "neutral_equilibrium"}, {"from": "equilibrium", "to": "free_body_diagram"}, {"from": "equilibrium", "to": "muscles_joints_statics"}, {"from": "static_equilibrium", "to": "posture_back_strain"}, {"from": "first_condition_equilibrium", "to": "statics"}, {"from": "second_condition_equilibrium", "to": "statics"}, {"from": "stable_equilibrium", "to": "base_of_support"}, {"from": "statics", "to": "muscles_joints_statics"}]};
const DOMAIN_KEY = "graph";

// ── index ──────────────────────────────────────────────────────────────────
const nodeIndex = {};
RAW.nodes.forEach(n => nodeIndex[n.id] = n);

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into
RAW.nodes.forEach(n => { prereqOf[n.id] = []; dependsOn[n.id] = []; });
RAW.edges.forEach(e => {
  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

// Compact layout: group by tier, sort alphabetically, left-align all nodes.
network.once('afterDrawing', function() {
  const pos = network.getPositions();
  const spacing = 140;

  // Group nodes by their BFS tier
  const byTier = {};
  RAW.nodes.forEach(n => {
    const tier = bfsLevels[n.id] ?? n.tier ?? 0;
    if (!byTier[tier]) byTier[tier] = [];
    byTier[tier].push(n.id);
  });

  // Sort each tier alphabetically, assign X starting from 0
  const tiers = Object.keys(byTier).map(Number).sort((a, b) => a - b);
  const tierSep = 85;
  tiers.forEach((tier, ti) => {
    const ids = byTier[tier].sort();
    const y = ti * tierSep;
    ids.forEach((id, i) => {
      network.moveNode(id, i * spacing, y);
    });
  });

  network.fit({ animation: false });
});

function reCenterGraph() {
  network.fit({ animation: true });
}

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  const panel = document.getElementById('explain-panel');
  panel.innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;

  // ── concept HTML detail ──
  const conceptsBase = window.__cb_CONCEPTS_BASE;
  const conceptUrls = window.__cb_CONCEPT_URLS || {};
  const mappedUrl = conceptUrls[node.id];
  if (mappedUrl || conceptsBase) {
    const conceptUrl = mappedUrl || (conceptsBase + 'concept_' + encodeURIComponent(node.id) + '.html');
    const detail = document.createElement('div');
    detail.id = 'concept-detail';
    detail.innerHTML = '<div class="section-label">Concept Detail</div><div class="concept-loading" style="color:#aaa;font-size:12px;padding:6px 0">Loading…</div>';
    panel.appendChild(detail);
    fetch(conceptUrl)
      .then(r => {
        if (!r.ok) throw new Error('not found');
        return r.text();
      })
      .then(html => {
        const slot = detail.querySelector('.concept-loading');
        if (!slot) return;
        // Vite dev server returns the SPA index.html (200) for missing static files.
        // Verify we got a real concept page by checking for a known marker.
        if (html.includes('spl-credit') || html.includes('Powered by')) {
          const iframe = document.createElement('iframe');
          iframe.id = 'concept-iframe';
          iframe.src = conceptUrl;
          slot.replaceWith(iframe);
        } else {
          slot.className = 'concept-not-found';
          slot.textContent = 'Content not found — generate it first.';
        }
      })
      .catch(() => {
        const slot = detail.querySelector('.concept-loading');
        if (slot) { slot.className = 'concept-not-found'; slot.textContent = 'Content not found — generate it first.'; }
      });
  }
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  const parsed = _parseNote(localStorage.getItem(noteKey(nodeId)));
  return parsed ? parsed.text : '';
}

function saveNote(nodeId, text) {
  if (text.trim()) {
    const data = JSON.stringify({ text, ts: new Date().toISOString() });
    localStorage.setItem(noteKey(nodeId), data);
  } else {
    localStorage.removeItem(noteKey(nodeId));
  }
  renderNotesList();
}

function _parseNote(raw) {
  if (!raw) return null;
  try { const d = JSON.parse(raw); return { text: d.text || '', ts: d.ts || '' }; }
  catch (_) { return { text: raw, ts: '' }; }
}

function _fmtTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const yy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${yy}-${mm}-${dd} ${hh}:${mi}`;
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => {
      const parsed = _parseNote(localStorage.getItem(noteKey(n.id)));
      return {id: n.id, label: n.label, preview: (parsed?.text || '').slice(0, 60), ts: parsed?.ts || ''};
    });
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}<span class="note-ts">${_fmtTs(e.ts)}</span></div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  if (!currentNodeId) return;
  document.getElementById('notes-textarea').value = '';
  saveNote(currentNodeId, '');
  const btn = document.getElementById('nb-clear-btn');
  if (btn) { btn.textContent = 'Cleared!'; setTimeout(() => { btn.textContent = 'Clear'; }, 1000); }
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();

// When viewed directly (not in an iframe), inject a back link next to the
// "Learning Path" heading so it doesn't look like a title-bar element.
if (window.parent === window) {
  var h1 = document.querySelector('#path-header h1');
  if (h1) {
    var backLink = document.createElement('a');
    backLink.href = '../../';
    backLink.textContent = '← App';
    backLink.style.cssText = [
      'font-size:10px','color:#2563eb','font-family:system-ui,sans-serif',
      'text-decoration:none','font-weight:400','letter-spacing:normal',
      'text-transform:none','white-space:nowrap','flex-shrink:0'
    ].join(';');
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:baseline;gap:8px;';
    h1.parentNode.insertBefore(row, h1);
    row.appendChild(h1);
    row.appendChild(backLink);
  }
}
