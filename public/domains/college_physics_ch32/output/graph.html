<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
.graph-recenter-btn{
  position:absolute;right:16px;bottom:16px;z-index:50;
  padding:6px 14px;border-radius:6px;
  border:1px solid #1e3a5f;background:#1e3a5f;color:#fff;
  font-size:12px;font-weight:600;font-family:system-ui,sans-serif;
  box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer;
}
.graph-recenter-btn:hover{background:#28496f;border-color:#28496f}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:10px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;margin:0}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
.nb-btn{font-size:10px;padding:2px 7px;border-radius:3px;
  border:1px solid #ddd;background:#f0f0ea;cursor:pointer;color:#777;
  font-family:system-ui,sans-serif}
.nb-btn:hover{background:#e0e0d8;color:#444}
#notes-textarea{
  flex:0 0 auto;height:100px;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex:1;min-height:0;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555;display:flex;justify-content:space-between;align-items:center}
.note-entry .note-ts{font-weight:400;color:#bbb;font-size:10px}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
/* ── concept detail panel ── */
#concept-detail{margin-top:14px;border-top:1px solid #e8e8e0;padding-top:10px;}
#concept-iframe{width:100%;height:500px;border:1px solid #e0e0d8;border-radius:4px;margin-top:6px;display:block;}
.concept-not-found{color:#e57373;font-size:12px;padding:6px 0;font-style:italic;}
</style>
</head>
<body>
<div class="app">

<!-- LEFT: learning path sidebar -->
<aside id="path-sidebar">
  <div id="path-header">
    <h1>Learning Path</h1>
    <div class="domain-name">graph</div>
    <div id="path-count"></div>
  </div>
  <div id="path-steps">
    <div class="hint">Click any node in the graph<br>to see its learning path</div>
  </div>
</aside>

<!-- CENTRE TOP: concept graph -->
<div id="graph-panel">
  <div id="graph-container"></div>
  <button class="graph-recenter-btn" onclick="reCenterGraph()" title="Re-fit the graph to the viewport">Re-Center</button>
</div>

<!-- CENTRE BOTTOM: explanation panel -->
<div id="explain-panel">
  <div class="empty">Select a node to see its definition, prerequisites, and learning context.</div>
</div>

<!-- RIGHT: notes sidebar -->
<aside id="notes-sidebar">
  <div id="notes-header">
    <div id="notes-header-top">
      <h2>Notes</h2>
      <div>
        <button class="nb-btn" id="nb-clear-btn" onclick="clearNote()">Clear</button>
        <button class="nb-btn" onclick="exportNotes()">Export</button>
      </div>
    </div>
    <div id="notes-node-label">no node selected</div>
  </div>
  <textarea id="notes-textarea" placeholder="Type notes here&#10;(auto-saved per node)"></textarea>
  <div id="notes-with-entries"></div>
</aside>

</div><!-- .app -->

<script>
const RAW = {"nodes": [{"id": "ionizing_radiation", "label": "ionizing radiation", "kind": "primitive", "tier": 0, "defines": "Radiation with enough energy to ionize atoms and molecules, affecting biological tissue primarily through DNA damage.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "radioactive_decay", "label": "radioactive decay", "kind": "primitive", "tier": 0, "defines": "The spontaneous transformation of an unstable nucleus, emitting alpha, beta, or gamma radiation.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "half_life", "label": "half life", "kind": "primitive", "tier": 0, "defines": "The time required for half of a radioactive substance to decay.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "binding_energy_per_nucleon", "label": "binding energy per nucleon", "kind": "primitive", "tier": 0, "defines": "The average energy needed to remove a nucleon from a nucleus, which is greater for medium-mass nuclei and determines whether fusion or fission releases energy.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "coulomb_repulsion", "label": "coulomb repulsion", "kind": "primitive", "tier": 0, "defines": "The electrostatic repulsive force between like-charged particles such as protons in nuclei.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "quantum_tunneling", "label": "quantum tunneling", "kind": "primitive", "tier": 0, "defines": "The quantum mechanical process by which particles penetrate an energy barrier they classically could not surmount.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "nuclear_force", "label": "nuclear force", "kind": "primitive", "tier": 0, "defines": "The short-range attractive force between nucleons that binds nuclei together.", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#fffde7", "border": "#795548"}, "font": {"size": 13}}, {"id": "tagging", "label": "tagging", "kind": "concept", "tier": 1, "defines": "The process of attaching a radioactive nuclide to a chemical compound so that the compound can be tracked inside the body.", "prereqs": ["radioactive_decay"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "radiation_absorbed_dose", "label": "radiation absorbed dose", "kind": "concept", "tier": 1, "defines": "A measure of ionizing energy deposited per kilogram of tissue, where 1 rad equals 0.01 J/kg and 1 Gray equals 1 J/kg.", "prereqs": ["ionizing_radiation"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "free_radicals", "label": "free radicals", "kind": "concept", "tier": 1, "defines": "Unstable oxygen- or hydrogen-containing molecular fragments created by ionizing radiation that undergo rapid chemical reactions to produce radiolytic products capable of destroying cells.", "prereqs": ["ionizing_radiation"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "nuclear_fusion", "label": "nuclear fusion", "kind": "concept", "tier": 1, "defines": "A reaction in which two light nuclei combine to form a larger nucleus, releasing energy because the product has greater binding energy per nucleon than the reactants.", "prereqs": ["binding_energy_per_nucleon", "coulomb_repulsion", "quantum_tunneling", "nuclear_force"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "nuclear_fission", "label": "nuclear fission", "kind": "concept", "tier": 1, "defines": "A reaction in which a heavy nucleus splits into two or more lighter fission fragments, releasing energy because the products have greater binding energy per nucleon.", "prereqs": ["binding_energy_per_nucleon", "nuclear_force", "coulomb_repulsion"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "radiopharmaceutical", "label": "radiopharmaceutical", "kind": "concept", "tier": 2, "defines": "A radioactive compound tagged to a chemical designed for specific medical purposes, used to image or treat organs and diseases.", "prereqs": ["tagging"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "relative_biological_effectiveness", "label": "relative biological effectiveness", "kind": "concept", "tier": 2, "defines": "A factor that accounts for the varying biological damage caused by different types of ionizing radiation for the same absorbed dose, with short-range particles having higher RBE values.", "prereqs": ["radiation_absorbed_dose"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "chain_reaction", "label": "chain reaction", "kind": "concept", "tier": 2, "defines": "A self-sustaining sequence of fission reactions in which neutrons produced by each fission induce further fissions, requiring on average more than one neutron per fission to sustain.", "prereqs": ["nuclear_fission"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "proton_proton_cycle", "label": "proton proton cycle", "kind": "concept", "tier": 2, "defines": "The principal fusion reaction sequence in the Sun in which four protons are fused into a helium-4 nucleus, releasing 26.7 MeV of energy along with positrons, neutrinos, and gamma rays.", "prereqs": ["nuclear_fusion"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "magnetic_confinement", "label": "magnetic confinement", "kind": "concept", "tier": 2, "defines": "A fusion confinement technique that uses strong magnetic fields, as in a tokamak, to trap charged plasma particles and sustain the high temperatures needed for fusion.", "prereqs": ["nuclear_fusion"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "inertial_confinement", "label": "inertial confinement", "kind": "concept", "tier": 2, "defines": "A fusion confinement technique that uses multiple high-power lasers to compress and heat tiny fuel pellets to extreme density and temperature before the fuel can expand.", "prereqs": ["nuclear_fusion"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "therapeutic_ratio", "label": "therapeutic ratio", "kind": "concept", "tier": 2, "defines": "The ratio of abnormal (cancer) cells killed to normal cells killed during radiotherapy, which radiotherapy techniques are designed to maximize.", "prereqs": ["radiation_absorbed_dose"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "food_irradiation", "label": "food irradiation", "kind": "concept", "tier": 2, "defines": "The treatment of food with large doses of gamma rays, x-rays, or electrons to reduce pest infestation, delay spoilage, and prevent illness from microorganisms.", "prereqs": ["free_radicals"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "anger_camera", "label": "anger camera", "kind": "concept", "tier": 3, "defines": "A medical imaging device that uses a lead collimator and scintillation detectors to produce a two-dimensional image of gamma-ray-emitting radiopharmaceutical concentrations in the body.", "prereqs": ["radiopharmaceutical", "ionizing_radiation"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "pet", "label": "pet", "kind": "concept", "tier": 3, "defines": "An imaging technique that detects pairs of 0.511-MeV gamma rays produced by positron-electron annihilation to accurately localize radiopharmaceuticals in the body.", "prereqs": ["radiopharmaceutical", "ionizing_radiation"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "dose_equivalent", "label": "dose equivalent", "kind": "concept", "tier": 3, "defines": "The biologically effective radiation dose, defined as absorbed dose in rads multiplied by the RBE, with 1 Sv equal to 100 rem.", "prereqs": ["radiation_absorbed_dose", "relative_biological_effectiveness"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "critical_mass", "label": "critical mass", "kind": "concept", "tier": 3, "defines": "The minimum amount of fissionable material needed to sustain a chain reaction, dependent on the nuclide's neutron production rate and fission probability.", "prereqs": ["chain_reaction"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "neutron_moderation", "label": "neutron moderation", "kind": "concept", "tier": 3, "defines": "The process of slowing fast fission-produced neutrons to thermal energies using a moderator such as water, enabling them to be efficiently absorbed by fissile fuel like U-235.", "prereqs": ["chain_reaction"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "radiotherapy", "label": "radiotherapy", "kind": "concept", "tier": 3, "defines": "The therapeutic use of ionizing radiation to treat cancer by exploiting the greater sensitivity of rapidly reproducing cancer cells to radiation damage.", "prereqs": ["therapeutic_ratio"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "breeding", "label": "breeding", "kind": "concept", "tier": 3, "defines": "The production of fissile plutonium-239 from non-fissile uranium-238 through neutron capture and subsequent beta decays in a nuclear reactor.", "prereqs": ["chain_reaction", "radioactive_decay"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "spect", "label": "spect", "kind": "concept", "tier": 4, "defines": "A tomographic imaging technique that uses gamma-emitting radiopharmaceuticals and a circular detector array to construct three-dimensional images of radioactive concentration in the body.", "prereqs": ["anger_camera"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "linear_hypothesis", "label": "linear hypothesis", "kind": "concept", "tier": 4, "defines": "The assumption that the risk of radiation-induced cancer or genetic defects is directly proportional to dose, even at low doses, implying no threshold for harm.", "prereqs": ["dose_equivalent"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "radiation_protection", "label": "radiation protection", "kind": "concept", "tier": 4, "defines": "Methods to limit radiation exposure using three principles — shielding to absorb radiation, increasing distance from the source, and limiting exposure time.", "prereqs": ["dose_equivalent"], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "fission_bomb", "label": "fission bomb", "kind": "application", "tier": 4, "defines": "A nuclear weapon that rapidly assembles a supercritical mass of fissile material (uranium-235 or plutonium-239) using gun-type or implosion designs to produce an uncontrolled chain reaction.", "prereqs": ["critical_mass"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "nuclear_power_reactor", "label": "nuclear power reactor", "kind": "application", "tier": 4, "defines": "A controlled fission device that uses enriched uranium fuel, a moderator, and control rods to sustain a critical chain reaction for electrical power generation.", "prereqs": ["critical_mass", "neutron_moderation"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "cancer_radiotherapy", "label": "cancer radiotherapy", "kind": "application", "tier": 4, "defines": "The clinical application of ionizing radiation to treat cancer using geometric beam focusing, radioactive implants, or tagged antibodies to maximize the therapeutic ratio.", "prereqs": ["radiotherapy", "dose_equivalent"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "thermonuclear_bomb", "label": "thermonuclear bomb", "kind": "application", "tier": 5, "defines": "A nuclear weapon that uses a fission bomb as a trigger to ignite fusion fuel (lithium deuteride), achieving virtually unlimited energy yields measured in megatons.", "prereqs": ["fission_bomb", "nuclear_fusion"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}, {"id": "medical_imaging", "label": "medical imaging", "kind": "application", "tier": 5, "defines": "The use of radiopharmaceuticals and radiation detectors such as Anger cameras, SPECT, and PET to produce diagnostic images of organ function and disease.", "prereqs": ["spect", "pet"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fce4ec", "border": "#c62828"}, "font": {"size": 13}}], "edges": [{"from": "ionizing_radiation", "to": "radiation_absorbed_dose"}, {"from": "ionizing_radiation", "to": "free_radicals"}, {"from": "ionizing_radiation", "to": "anger_camera"}, {"from": "ionizing_radiation", "to": "pet"}, {"from": "radioactive_decay", "to": "tagging"}, {"from": "radioactive_decay", "to": "breeding"}, {"from": "binding_energy_per_nucleon", "to": "nuclear_fusion"}, {"from": "binding_energy_per_nucleon", "to": "nuclear_fission"}, {"from": "coulomb_repulsion", "to": "nuclear_fusion"}, {"from": "coulomb_repulsion", "to": "nuclear_fission"}, {"from": "quantum_tunneling", "to": "nuclear_fusion"}, {"from": "nuclear_force", "to": "nuclear_fusion"}, {"from": "nuclear_force", "to": "nuclear_fission"}, {"from": "tagging", "to": "radiopharmaceutical"}, {"from": "radiation_absorbed_dose", "to": "relative_biological_effectiveness"}, {"from": "radiation_absorbed_dose", "to": "therapeutic_ratio"}, {"from": "radiation_absorbed_dose", "to": "dose_equivalent"}, {"from": "free_radicals", "to": "food_irradiation"}, {"from": "nuclear_fusion", "to": "proton_proton_cycle"}, {"from": "nuclear_fusion", "to": "magnetic_confinement"}, {"from": "nuclear_fusion", "to": "inertial_confinement"}, {"from": "nuclear_fusion", "to": "thermonuclear_bomb"}, {"from": "nuclear_fission", "to": "chain_reaction"}, {"from": "radiopharmaceutical", "to": "anger_camera"}, {"from": "radiopharmaceutical", "to": "pet"}, {"from": "relative_biological_effectiveness", "to": "dose_equivalent"}, {"from": "chain_reaction", "to": "critical_mass"}, {"from": "chain_reaction", "to": "neutron_moderation"}, {"from": "chain_reaction", "to": "breeding"}, {"from": "therapeutic_ratio", "to": "radiotherapy"}, {"from": "anger_camera", "to": "spect"}, {"from": "pet", "to": "medical_imaging"}, {"from": "dose_equivalent", "to": "linear_hypothesis"}, {"from": "dose_equivalent", "to": "radiation_protection"}, {"from": "dose_equivalent", "to": "cancer_radiotherapy"}, {"from": "critical_mass", "to": "fission_bomb"}, {"from": "critical_mass", "to": "nuclear_power_reactor"}, {"from": "neutron_moderation", "to": "nuclear_power_reactor"}, {"from": "radiotherapy", "to": "cancer_radiotherapy"}, {"from": "spect", "to": "medical_imaging"}, {"from": "fission_bomb", "to": "thermonuclear_bomb"}]};

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into
RAW.nodes.forEach(n => { prereqOf[n.id] = []; dependsOn[n.id] = []; });
RAW.edges.forEach(e => {
  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

// Compact layout: group by tier, sort alphabetically, left-align all nodes.
network.once('afterDrawing', function() {
  const pos = network.getPositions();
  const spacing = 140;

  // Group nodes by their BFS tier
  const byTier = {};
  RAW.nodes.forEach(n => {
    const tier = bfsLevels[n.id] ?? n.tier ?? 0;
    if (!byTier[tier]) byTier[tier] = [];
    byTier[tier].push(n.id);
  });

  // Sort each tier alphabetically, assign X starting from 0
  const tiers = Object.keys(byTier).map(Number).sort((a, b) => a - b);
  const tierSep = 85;
  tiers.forEach((tier, ti) => {
    const ids = byTier[tier].sort();
    const y = ti * tierSep;
    ids.forEach((id, i) => {
      network.moveNode(id, i * spacing, y);
    });
  });

  network.fit({ animation: false });
});

function reCenterGraph() {
  network.fit({ animation: true });
}

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  const panel = document.getElementById('explain-panel');
  panel.innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;

  // ── concept HTML detail ──
  const conceptsBase = window.__cb_CONCEPTS_BASE;
  const conceptUrls = window.__cb_CONCEPT_URLS || {};
  const mappedUrl = conceptUrls[node.id];
  if (mappedUrl || conceptsBase) {
    const conceptUrl = mappedUrl || (conceptsBase + 'concept_' + encodeURIComponent(node.id) + '.html');
    const detail = document.createElement('div');
    detail.id = 'concept-detail';
    detail.innerHTML = '<div class="section-label">Concept Detail</div><div class="concept-loading" style="color:#aaa;font-size:12px;padding:6px 0">Loading…</div>';
    panel.appendChild(detail);
    fetch(conceptUrl)
      .then(r => {
        if (!r.ok) throw new Error('not found');
        return r.text();
      })
      .then(html => {
        const slot = detail.querySelector('.concept-loading');
        if (!slot) return;
        // Vite dev server returns the SPA index.html (200) for missing static files.
        // Verify we got a real concept page by checking for a known marker.
        if (html.includes('spl-credit') || html.includes('Powered by')) {
          const iframe = document.createElement('iframe');
          iframe.id = 'concept-iframe';
          iframe.src = conceptUrl;
          slot.replaceWith(iframe);
        } else {
          slot.className = 'concept-not-found';
          slot.textContent = 'Content not found — generate it first.';
        }
      })
      .catch(() => {
        const slot = detail.querySelector('.concept-loading');
        if (slot) { slot.className = 'concept-not-found'; slot.textContent = 'Content not found — generate it first.'; }
      });
  }
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  const parsed = _parseNote(localStorage.getItem(noteKey(nodeId)));
  return parsed ? parsed.text : '';
}

function saveNote(nodeId, text) {
  if (text.trim()) {
    const data = JSON.stringify({ text, ts: new Date().toISOString() });
    localStorage.setItem(noteKey(nodeId), data);
  } else {
    localStorage.removeItem(noteKey(nodeId));
  }
  renderNotesList();
}

function _parseNote(raw) {
  if (!raw) return null;
  try { const d = JSON.parse(raw); return { text: d.text || '', ts: d.ts || '' }; }
  catch (_) { return { text: raw, ts: '' }; }
}

function _fmtTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const yy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${yy}-${mm}-${dd} ${hh}:${mi}`;
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => {
      const parsed = _parseNote(localStorage.getItem(noteKey(n.id)));
      return {id: n.id, label: n.label, preview: (parsed?.text || '').slice(0, 60), ts: parsed?.ts || ''};
    });
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}<span class="note-ts">${_fmtTs(e.ts)}</span></div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  if (!currentNodeId) return;
  document.getElementById('notes-textarea').value = '';
  saveNote(currentNodeId, '');
  const btn = document.getElementById('nb-clear-btn');
  if (btn) { btn.textContent = 'Cleared!'; setTimeout(() => { btn.textContent = 'Clear'; }, 1000); }
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();

// When viewed directly (not in an iframe), inject a back link next to the
// "Learning Path" heading so it doesn't look like a title-bar element.
if (window.parent === window) {
  var h1 = document.querySelector('#path-header h1');
  if (h1) {
    var backLink = document.createElement('a');
    backLink.href = '../../';
    backLink.textContent = '← App';
    backLink.style.cssText = [
      'font-size:10px','color:#2563eb','font-family:system-ui,sans-serif',
      'text-decoration:none','font-weight:400','letter-spacing:normal',
      'text-transform:none','white-space:nowrap','flex-shrink:0'
    ].join(';');
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:baseline;gap:8px;';
    h1.parentNode.insertBefore(row, h1);
    row.appendChild(h1);
    row.appendChild(backLink);
  }
}
