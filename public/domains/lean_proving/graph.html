<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — lean_proving_graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
#legend{
  position:absolute;top:10px;right:10px;
  background:rgba(255,255,255,.9);border:1px solid #ddd;
  border-radius:6px;padding:8px 10px;font-size:11px;
  display:flex;gap:10px;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:11px;height:11px;border-radius:2px;border:2px solid;flex-shrink:0}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:12px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
#notes-textarea{
  flex:1;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-actions{
  padding:8px 10px;border-top:1px solid #e8e8e0;flex-shrink:0;
  display:flex;gap:6px;align-items:center;
}
#notes-actions button{
  font-size:11px;padding:4px 10px;border-radius:4px;
  border:1px solid #ccc;background:#fff;cursor:pointer;color:#444;
}
#notes-actions button:hover{background:#f0f0e8}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex-shrink:0;
  max-height:35vh;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
</style>
</head>

<div class="app">

<!-- LEFT: learning path sidebar -->
<aside id="path-sidebar">
  <div id="path-header">
    <h1>Learning Path</h1>
    <div class="domain-name">lean_proving_graph</div>
    <div id="path-count"></div>
  </div>

  </div>

<div id="graph-panel">

<!-- RIGHT: notes sidebar -->
<aside id="notes-sidebar">

    <button onclick="exportNotes()">Export JSON</button>
    <button onclick="clearNote()">Clear</button>
  </div>
  <div id="notes-with-entries"></div>
</aside>

</div><!-- .app -->

const RAW = {"nodes": [{"id": "type", "label": "type", "kind": "primitive", "tier": 0, "defines": "the floor of Lean's world — every object has a type, and #check tells you what it is; types are how Lean knows what you mean", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "term", "label": "term", "kind": "primitive", "tier": 0, "defines": "an inhabitant of a type — numbers, functions, and (the twist to come) proofs are all terms; def gives one a name", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "proposition", "label": "proposition", "kind": "primitive", "tier": 0, "defines": "second radical — a mathematical claim as a first-class object; propositions are types whose inhabitants are evidence", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "proof", "label": "proof", "kind": "primitive", "tier": 0, "defines": "second radical — evidence for a proposition; a proof is a term of a Prop-typed type, and the kernel checks it like any other term", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "function_types", "label": "function types", "kind": "concept", "tier": 1, "defines": "A → B and fun x => ... — functions as the basic building material; application is how anything gets done", "prereqs": ["type", "term"], "verifier": "lean|sympy", "lab": "lean #check fun", "play": "write fun n => n + 1, #check it, apply it; then #check Nat.succ and notice it is the same shape", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "inductive_types", "label": "inductive types", "kind": "concept", "tier": 2, "defines": "inductive Nat | zero | succ — data defined by its constructors; as plain terms", "prereqs": ["curry_howard", "proof"], "verifier": "lean|sympy", "lab": "lean exact", "play": "prove P → Q → P ∧ Q by writing the lambda term yourself, no tactics", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "sorry_first_workflow", "label": "sorry first workflow", "kind": "concept", "tier": 3, "defines": "sorry — the honest placeholder; state everything first, prove incrementally, and let the warning list be your to-do list (statement-first formalization)", "prereqs": ["theorem_statements", "proof"], "verifier": "lean|sympy", "lab": "lean sorry", "play": "sketch a 3-lemma proof plan with sorry bodies; replace them one at a time and watch the warnings disappear", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "tactic_mode", "label": "tactic mode", "kind": "concept", "tier": 3, "defines": "by — the interactive mode; the goal state shows what remains, each tactic transforms it, and the proof is the recorded transcript", "prereqs": ["theorem_statements", "proof"], "verifier": "lean|sympy", "lab": "lean by", "play": "enter by on a simple goal and watch the infoview update after every keystroke", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "quantifiers", "label": "quantifiers", "kind": "concept", "tier": 3, "defines": "∀ is a function type, ∃ is a pair — intro gives you the universal, ⟨witness, proof⟩ builds the existential; binders are the grammar of real theorems", "prereqs": ["proposition", "function_types"], "verifier": "lean|sympy", "lab": "lean intro/use", "play": "prove ∀ n : Nat, ∃ m, m > n and notice the witness you chose appears in the term", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "core_tactics", "label": "core tactics", "kind": "concept", "tier": 4, "defines": "intro, exact, apply, constructor, cases — the five moves that prove most beginner goals; everything else is refinement", "prereqs": ["tactic_mode"], "verifier": "lean|sympy", "lab": "lean tactics", "play": "prove A ∧ B → B ∧ A using only intro, cases, constructor, exact", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "pattern_matching_recursion", "label": "pattern matching recursion", "kind": "concept", "tier": 3, "defines": "match and structural recursion — functions on inductive data must terminate, and Lean checks that too; computation is proof-adjacent", "prereqs": ["inductive_types", "function_types"], "verifier": "lean|sympy", "lab": "lean match", "play": "write factorial by recursion and evaluate it with", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "induction_proofs", "label": "induction proofs", "kind": "concept", "tier": 5, "defines": "induction n with — proofs that mirror the data; the base case and step are just the constructors revisited", "prereqs": ["core_tactics", "inductive_types"], "verifier": "lean|sympy", "lab": "lean induction", "play": "prove n + 0 = n by induction and see why the rfl proof fails first", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "rewriting_simp", "label": "rewriting simp", "kind": "concept", "tier": 5, "defines": "rw and simp — using equalities to transform goals; simp is a fleet of rewrite rules curated by the community", "prereqs": ["core_tactics", "equality_rfl"], "verifier": "lean|sympy", "lab": "lean rw/simp", "play": "prove (a + b) + c = (c + b) + a with rw [Nat.add_comm] steps, then again with one simp [Nat.add_comm, Nat.add_assoc]", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "typeclasses_structures", "label": "typeclasses structures", "kind": "concept", "tier": 4, "defines": "structure and [Group G] — bundling axioms with carriers; typeclass inference silently supplies the right algebra so theorems state cleanly", "prereqs": ["inductive_types", "function_types"], "verifier": "lean|sympy", "lab": "lean class/instance", "play": "#check @mul_comm and read the [CommMonoid] argument that inference fills for you", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "mathlib", "label": "mathlib", "kind": "concept", "tier": 6, "defines": "the library — over a million lines of formalized mathematics with strict naming conventions; learning to FIND a lemma is learning mathlib", "prereqs": ["typeclasses_structures", "rewriting_simp"], "verifier": "lean|sympy", "lab": "mathlib naming conventions", "play": "guess the mathlib names for 'addition is commutative on Nat' and 'a square is nonnegative'; check your guesses", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "proof_search", "label": "proof search", "kind": "concept", "tier": 7, "defines": "exact?, apply?, Loogle, LeanSearch — the library as a queryable database; half of proving is discovering what is already proved", "prereqs": ["mathlib"], "verifier": "lean|sympy", "lab": "lean exact?", "play": "state a small inequality and let exact? find the mathlib lemma; read the name it suggests and decode the convention", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "automation_tactics", "label": "automation tactics", "kind": "concept", "tier": 7, "defines": "omega, ring, linarith, positivity, aesop — decision procedures that close whole goal families; know which domain each one owns", "prereqs": ["rewriting_simp", "proof_search"], "verifier": "lean|sympy", "lab": "lean omega/ring", "play": "prove (a + b)^2 = a^2 + 2*a*b + b^2 with ring, and a linear arithmetic fact with omega; try swapping them and read the failures", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "formalization_gap", "label": "formalization gap", "kind": "concept", "tier": 8, "defines": "the informal↔formal correspondence — the one link no kernel checks; a statement can typecheck, prove cleanly, and still not say what the prose claims (flipped quantifier, vacuous hypothesis)", "prereqs": ["theorem_statements", "mathlib"], "verifier": "lean|sympy", "lab": "side-by-side prose/Lean review (see cookbook/76_lean_proof report format)", "play": "formalize 'every positive number has a square root' two ways — over Nat and over Real — and explain why one is false and the other true", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "ai_assisted_proving", "label": "ai assisted proving", "kind": "concept", "tier": 9, "defines": "the payoff — the LLM proposes statements and proof candidates, Lean's kernel disposes; error messages feed the repair loop; mathematics with AI on a foundation that cannot silently be wrong (the workflow Terence Tao advocates)", "prereqs": ["formalization_gap", "automation_tactics", "sorry_first_workflow"], "verifier": "lean|sympy", "lab": "SPL recipe 76 (cookbook/76_lean_proof) — generate-then-verify at proof grade", "play": "give an LLM a claim you know, check its formalization for faithfulness, run its proof through the kernel, and feed the errors back once", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "verified_mathematics", "label": "verified mathematics", "kind": "application", "tier": 0, "defines": "large collaborative formalizations — the Liquid Tensor Experiment, Tao's PFR project — show working mathematicians using Lean to make peer review mechanical", "prereqs": ["mathlib", "formalization_gap"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "ai_mathematics", "label": "ai mathematics", "kind": "application", "tier": 0, "defines": "AlphaProof-style systems and LLM+Lean loops — the kernel turns a hallucination-prone generator into a reliable mathematician's assistant", "prereqs": ["ai_assisted_proving"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "software_verification", "label": "software verification", "kind": "application", "tier": 0, "defines": "the same kernel that checks theorems checks programs — compilers, protocols, and smart contracts proved correct, not just tested", "prereqs": ["inductive_types", "theorem_statements"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "math_education_games", "label": "math education games", "kind": "application", "tier": 0, "defines": "the Natural Number Game teaches induction to beginners as play — instant kernel feedback is the most patient tutor there is", "prereqs": ["core_tactics", "equality_rfl"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "spl_machine_proved", "label": "spl machine proved", "kind": "application", "tier": 0, "defines": "Lean is the top rung of SPL's verifier ladder — the machine_proved badge on generated content is exactly this textbook's workflow, automated (recipe 76)", "prereqs": ["ai_assisted_proving"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}], "edges": [{"from": "type", "to": "function_types"}, {"from": "type", "to": "inductive_types"}, {"from": "type", "to": "curry_howard"}, {"from": "term", "to": "function_types"}, {"from": "term", "to": "inductive_types"}, {"from": "term", "to": "equality_rfl"}, {"from": "proposition", "to": "curry_howard"}, {"from": "proposition", "to": "equality_rfl"}, {"from": "proposition", "to": "quantifiers"}, {"from": "proof", "to": "term_proofs"}, {"from": "proof", "to": "sorry_first_workflow"}, {"from": "proof", "to": "tactic_mode"}, {"from": "function_types", "to": "theorem_statements"}, {"from": "function_types", "to": "quantifiers"}, {"from": "function_types", "to": "pattern_matching_recursion"}, {"from": "function_types", "to": "typeclasses_structures"}, {"from": "inductive_types", "to": "pattern_matching_recursion"}, {"from": "inductive_types", "to": "induction_proofs"}, {"from": "inductive_types", "to": "typeclasses_structures"}, {"from": "inductive_types", "to": "software_verification"}, {"from": "curry_howard", "to": "theorem_statements"}, {"from": "curry_howard", "to": "term_proofs"}, {"from": "equality_rfl", "to": "rewriting_simp"}, {"from": "equality_rfl", "to": "math_education_games"}, {"from": "theorem_statements", "to": "sorry_first_workflow"}, {"from": "theorem_statements", "to": "tactic_mode"}, {"from": "theorem_statements", "to": "formalization_gap"}, {"from": "theorem_statements", "to": "software_verification"}, {"from": "sorry_first_workflow", "to": "ai_assisted_proving"}, {"from": "tactic_mode", "to": "core_tactics"}, {"from": "core_tactics", "to": "induction_proofs"}, {"from": "core_tactics", "to": "rewriting_simp"}, {"from": "core_tactics", "to": "math_education_games"}, {"from": "rewriting_simp", "to": "mathlib"}, {"from": "rewriting_simp", "to": "automation_tactics"}, {"from": "typeclasses_structures", "to": "mathlib"}, {"from": "mathlib", "to": "proof_search"}, {"from": "mathlib", "to": "formalization_gap"}, {"from": "mathlib", "to": "verified_mathematics"}, {"from": "proof_search", "to": "automation_tactics"}, {"from": "automation_tactics", "to": "ai_assisted_proving"}, {"from": "formalization_gap", "to": "ai_assisted_proving"}, {"from": "formalization_gap", "to": "verified_mathematics"}, {"from": "ai_assisted_proving", "to": "ai_mathematics"}, {"from": "ai_assisted_proving", "to": "spl_machine_proved"}]};
const DOMAIN_KEY = "lean_proving_graph";

// ── index ──────────────────────────────────────────────────────────────────
const nodeIndex = {};
RAW.nodes.forEach(n => nodeIndex[n.id] = n);

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into
RAW.nodes.forEach(n => { prereqOf[n.id] = []; dependsOn[n.id] = []; });
RAW.edges.forEach(e => {
  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  document.getElementById('explain-panel').innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  return localStorage.getItem(noteKey(nodeId)) || '';
}

function saveNote(nodeId, text) {
  if (text.trim()) localStorage.setItem(noteKey(nodeId), text);
  else localStorage.removeItem(noteKey(nodeId));
  renderNotesList();
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => ({id: n.id, label: n.label, preview: localStorage.getItem(noteKey(n.id)).slice(0, 60)}));
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}</div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  document.getElementById('notes-textarea').value = '';
  if (currentNodeId) saveNote(currentNodeId, '');
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();
</script>
</body>
