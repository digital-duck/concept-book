<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:12px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
#notes-textarea{
  flex:1;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-actions{
  padding:8px 10px;border-top:1px solid #e8e8e0;flex-shrink:0;
  display:flex;gap:6px;align-items:center;
}
#notes-actions button{
  font-size:11px;padding:4px 10px;border-radius:4px;
  border:1px solid #ccc;background:#fff;cursor:pointer;color:#444;
}
#notes-actions button:hover{background:#f0f0e8}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex-shrink:0;
  max-height:35vh;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
</style>
</head>
<body>
<div class="app">

<!-- LEFT: learning path sidebar -->
<aside id="path-sidebar">
  <div id="path-header">
    <h1>Learning Path</h1>
    <div class="domain-name">graph</div>
    <div id="path-count"></div>
  </div>
  <div id="path-steps">
    <div class="hint">Click any node in the graph<br>to see its learning path</div>
  </div>
</aside>

<!-- CENTRE TOP: concept graph -->
<div id="graph-panel">
  <div id="graph-container"></div>
</div>

<!-- CENTRE BOTTOM: explanation panel -->
<div id="explain-panel">
  <div class="empty">Select a node to see its definition, prerequisites, and learning context.</div>
</div>

<!-- RIGHT: notes sidebar -->
<aside id="notes-sidebar">
  <div id="notes-header">
    <h2>Notes</h2>
    <div id="notes-node-label">no node selected</div>
  </div>
  <textarea id="notes-textarea" placeholder="Type notes here&#10;(auto-saved per node)"></textarea>
  <div id="notes-actions">
    <button onclick="exportNotes()">Export JSON</button>
    <button onclick="clearNote()">Clear</button>
  </div>
  <div id="notes-with-entries"></div>
</aside>

</div><!-- .app -->

const RAW = {"nodes": [{"id": "comparison", "label": "comparison", "kind": "primitive", "tier": 0, "defines": "first radical — a binary predicate that decides the relative order of two elements; every comparison-based algorithm's only interaction with the data; the information-theoretic floor — sorting by comparison requires Ω(n log n) comparisons in the worst case", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "swap", "label": "swap", "kind": "primitive", "tier": 0, "defines": "first radical — exchange the positions of two elements in place; with comparison, the two primitives that power the entire comparison-sort family", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "memory_access", "label": "memory access", "kind": "primitive", "tier": 0, "defines": "second radical — read or write the value at a given address in O(1); enables random-access arrays and the index arithmetic that non-comparison algorithms (radix, hash) exploit to break the Ω(n log n) barrier", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "recursion", "label": "recursion", "kind": "primitive", "tier": 0, "defines": "second radical — a function that solves a problem by solving strictly smaller instances of itself and combining results; the structural pattern shared by divide-and-conquer, dynamic programming, and tree algorithms; not derivable from comparison or swap alone", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "bubble_sort", "label": "bubble sort", "kind": "concept", "tier": 1, "defines": "repeatedly scan the array, swapping adjacent elements that are out of order; the largest unsorted element bubbles to its correct position each pass; O(n²) — the didactic sort that makes the primitives visible", "prereqs": ["comparison", "swap"], "verifier": "sympy", "lab": "python (implement bubble_sort; verify sorted invariant after each pass; count exact comparisons and swaps; compare with sympy combinatorial bound n(n-1)/2)", "play": "sort [5,3,1,4,2] by hand; count comparisons and swaps; verify the sorted suffix grows by one element after each full pass", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "selection_sort", "label": "selection sort", "kind": "concept", "tier": 1, "defines": "find the minimum of the unsorted prefix, swap it to the front; O(n²) comparisons, O(n) swaps — fewer swaps than bubble_sort; the algorithm that minimizes write operations", "prereqs": ["comparison", "swap"], "verifier": "python", "lab": "python (implement selection_sort; count swaps separately from comparisons; verify O(n) swap count on any input of length n)", "play": "sort [5,3,1,4,2]; count that exactly 4 swaps occur regardless of the input order — that O(n) swap bound is the structure selection_sort exploits", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "insertion_sort", "label": "insertion sort", "kind": "concept", "tier": 1, "defines": "maintain a sorted prefix; for each new element, shift sorted elements right until the correct position is found and insert; O(n²) worst case, O(n) on nearly sorted input; the algorithm that outperforms merge_sort in practice for small n", "prereqs": ["comparison", "swap"], "verifier": "python", "lab": "python (implement insertion_sort; measure pass count on random vs. sorted vs. reverse-sorted input; show adaptive behavior on nearly sorted data)", "play": "sort [1,2,3,4,5] (already sorted) and count comparisons; then sort [5,4,3,2,1] and count again — the ratio reveals insertion_sort's adaptive strength", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "merge_sort", "label": "merge sort", "kind": "concept", "tier": 2, "defines": "divide the array in half, recursively sort each half, merge the two sorted halves; T(n) = 2T(n/2) + O(n) → O(n log n) by the Master theorem; stable, cache-unfriendly; the algorithm that first achieves the information-theoretic optimum", "prereqs": ["comparison", "recursion"], "verifier": "sympy", "lab": "python + sympy (implement merge_sort; use sympy to verify the Master theorem recurrence T(n) = 2T(n/2) + cn solves to Θ(n log n); time on n = 2^k for k = 8..20)", "play": "merge [1,3,5] and [2,4,6]; count comparisons (at most 5 = 3+3−1); verify the merge step is O(n) — then see how this telescopes to O(n log n) over log n levels", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "quicksort", "label": "quicksort", "kind": "concept", "tier": 2, "defines": "choose a pivot, partition into elements ≤ and > pivot, recurse on each part; O(n log n) expected, O(n²) worst case (sorted input with bad pivot choice); in-place, cache-friendly — the fastest sort in practice for random data", "prereqs": ["comparison", "swap", "recursion"], "verifier": "python", "lab": "python (implement quicksort with random pivot; time on random vs. sorted input; compare against merge_sort; demonstrate O(n²) with sorted input and fixed-first pivot)", "play": "sort [3,6,8,10,1,2,1] with pivot = first element; trace the partition step; count swaps; then repeat with pivot = median-of-three and compare partition quality", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "binary_search", "label": "binary search", "kind": "concept", "tier": 2, "defines": "on a sorted array, compare the target with the midpoint; recurse on the left or right half; T(n) = T(n/2) + O(1) → O(log n); the algorithm that makes sorted arrays useful — halves the search space with each comparison", "prereqs": ["comparison", "memory_access"], "verifier": "sympy", "lab": "python + sympy (implement binary_search; verify T(n) = T(n/2) + 1 solves to ⌈log₂n⌉ using sympy.rsolve; compare iteration count with math.log2(n))", "play": "search for 7 in [1,3,5,7,9,11,13,15]; trace the midpoints; verify you reach the answer in ≤ ⌈log₂ 8⌉ = 3 comparisons", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "divide_and_conquer", "label": "divide and conquer", "kind": "concept", "tier": 3, "defines": "the algorithmic pattern — split the problem, solve subproblems independently, combine; merge_sort and quicksort are instances; analyzed by the Master theorem T(n) = aT(n/b) + f(n) → O(n^log_b(a)) when f(n) = O(n^(log_b(a)−ε))", "prereqs": ["recursion", "comparison"], "verifier": "sympy", "lab": "sympy (use sympy.rsolve to solve T(n) = 2T(n/2) + n, T(n) = T(n/2) + 1, T(n) = 4T(n/2) + n; verify the three Master theorem cases)", "play": "solve T(n) = 2T(n/2) + n with sympy.rsolve; confirm the closed form is Θ(n log n); then try a = 4, b = 2 and watch it become Θ(n²)", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "dynamic_programming", "label": "dynamic programming", "kind": "concept", "tier": 3, "defines": "solve a problem by breaking it into overlapping subproblems, storing each result (memoization / tabulation) so it is computed at most once; converts exponential recursion into polynomial time; the signature property is optimal substructure + overlapping subproblems", "prereqs": ["recursion", "memory_access"], "verifier": "python", "lab": "python (implement fibonacci memoized vs. naive; time both for n = 30..50; verify memoized stays O(n) while naive exceeds 10⁸ calls)", "play": "compute LCS of \"ABCBDAB\" and \"BDCAB\"; fill the DP table by hand for the first 3 rows; confirm the table satisfies the recurrence LCS[i][j] = LCS[i-1][j-1]+1 if match, else max(LCS[i-1][j], LCS[i][j-1])", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "greedy", n the dependency graph for tasks {A→B, A→C, B→D, C→D}; extract a topological order; verify D comes after both B and C", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "dijkstra", "label": "dijkstra", "kind": "concept", "tier": 4, "defines": "single-source shortest paths on a graph with non-negative edge weights; uses a priority_queue (min-heap) to greedily relax edges in order of current distance; O((V+E) log V) with a binary heap; the workhorse of every routing table", "prereqs": ["bfs", "greedy"], "verifier": "python", "lab": "python (implement Dijkstra with heapq; verify shortest distances match bellman_ford on 100 random non-negative-weight graphs; time both on V = 1000, E = 5000)", "play": "shortest path from A to D in the weighted graph A→B(4), A→C(2), B→D(5), C→B(1), C→D(8); trace the heap operations; verify the shortest path is A→C→B→D with cost 8", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "dynamic_programming_on_graphs", "label": "dynamic programming on graphs", "kind": "concept", "tier": 5, "defines": "shortest-path algorithms on graphs with negative weights (Bellman-Ford) or all-pairs (Floyd-Warshall); Bellman-Ford relaxes all edges V−1 times; Floyd-Warshall is a DP over intermediate vertices; both O(V²E) and O(V³) respectively", "prereqs": ["dynamic_programming", "bfs"], "verifier": "python", "lab": "python (implement Bellman-Ford; verify it finds negative cycles and correct distances on 50 random signed-weight graphs; compare with Dijkstra on non-negative cases)", "play": "add a negative edge C→A(−5) to the Dijkstra example above; run Bellman-Ford; verify it detects the negative cycle A→C→A and reports \"no finite shortest path\"", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "sorting_lower_bound", "label": "sorting lower bound", "kind": "concept", "tier": 4, "defines": "any comparison-based sort requires Ω(n log n) comparisons in the worst case — proved by the decision-tree argument: a sort of n elements must distinguish n! orderings; a binary decision tree of depth d has ≤ 2^d leaves; depth ≥ log₂(n!) ∈ Ω(n log n)", "prereqs": ["comparison", "divide_and_conquer"], "verifier": "sympy", "lab": "sympy (compute log2(factorial(n)) for n=10..20; verify it matches n*log2(n)*0.43..; confirm Stirling approx log(n!) ≈ n log n − n)", "play": "compute math.log2(math.factorial(10)) ≈ 21.8; compare with 10*math.log2(10) ≈ 33.2; the gap shows Stirling's tightness and why merge_sort's 10 log₂ 10 ≈ 33 comparisons is nearly optimal", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "route_planning", "label": "route planning", "kind": "application", "tier": 0, "defines": "GPS routing and logistics optimization reduce to shortest-path on road networks; Dijkstra for single-query, Floyd-Warshall / DP for precomputed all-pairs tables in dense transit networks", "prereqs": ["dijkstra", "dynamic_programming_on_graphs"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "search_engine_ranking", "label": "search engine ranking", "kind": "application", "tier": 0, "defines": "TF-IDF scoring and PageRank are iterative computation (DP-like fixed-point); query-time result selection uses greedy top-k extraction via a heap", "prereqs": ["dynamic_programming", "greedy"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "compiler_optimization", "label": "compiler optimization", "kind": "application", "tier": 0, "defines": "dead code elimination and constant folding use DFS on the control-flow graph; register allocation and instruction scheduling are DP/graph-coloring problems", "prereqs": ["dfs", "dynamic_programming"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "genomic_sequence_alignment", "label": "genomic sequence alignment", "kind": "application", "tier": 0, "defines": "Smith-Waterman and Needleman-Wunsch are DP algorithms on the edit-distance matrix; align DNA/protein sequences to find mutations — biological significance maps directly to dynamic_programming's optimal substructure", "prereqs": ["dynamic_programming"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "compression", "label": "compression", "kind": "application", "tier": 0, "defines": "Huffman coding (greedy, provably optimal prefix-free code) and LZ77/LZ78 (DP over match-length) underlie gzip, zstd, and most codec stacks", "prereqs": ["greedy", "dynamic_programming"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}], "edges": [{"from": "comparison", "to": "bubble_sort"}, {"from": "comparison", "to": "selection_sort"}, {"from": "comparison", "to": "insertion_sort"}, {"from": "comparison", "to": "merge_sort"}, {"from": "comparison", "to": "quicksort"}, {"from": "comparison", "to": "binary_search"}, {"from": "comparison", "to": "divide_and_conquer"}, {"from": "comparison", "to": "greedy"}, {"from": "comparison", "to": "bfs"}, {"from": "comparison", "to": "sorting_lower_bound"}, {"from": "swap", "to": "bubble_sort"}, {"from": "swap", "to": "selection_sort"}, {"from": "swap", "to": "insertion_sort"}, {"from": "swap", "to": "quicksort"}, {"from": "memory_access", "to": "binary_search"}, {"from": "memory_access", "to": "dynamic_programming"}, {"from": "memory_access", "to": "bfs"}, {"from": "memory_access", "to": "dfs"}, {"from": "recursion", "to": "merge_sort"}, {"from": "recursion", "to": "quicksort"}, {"from": "recursion", "to": "divide_and_conquer"}, {"from": "recursion", "to": "dynamic_programming"}, {"from": "recursion", "to": "dfs"}, {"from": "divide_and_conquer", "to": "sorting_lower_bound"}, {"from": "dynamic_programming", "to": "dynamic_programming_on_graphs"}, {"from": "dynamic_programming", "to": "search_engine_ranking"}, {"from": "dynamic_programming", "to": "compiler_optimization"}, {"from": "dynamic_programming", "to": "genomic_sequence_alignment"}, {"from": "dynamic_programming", "to": "compression"}, {"from": "greedy", "to": "dijkstra"}, {"from": "greedy", "to": "search_engine_ranking"}, {"from": "greedy", "to": "compression"}, {"from": "bfs", "to": "dijkstra"}, {"from": "bfs", "to": "dynamic_programming_on_graphs"}, {"from": "dfs", "to": "compiler_optimization"}, {"from": "dijkstra", "to": "route_planning"}, {"from": "dynamic_programming_on_graphs", "to": "route_planning"}]};
const DOMAIN_KEY = "graph";

// ── index ──────────────────────────────────────────────────────────────────
const nodeIndex = {};
RAW.nodes.forEach(n => nodeIndex[n.id] = n);

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into
RAW.nodes.forEach(n => { prereqOf[n.id] = []; dependsOn[n.id] = []; });
RAW.edges.forEach(e => {
  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

// Sort nodes at the same BFS level alphabetically and pull disconnected
// nodes into the main grid instead of letting vis.js exile them to the side.
network.once('afterDrawing', function() {
  const pos = network.getPositions();
  const connected = new Set();
  RAW.edges.forEach(e => { connected.add(e.from); connected.add(e.to); });
  const disconnected = RAW.nodes.filter(n => !connected.has(n.id)).map(n => n.id);

  if (disconnected.length > 0) {
    // Find the Y of level-0 nodes and the rightmost X of connected level-0 nodes
    const level0Y = Object.entries(pos)
      .filter(([id]) => bfsLevels[id] === 0 && connected.has(id))
      .map(([, p]) => p.y);
    const targetY = level0Y.length ? level0Y[0] : 0;
    const level0Xs = Object.entries(pos)
      .filter(([id]) => bfsLevels[id] === 0 && connected.has(id))
      .map(([, p]) => p.x);
    const maxX = level0Xs.length ? Math.max(...level0Xs) : 0;
    const spacing = 130;

    // Place disconnected nodes to the left of connected level-0 nodes
    const sortedDisc = [...disconnected].sort();
    const minConnX = level0Xs.length ? Math.min(...level0Xs) : 0;
    sortedDisc.forEach((id, i) => {
      network.moveNode(id, minConnX - (sortedDisc.length - i) * spacing, targetY);
    });
  }

  // Re-sort all nodes at the same Y level alphabetically
  const posAfter = network.getPositions();
  const byY = {};
  Object.entries(posAfter).forEach(([id, p]) => {
    const key = Math.round(p.y);
    if (!byY[key]) byY[key] = [];
    byY[key].push({id, x: p.x, y: p.y});
  });
  Object.values(byY).forEach(group => {
    if (group.length < 2) return;
    const sorted = [...group].sort((a, b) => a.id.localeCompare(b.id));
    const xs = group.map(n => n.x).sort((a, b) => a - b);
    sorted.forEach((node, i) => network.moveNode(node.id, xs[i], node.y));
  });
});

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  document.getElementById('explain-panel').innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  return localStorage.getItem(noteKey(nodeId)) || '';
}

function saveNote(nodeId, text) {
  if (text.trim()) localStorage.setItem(noteKey(nodeId), text);
  else localStorage.removeItem(noteKey(nodeId));
  renderNotesList();
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => ({id: n.id, label: n.label, preview: localStorage.getItem(noteKey(n.id)).slice(0, 60)}));
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}</div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  document.getElementById('notes-textarea').value = '';
  if (currentNodeId) saveNote(currentNodeId, '');
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();

// When viewed directly (not in an iframe), inject a back link next to the
// "Learning Path" heading so it doesn't look like a title-bar element.
if (window.parent === window) {
  var h1 = document.querySelector('#path-header h1');
  if (h1) {
    var backLink = document.createElement('a');
    backLink.href = '../../';
    backLink.textContent = '← App';
    backLink.style.cssText = [
      'font-size:10px','color:#2563eb','font-family:system-ui,sans-serif',
      'text-decoration:none','font-weight:400','letter-spacing:normal',
      'text-transform:none','white-space:nowrap','flex-shrink:0'
    ].join(';');
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:baseline;gap:8px;';
    h1.parentNode.insertBefore(row, h1);
    row.appendChild(h1);
    row.appendChild(backLink);
  }
}
