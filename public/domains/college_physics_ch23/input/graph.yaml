domain: college_physics_2e_ch23
primitives:
  magnetic_field:
    defines: A vector field B describing the magnetic force exerted on moving charges and currents; treated
      as a known quantity from prior chapters.
    tier: 0
  electric_current:
    defines: The flow of electric charge through a conductor; assumed as foundational from prior study.
    tier: 0
  resistance:
    defines: The opposition of a conductor to current flow, governed by Ohm's law; assumed known.
    tier: 0
  capacitance:
    defines: The ability of a device to store electric charge; introduced in prior chapters and used here
      without derivation.
    tier: 0
  angular_velocity:
    defines: The rate of change of angle with time (omega), used to describe rotating coils; treated as
      a mathematical given.
    tier: 0
concepts:
  magnetic_flux:
    defines: The quantity Phi = BA cos(theta) representing the amount of magnetic field passing through
      an area A at angle theta to the perpendicular; the central quantity governing induction.
    composed_of:
    - magnetic_field
    tier: 1
  capacitive_reactance:
    defines: The frequency-dependent opposition X_C = 1/(2*pi*f*C) of a capacitor to AC current, causing
      voltage to lag current by 90 degrees.
    composed_of:
    - capacitance
    tier: 1
  electromagnetic_induction:
    defines: The process by which any change in magnetic flux induces an electromotive force (emf) in
      a conductor or coil.
    composed_of:
    - magnetic_flux
    tier: 2
  faradays_law:
    defines: The quantitative law stating that the induced emf equals -N * Delta(Phi)/Delta(t), where
      N is the number of turns and Delta(Phi)/Delta(t) is the rate of change of magnetic flux.
    composed_of:
    - electromagnetic_induction
    tier: 3
  lenzs_law:
    defines: The principle, expressed by the minus sign in Faraday's law, that the induced emf drives
      a current whose magnetic field opposes the change in flux that caused it.
    composed_of:
    - faradays_law
    tier: 4
  motional_emf:
    defines: An emf induced by the relative motion of a conductor of length l through a magnetic field
      B at speed v, given by emf = Blv.
    composed_of:
    - magnetic_field
    - faradays_law
    tier: 4
  eddy_currents:
    defines: Current loops induced within bulk conducting materials when the magnetic flux through them
      changes, arising as a consequence of Faraday's law.
    composed_of:
    - faradays_law
    tier: 4
  electric_generator:
    defines: A device that converts mechanical work into electrical energy by rotating an N-turn coil
      of area A in a uniform magnetic field B, producing a sinusoidal emf = NBA*omega*sin(omega*t) with
      peak emf = NBA*omega.
    composed_of:
    - faradays_law
    - angular_velocity
    tier: 4
  mutual_inductance:
    defines: The property M (in henries) quantifying how effectively a change in current in one coil induces
      an emf in a neighboring coil, via emf_2 = -M * Delta(I_1)/Delta(t).
    composed_of:
    - faradays_law
    - electric_current
    tier: 4
  self_inductance:
    defines: The property L (in henries) of a device quantifying how effectively a change in its own current
      induces an opposing emf in itself, via emf = -L * Delta(I)/Delta(t).
    composed_of:
    - faradays_law
    - electric_current
    tier: 4
  magnetic_damping:
    defines: The drag force on a moving conductor produced by eddy currents, which by Lenz's law always
      opposes the motion inducing them.
    composed_of:
    - eddy_currents
    - lenzs_law
    tier: 5
  back_emf:
    defines: The emf self-generated by a rotating motor coil (via Faraday's law) that opposes the driving
      input voltage and grows proportionally with the motor's angular velocity.
    composed_of:
    - lenzs_law
    - angular_velocity
    tier: 5
  inductor_energy:
    defines: The energy E = (1/2)*L*I^2 stored in the magnetic field of an inductor carrying current I.
    composed_of:
    - self_inductance
    - electric_current
    tier: 5
  rl_time_constant:
    defines: The characteristic time tau = L/R governing exponential current growth and decay in a series
      RL circuit; current rises or falls by a factor of e^-1 in each interval tau.
    composed_of:
    - self_inductance
    - resistance
    tier: 5
  inductive_reactance:
    defines: The frequency-dependent opposition X_L = 2*pi*f*L of an inductor to AC current, causing voltage
      to lead current by 90 degrees.
    composed_of:
    - self_inductance
    tier: 5
  impedance:
    defines: The total AC opposition Z = sqrt(R^2 + (X_L - X_C)^2) of a series RLC circuit, relating peak
      voltage to peak current via the AC form of Ohm's law.
    composed_of:
    - resistance
    - inductive_reactance
    - capacitive_reactance
    tier: 6
  resonant_frequency:
    defines: The frequency f_0 = 1/(2*pi*sqrt(L*C)) at which inductive and capacitive reactances cancel,
      impedance equals resistance alone, and current is maximized.
    composed_of:
    - inductive_reactance
    - capacitive_reactance
    tier: 6
  phase_angle:
    defines: The angle phi between source voltage and current in an AC circuit, given by cos(phi) = R/Z,
      reflecting the net reactance of the circuit.
    composed_of:
    - impedance
    - resistance
    tier: 7
  power_factor:
    defines: The quantity cos(phi) by which the product I_rms * V_rms must be multiplied to obtain the
      true average power delivered to an AC circuit.
    composed_of:
    - phase_angle
    tier: 8
applications:
  transformer:
    defines: A device using mutual induction between primary and secondary coils on a shared iron core
      to transform AC voltages according to V_s/V_p = N_s/N_p, with corresponding inverse change in current.
    needs:
    - mutual_inductance
    tier: 5
  electrical_safety_devices:
    defines: Systems such as the three-wire grounding scheme, ground fault interrupter (GFI), and isolation
      transformer that use electromagnetic induction to detect leakage currents and prevent shock hazards.
    needs:
    - electromagnetic_induction
    - mutual_inductance
    tier: 5
  rlc_series_circuit:
    defines: A circuit combining resistance, inductance, and capacitance in series with an AC source,
      exhibiting frequency-dependent impedance, resonance, and power-factor effects with applications
      including radio tuning.
    needs:
    - impedance
    - resonant_frequency
    - power_factor
    tier: 9
