<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — music_theory_graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
#legend{
  position:absolute;top:10px;right:10px;
  background:rgba(255,255,255,.9);border:1px solid #ddd;
  border-radius:6px;padding:8px 10px;font-size:11px;
  display:flex;gap:10px;flex-wrap:wrap;
}
.leg{display:flex;align-items:center;gap:4px}
.leg-dot{width:11px;height:11px;border-radius:2px;border:2px solid;flex-shrink:0}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:12px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
#notes-textarea{
  flex:1;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-actions{
  padding:8px 10px;border-top:1px solid #e8e8e0;flex-shrink:0;
  display:flex;gap:6px;align-items:center;
}
#notes-actions button{
  font-size:11px;padding:4px 10px;border-radius:4px;
  border:1px solid #ccc;background:#fff;cursor:pointer;color:#444;
}
#notes-actions button:hover{background:#f0f0e8}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex-shrink:0;
  max-height:35vh;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
</style>
</head>

<div class="app">

<!-- LEFT: learning path sidebar -->

  <div id="notes-with-entries"></div>
</aside>

</div><!-- .app -->

<script>
const RAW = {"nodes": [{"id": "middle_c", "label": "middle c", "kind": "primitive", "tier": 0, "defines": "the reference note — the white key in the middle of every piano; not special in sound, special as the agreed zero point every other note is counted from", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "semitone", "label": "semitone", "kind": "primitive", "tier": 0, "defines": "the smallest step in Western music — any key to its immediate neighbor, black or white; ALL pitch structure is counting these", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "beat", "label": "beat", "kind": "primitive", "tier": 0, "defines": "the steady tick a crowd claps to — music's unit of time, as the semitone is its unit of pitch", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "halving", "label": "halving", "kind": "primitive", "tier": 0, "defines": "the splitting operator — cut any duration in two; all rhythm finer than the beat comes from repeated halving", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "whole_tone", "label": "whole tone", "kind": "concept", "tier": 1, "defines": "two semitones (C→D) — repetition as construction, the simplest stack of all (the 林 of this graph)", "prereqs": ["semitone"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (interval = semitone count, machine-checked)", "play": "on any piano picture, walk C to D and count the keys you stepped over — there is exactly one (a black key); two steps total", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "minor_third", "label": "minor third", "kind": "concept", "tier": 1, "defines": "three semitones (C→E♭) — the \"sad\" color in chords, and the gap between a phone's double-buzz", "prereqs": ["semitone"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (interval = semitone count, machine-checked)", "play": "hum the first two notes of \"Greensleeves\" — that drop is three semitones", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "major_third", "label": "major third", "kind": "concept", "tier": 1, "defines": "four semitones (C→E) — the \"bright\" color; with the minor third it is one of the two bricks every chord stacks", "prereqs": ["semitone"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (interval = semitone count, machine-checked)", "play": "sing \"Oh when the saints\" — \"Oh when\" is a major third going up", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "perfect_fourth", "label": "perfect fourth", "kind": "concept", "tier": 1, "defines": "five semitones (C→F) — the fifth's mirror twin; 5 + 7 = 12, so fourth + fifth = exactly one octave (arithmetic you can hear)", "prereqs": ["semitone"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (interval = semitone count, machine-checked)", "play": "sing the opening of \"Here comes the bride\" — that leap is a perfect fourth; then check 5 + 7 = 12 on the keyboard", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "perfect_fifth", "label": "perfect fifth", "kind": "concept", "tier": 1, "defines": "seven semitones (C→G) — the most consonant interval after the octave; the opening of \"Twinkle Twinkle\" and the backbone of every power chord", "prereqs": ["semitone"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (interval = semitone count, machine-checked)", "play": "sing \"twinkle, twinkle\" — the jump between the two words is seven semitones; count it on a keyboard", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "octave", "label": "octave", "kind": "concept", "tier": 1, "defines": "twelve semitones — and the ear says \"home again\"; the frequency exactly doubles, which is why the note keeps its name (somewhere over the rainbow opens with one)", "prereqs": ["semitone"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (interval = semitone count, machine-checked)", "play": "sing \"some-WHERE\" from Over the Rainbow — that leap is the octave; this is why music runs on arithmetic mod 12", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "measure", "label": "measure", "kind": "concept", "tier": 1, "defines": "four beats grouped into a bar — the \"sentence\" of musical time; nearly all pop music counts in fours", "prereqs": ["beat"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (rhythm = beat grouping, machine-checked)", "play": "put on any pop song and count 1-2-3-4 over and over — you will land on the drum accents without trying", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "eighth_note", "label": "eighth note", "kind": "concept", "tier": 1, "defines": "one beat split in two — count \"1-and-2-and\"; the skipping motion under every pop verse", "prereqs": ["beat", "halving"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (rhythm = beat × halving, machine-checked)", "play": "clap steady beats with one hand, then say \"and\" between every clap — you just performed the halving operator", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "major_scale", "label": "major scale", "kind": "concept", "tier": 2, "defines": "do-re-mi-fa-sol-la-ti-do — the step recipe W-W-H-W-W-W-H from the anchor note; the steps sum to 2+2+1+2+2+2+1 = 12, so the scale closes exactly one octave (the white keys from C to C are this recipe made visible)", "prereqs": ["middle_c", "whole_tone", "semitone", "octave"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (scale = anchored semitone recipe, machine-checked)", "play": "play the eight white keys from C to C and sing do-re-mi along; then verify the arithmetic 2+2+1+2+2+2+1 = 12", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "major_triad", "label": "major triad", "kind": "concept", "tier": 2, "defines": "the \"happy\" chord (C-E-G) — a major third then a minor third stacked on the anchor; 4 + 3 = 7, so the outer notes are a perfect fifth apart, automatically", "prereqs": ["middle_c", "major_third", "minor_third"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (chord = interval stack, machine-checked)", "play": "press C, E, and G together on any keyboard app — that sound is 4+3 in semitone arithmetic", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "minor_triad", "label": "minor triad", "kind": "concept", "tier": 2, "defines": "the \"sad\" chord (C-E♭-G) — the SAME two bricks as the major triad, stacked in the other order (3 + 4); swapped order is the entire difference between happy and sad", "prereqs": ["middle_c", "minor_third", "major_third"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (chord = interval stack, machine-checked)", "play": "play C-E-G, then slide the middle note down one key (E→E♭) and play again — one semitone moved, the mood flipped", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "dominant_seventh", "label": "dominant seventh", "kind": "concept", "tier": 3, "defines": "stack ONE more minor third on the major triad (4+3+3 = 10) and the chord starts leaning forward, aching to resolve home — the engine of musical motion (the blues runs almost entirely on this chord)", "prereqs": ["major_triad", "minor_third"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (chord = interval stack, machine-checked)", "play": "play C-E-G-B♭ and just stop — feel how unfinished it sounds; then play plain C-E-G and feel it land", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "melody", "label": "melody", "kind": "concept", "tier": 3, "defines": "FORM meets TIME — notes from the scale placed onto the beat grid; the first complete musical object, and the proof the two radicals are both required", "prereqs": ["major_scale", "measure"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (principle node — reducibility check)", "play": "take three scale notes and place them anywhere on a counted 1-2-3-4 bar — congratulations, you have composed", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "interval_stacking", "label": "interval stacking", "kind": "concept", "tier": 3, "defines": "the counting principle — every interval IS its semitone count, so pitch space is integer arithmetic mod 12; nothing about intervals needs to be memorized, only counted", "prereqs": ["whole_tone", "minor_third", "major_third", "perfect_fourth", "perfect_fifth", "octave"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (principle node — reducibility check)", "play": "pick any two keys on a keyboard, count the semitones between them, and you have named the interval better than most beginners ever do", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "chord_construction", "label": "chord construction", "kind": "concept", "tier": 3, "defines": "the stacking principle — chords are thirds piled on an anchor; major (4+3), minor (3+4), and one more third makes the seventh (4+3+3); every chord chart symbol is a stacking recipe", "prereqs": ["major_triad", "minor_triad", "dominant_seventh"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (principle node — reducibility check)", "play": "decode the chord symbols of any song on an online chord chart — C, Am, G7 — into their semitone stacks", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "rhythm_grouping", "label": "rhythm grouping", "kind": "concept", "tier": 3, "defines": "the time principle — beats group UP into measures and split DOWN by halving; the entire rhythm notation system is these two moves", "prereqs": ["measure", "eighth_note"], "verifier": "structural", "lab": "graph_lib.verify_character_lego (principle node — reducibility check)", "play": "count \"1-and-2-and-3-and-4-and\" along with any song — you are running both moves at once", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "four_chord_loop", "label": "four chord loop", "kind": "concept", "tier": 4, "defines": "the payoff — I–V–vi–IV, four triads built on scale degrees, looped over four-beat bars, composes THOUSANDS of pop songs (the famous \"four chords\" medley is real); master 4 bricks and 3 principles, and the radio becomes readable — the LEGO way", "prereqs": ["chord_construction", "melody", "rhythm_grouping"], "verifier": "structural", "lab": "graph_lib.reducible — the LEGO claim, machine-checked (everything reduces to 4 bricks)", "play": "look up the \"Axis of Awesome four chords\" medley, then find the I–V–vi–IV loop in two songs you already love", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "play_from_chord_charts", "label": "play from chord charts", "kind": "application", "tier": 0, "defines": "the decoding superpower — every guitar tab and ukulele chord chart on the internet is written in the stacking language this graph teaches", "prereqs": ["four_chord_loop"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "transposition_arithmetic", "label": "transposition arithmetic", "kind": "application", "tier": 0, "defines": "move any song to any key by adding a constant to every note, mod 12 — the first musical skill that is literally arithmetic, no talent required", "prereqs": ["interval_stacking"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "keyboard_as_number_line", "label": "keyboard as number line", "kind": "application", "tier": 0, "defines": "the piano keyboard is the integer line of music — white and black keys are the major scale's whole/half recipe made visible; once seen, it cannot be unseen", "prereqs": ["major_scale"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "equal_temperament_math", "label": "equal temperament math", "kind": "application", "tier": 0, "defines": "why twelve? because 2^(7/12) ≈ 1.4983 ≈ 3/2 — twelve equal steps almost perfectly hit the natural fifth; the piano is a rounding decision, and the error is audible to no one at a party", "prereqs": ["octave"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "drum_machine_grid", "label": "drum machine grid", "kind": "application", "tier": 0, "defines": "every drum machine and DAW grid is grouping × halving rendered as pixels — program one bar and you have used the time radical the way a coder uses a loop", "prereqs": ["rhythm_grouping"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}], "edges": [{"from": "middle_c", "to": "major_scale"}, {"from": "middle_c", "to": "major_triad"}, {"from": "middle_c", "to": "minor_triad"}, {"from": "semitone", "to": "whole_tone"}, {"from": "semitone", "to": "minor_third"}, {"from": "semitone", "to": "major_third"}, {"from": "semitone", "to": "perfect_fourth"}, {"from": "semitone", "to": "perfect_fifth"}, {"from": "semitone", "to": "octave"}, {"from": "semitone", "to": "major_scale"}, {"from": "beat", "to": "measure"}, {"from": "beat", "to": "eighth_note"}, {"from": "halving", "to": "eighth_note"}, {"from": "whole_tone", "to": "major_scale"}, {"from": "whole_tone", "to": "interval_stacking"}, {"from": "minor_third", "to": "major_triad"}, {"from": "minor_third", "to": "minor_triad"}, {"from": "minor_third", "to": "dominant_seventh"}, {"from": "minor_third", "to": "interval_stacking"}, {"from": "major_third", "to": "major_triad"}, {"from": "major_third", "to": "minor_triad"}, {"from": "major_third", "to": "interval_stacking"}, {"from": "perfect_fourth", "to": "interval_stacking"}, {"from": "perfect_fifth", "to": "interval_stacking"}, {"from": "octave", "to": "major_scale"}, {"from": "octave", "to": "interval_stacking"}, {"from": "octave", "to": "equal_temperament_math"}, {"from": "measure", "to": "melody"}, {"from": "measure", "to": "rhythm_grouping"}, {"from": "eighth_note", "to": "rhythm_grouping"}, {"from": "major_scale", "to": "melody"}, {"from": "major_scale", "to": "keyboard_as_number_line"}, {"from": "major_triad", "to": "dominant_seventh"}, {"from": "major_triad", "to": "chord_construction"}, {"from": "minor_triad", "to": "chord_construction"}, {"from": "dominant_seventh", "to": "chord_construction"}, {"from": "melody", "to": "four_chord_loop"}, {"from": "interval_stacking", "to": "transposition_arithmetic"}, {"from": "chord_construction", "to": "four_chord_loop"}, {"from": "rhythm_grouping", "to": "four_chord_loop"}, {"from": "rhythm_grouping", "to": "drum_machine_grid"}, {"from": "four_chord_loop", "to": "play_from_chord_charts"}]};
const DOMAIN_KEY = "music_theory_graph";

// ── index ──────────────────────────────────────────────────────────────────
const nodeIndex = {};
RAW.nodes.forEach(n => nodeIndex[n.id] = n);

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into

  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  document.getElementById('explain-panel').innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  return localStorage.getItem(noteKey(nodeId)) || '';
}

function saveNote(nodeId, text) {
  if (text.trim()) localStorage.setItem(noteKey(nodeId), text);
  else localStorage.removeItem(noteKey(nodeId));
  renderNotesList();
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => ({id: n.id, label: n.label, preview: localStorage.getItem(noteKey(n.id)).slice(0, 60)}));
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}</div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  document.getElementById('notes-textarea').value = '';
  if (currentNodeId) saveNote(currentNodeId, '');
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();
</script>
</body>
