domain: college_physics_2e_ch17
primitives:
  wave:
    defines: A disturbance that propagates through a medium or space, transferring energy without net
      movement of matter.
    tier: 0
  frequency:
    defines: The number of waves that pass a point per unit time, measured in hertz.
    tier: 0
  wavelength:
    defines: The distance between adjacent identical parts of a wave, such as between successive compressions.
    tier: 0
  amplitude:
    defines: The maximum displacement or pressure variation of a wave from its equilibrium value.
    tier: 0
  pressure:
    defines: Force per unit area exerted by a fluid or gas on its surroundings.
    tier: 0
  power:
    defines: The rate at which energy is transferred or converted, measured in watts.
    tier: 0
  density:
    defines: Mass per unit volume of a substance.
    tier: 0
  temperature:
    defines: A measure of the average kinetic energy of particles in a substance.
    tier: 0
  simple_harmonic_motion:
    defines: Periodic oscillatory motion in which the restoring force is proportional to displacement.
    tier: 0
concepts:
  sound:
    defines: A disturbance of matter that is transmitted from its source outward as a longitudinal pressure
      wave.
    composed_of:
    - wave
    - pressure
    - simple_harmonic_motion
    tier: 1
  compression_and_rarefaction:
    defines: Regions of higher and lower pressure that propagate as a longitudinal sound wave through
      a medium.
    composed_of:
    - sound
    tier: 2
  speed_of_sound:
    defines: The speed at which sound waves propagate through a medium, determined by the medium's rigidity
      and density and affected by temperature.
    composed_of:
    - sound
    - density
    - temperature
    tier: 2
  pitch:
    defines: The perception of the frequency of a sound, with higher frequency corresponding to higher
      pitch.
    composed_of:
    - sound
    - frequency
    tier: 2
  sound_intensity:
    defines: The power per unit area carried by a sound wave, related to the square of the pressure amplitude.
    composed_of:
    - sound
    - power
    - amplitude
    tier: 2
  interference:
    defines: The superposition of two or more sound waves resulting in constructive or destructive interference.
    composed_of:
    - sound
    - amplitude
    tier: 2
  hearing:
    defines: The perception of sound, encompassing the audible frequency range of 20 to 20,000 Hz in humans.
    composed_of:
    - sound
    - frequency
    tier: 2
  sound_intensity_level:
    defines: A logarithmic measure of sound intensity relative to the threshold of hearing, expressed
      in decibels.
    composed_of:
    - sound_intensity
    tier: 3
  doppler_effect:
    defines: An alteration in the observed frequency of a sound due to relative motion between the source
      and observer.
    composed_of:
    - frequency
    - speed_of_sound
    tier: 3
  sonic_boom:
    defines: A constructive interference of sound waves created by an object moving faster than the speed
      of sound, forming a shock wave cone.
    composed_of:
    - speed_of_sound
    - interference
    tier: 3
  bow_wake:
    defines: A V-shaped disturbance created when a wave source moves faster than the wave propagation
      speed in a medium.
    composed_of:
    - speed_of_sound
    tier: 3
  standing_wave:
    defines: A wave pattern formed by the superposition of two waves traveling in opposite directions,
      producing fixed nodes and antinodes.
    composed_of:
    - interference
    - wavelength
    tier: 3
  loudness:
    defines: The perception of sound intensity, measured in phons and dependent on both intensity and
      frequency.
    composed_of:
    - sound_intensity
    - hearing
    tier: 3
  infrasound:
    defines: Sound with frequencies below 20 Hz, below the range of human hearing.
    composed_of:
    - hearing
    tier: 3
  ultrasound:
    defines: Sound with frequencies above 20,000 Hz, above the range of human hearing.
    composed_of:
    - hearing
    tier: 3
  acoustic_impedance:
    defines: A property of a medium equal to the product of its density and the speed of sound through
      it, governing how sound transmits across boundaries.
    composed_of:
    - density
    - speed_of_sound
    tier: 3
  node_and_antinode:
    defines: A node is a point of zero displacement in a standing wave; an antinode is a point of maximum
      displacement.
    composed_of:
    - standing_wave
    tier: 4
  fundamental_frequency:
    defines: The lowest resonant frequency of a vibrating system such as an air column or string.
    composed_of:
    - standing_wave
    - frequency
    tier: 4
  phon:
    defines: A unit of loudness perception defined so that at 1000 Hz phons equal decibels, with equal-loudness
      curves relating phons across frequencies.
    composed_of:
    - loudness
    - sound_intensity_level
    tier: 4
  intensity_reflection_coefficient:
    defines: The ratio of reflected wave intensity to incident wave intensity at a boundary, determined
      by the difference in acoustic impedances.
    composed_of:
    - acoustic_impedance
    - sound_intensity
    tier: 4
  overtones_and_harmonics:
    defines: Overtones are resonant frequencies higher than the fundamental; harmonics are the collective
      set of the fundamental and all its overtones.
    composed_of:
    - fundamental_frequency
    tier: 5
  resonance_closed_tube:
    defines: Standing wave resonances in a tube closed at one end, producing only odd harmonics with frequencies
      f_n = nv_w/(4L) for odd n.
    composed_of:
    - overtones_and_harmonics
    - speed_of_sound
    tier: 6
  resonance_open_tube:
    defines: Standing wave resonances in a tube open at both ends, producing all harmonics with frequencies
      f_n = nv_w/(2L).
    composed_of:
    - overtones_and_harmonics
    - speed_of_sound
    tier: 6
  timbre:
    defines: The quality of a sound determined by the number and relative intensities of its constituent
      frequencies, distinguishing instruments playing the same note.
    composed_of:
    - overtones_and_harmonics
    tier: 6
applications:
  noise_cancellation:
    defines: Using destructive interference to reduce sound intensity by generating a wave opposite in
      phase to incoming noise.
    needs:
    - interference
    tier: 3
  musical_instrument_resonance:
    defines: The use of resonant air columns and sounding boxes in instruments to amplify and shape sound
      through standing waves and overtone selection.
    needs:
    - resonance_open_tube
    - resonance_closed_tube
    tier: 7
  ultrasound_therapy:
    defines: Using high-intensity focused ultrasound to shatter gallstones, destroy tissue, or deliver
      deep-heat treatments via cavitation and thermal effects.
    needs:
    - ultrasound
    - sound_intensity
    tier: 4
  doppler_shifted_ultrasound:
    defines: A diagnostic technique using the Doppler shift of reflected ultrasound to detect motion and
      measure velocity, such as blood flow.
    needs:
    - doppler_effect
    - ultrasound
    tier: 4
  ultrasound_medical_imaging:
    defines: Using reflected ultrasound echoes and acoustic impedance differences to produce noninvasive
      images of internal body structures.
    needs:
    - ultrasound
    - intensity_reflection_coefficient
    tier: 5
