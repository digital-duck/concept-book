domain: college_physics_ch1
source:
  title: "College Physics 2e"
  authors: "OpenStax"
  license: "CC BY 4.0"
  url: "https://openstax.org/details/books/college-physics-2e"
  attribution: "Access for free at openstax.org."
  chapter: 1
  chapter_title: "Introduction: The Nature of Science and Physics"
primitives:
  physics:
    defines: The science concerned with describing the interactions of energy, matter, space, and time,
      and the fundamental mechanisms underlying every phenomenon.
    tier: 0
  scientific_method:
    defines: A systematic process of observation, hypothesis formation, experimentation, and analysis
      used to investigate and understand natural phenomena.
    tier: 0
  physical_quantity:
    defines: A characteristic or property of an object that can be measured or calculated from other measurements.
    tier: 0
  units:
    defines: Standardized values used for expressing and comparing measurements of physical quantities.
    tier: 0
concepts:
  model:
    defines: A representation of something that is often too difficult or impossible to display directly,
      justified by experimental proof but only accurate under limited situations.
    composed_of:
    - scientific_method
    tier: 1
  theory:
    defines: A testable explanation for patterns in nature supported by scientific evidence and verified
      multiple times by various groups of researchers.
    composed_of:
    - scientific_method
    tier: 1
  scientific_law:
    defines: A concise description, often expressible as a mathematical equation, of a generalized pattern
      in nature supported by scientific evidence and repeated experiments.
    composed_of:
    - scientific_method
    tier: 1
  classical_physics:
    defines: Physics developed from the Renaissance to the end of the 19th century, valid when matter
      moves below about 1% of the speed of light, objects are larger than microscopic, and gravitational
      fields are weak.
    composed_of:
    - physics
    tier: 1
  modern_physics:
    defines: Physics consisting of relativity and quantum mechanics, dealing with objects moving at high
      speeds, experiencing strong gravitational fields, or smaller than can be seen with a microscope.
    composed_of:
    - physics
    tier: 1
  fundamental_units:
    defines: Units that can only be defined in terms of the procedure used to measure them — length, mass,
      time, and electric current.
    composed_of:
    - units
    - physical_quantity
    tier: 1
  accuracy:
    defines: The degree to which a measured value agrees with the correct value for that measurement.
    composed_of:
    - physical_quantity
    tier: 1
  precision:
    defines: The degree to which repeated measurements agree with each other, reflecting the spread of
      measured values.
    composed_of:
    - physical_quantity
    tier: 1
  uncertainty:
    defines: A quantitative measure of how much measured values deviate from a standard or expected value,
      expressed as a plus-or-minus amount.
    composed_of:
    - physical_quantity
    tier: 1
  conversion_factor:
    defines: A ratio expressing how many of one unit are equal to another unit, used to convert measurements
      between unit systems.
    composed_of:
    - units
    tier: 1
  order_of_magnitude:
    defines: The scale of a value expressed as a power of 10, used as a ballpark estimate for comparing
      the sizes of quantities.
    composed_of:
    - physical_quantity
    tier: 1
  si_units:
    defines: The international system of units (Système International) based on the metric system, using
      the meter, kilogram, second, and ampere as fundamental units.
    composed_of:
    - fundamental_units
    tier: 2
  derived_units:
    defines: Units that can be expressed as algebraic combinations of the fundamental units of length,
      mass, time, and current.
    composed_of:
    - fundamental_units
    tier: 2
  unit_conversion:
    defines: The process of changing a value expressed in one type of unit to another using conversion
      factors that are ratios relating equal quantities in different units.
    composed_of:
    - conversion_factor
    tier: 2
  percent_uncertainty:
    defines: The ratio of the uncertainty of a measurement to the measured value, expressed as a percentage.
    composed_of:
    - uncertainty
    tier: 2
  significant_figures:
    defines: The digits in a measured value that express the precision of the measuring tool, where the
      last digit written is the first digit with some uncertainty.
    composed_of:
    - precision
    - uncertainty
    tier: 2
  metric_prefixes:
    defines: Standard prefixes denoting powers of 10 used in the metric system to express quantities over
      vast ranges without inventing new units.
    composed_of:
    - si_units
    tier: 3
applications:
  approximation:
    defines: An estimated value based on prior experience, reasoning, and known quantities, used to make
      reasonable guesstimates when exact values are unavailable.
    needs:
    - order_of_magnitude
    - significant_figures
    tier: 3
