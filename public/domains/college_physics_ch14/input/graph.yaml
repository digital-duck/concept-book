domain: college_physics_2e_ch14
primitives:
  temperature:
    defines: A measure proportional to the average kinetic energy of atoms and molecules in a substance.
    tier: 0
  internal_energy:
    defines: The total energy contained within a thermal system, proportional to absolute temperature
      and number of molecules.
    tier: 0
  thermal_equilibrium:
    defines: The state reached when two objects in contact arrive at the same temperature and net heat
      transfer ceases.
    tier: 0
  kinetic_energy:
    defines: The energy an object possesses due to its motion.
    tier: 0
  work:
    defines: Energy transferred to or from a system by a force acting through a distance.
    tier: 0
concepts:
  heat:
    defines: The spontaneous transfer of energy due to a temperature difference between two objects.
    composed_of:
    - temperature
    tier: 1
  calorie:
    defines: Units of energy where one calorie is the energy needed to change the temperature of 1 g of
      water by 1 °C, and one kilocalorie equals 1000 calories.
    composed_of:
    - heat
    tier: 2
  specific_heat:
    defines: The amount of heat necessary to change the temperature of 1.00 kg of a substance by 1.00
      °C, a material-dependent property.
    composed_of:
    - heat
    tier: 2
  phase_change:
    defines: A transition of a substance between solid, liquid, and gas phases that absorbs or releases
      energy without changing temperature.
    composed_of:
    - heat
    tier: 2
  conduction:
    defines: Heat transfer through stationary matter by physical contact, driven by molecular collisions
      that transfer kinetic energy from hotter to colder regions.
    composed_of:
    - heat
    - kinetic_energy
    tier: 2
  convection:
    defines: Heat transfer by the macroscopic movement of a fluid, driven by density differences due to
      temperature variations.
    composed_of:
    - heat
    tier: 2
  radiation:
    defines: Heat transfer through the emission or absorption of electromagnetic waves, requiring no medium.
    composed_of:
    - heat
    tier: 2
  mechanical_equivalent_of_heat:
    defines: The equivalence between mechanical work and heat transfer, established as 1 kcal = 4186 J.
    composed_of:
    - work
    - calorie
    tier: 3
  heat_capacity_equation:
    defines: The relationship Q = mcΔT expressing that heat transferred depends on mass, specific heat,
      and temperature change.
    composed_of:
    - specific_heat
    tier: 3
  latent_heat:
    defines: The energy per unit mass absorbed or released during a phase change, hidden because no temperature
      change accompanies it.
    composed_of:
    - phase_change
    tier: 3
  sublimation:
    defines: The direct transition from the solid phase to the vapor phase without passing through the
      liquid phase.
    composed_of:
    - phase_change
    tier: 3
  thermal_conductivity:
    defines: A material property describing how well the material conducts heat, appearing in the rate
      equation Q/t = kA(T₂−T₁)/d.
    composed_of:
    - conduction
    tier: 3
  stefan_boltzmann_law:
    defines: The law stating that the rate of heat transfer by radiation is Q/t = σeAT⁴, proportional
      to the fourth power of absolute temperature.
    composed_of:
    - radiation
    tier: 3
  emissivity:
    defines: A dimensionless measure (0 to 1) of how effectively an object radiates and absorbs electromagnetic
      energy compared to an ideal black body.
    composed_of:
    - radiation
    tier: 3
  latent_heat_of_fusion:
    defines: The energy per unit mass required to change a substance from solid to liquid (or released
      from liquid to solid) at the melting point.
    composed_of:
    - latent_heat
    tier: 4
  latent_heat_of_vaporization:
    defines: The energy per unit mass required to change a substance from liquid to gas (or released from
      gas to liquid) at the boiling point.
    composed_of:
    - latent_heat
    tier: 4
  r_factor:
    defines: The ratio of material thickness to thermal conductivity (d/k), used to rate insulation effectiveness.
    composed_of:
    - thermal_conductivity
    tier: 4
  net_radiative_heat_transfer:
    defines: The net radiation exchange between an object at temperature T₁ and surroundings at temperature
      T₂, given by Q_net/t = σeA(T₂⁴ − T₁⁴).
    composed_of:
    - stefan_boltzmann_law
    - emissivity
    tier: 4
applications:
  wind_chill:
    defines: The enhanced cooling effect of moving air combining convection with conduction to increase
      the rate of heat transfer from a body.
    needs:
    - convection
    - conduction
    tier: 3
  calorimetry:
    defines: The technique of calculating final equilibrium temperatures when two bodies at different
      temperatures exchange heat with no net loss to surroundings.
    needs:
    - thermal_equilibrium
    - heat_capacity_equation
    tier: 4
  greenhouse_effect:
    defines: The warming of Earth's surface caused by atmospheric gases absorbing and re-radiating infrared
      radiation emitted by the Earth.
    needs:
    - radiation
    - emissivity
    tier: 4
  evaporative_cooling:
    defines: The cooling of a surface when liquid evaporates from it, removing latent heat of vaporization
      and lowering temperature.
    needs:
    - latent_heat_of_vaporization
    tier: 5
