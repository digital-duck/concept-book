<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Concept Graph — graph</title>
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f2f5;overflow:hidden;height:100vh}
.app{
  display:grid;
  grid-template-columns:230px 1fr 210px;
  grid-template-rows:60vh 40vh;
  height:100vh;
  gap:0;
}
/* ── Left sidebar: learning path ── */
#path-sidebar{
  grid-column:1;grid-row:1/3;
  background:#f5f6f8;color:#2a2a2a;
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid #dde0e6;
}
#path-header{
  padding:14px 14px 10px;
  border-bottom:1px solid #dde0e6;
  flex-shrink:0;
}
#path-header h1{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:#888;margin-bottom:2px;font-weight:700}
#path-header .domain-name{font-size:11px;color:#555;margin-top:4px}
#path-steps{flex:1;overflow-y:auto;padding:8px 0}
#path-steps .hint{color:#aaa;font-size:12px;text-align:center;padding:24px 12px;line-height:1.5}
.step-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:7px 12px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s;
}
.step-item:hover{background:#ebebf0}
.step-item.active{background:#e8eef8;border-left-color:#4a90d9}
.step-item.target{background:#eaf5ea;border-left-color:#4caf50}
.step-num{min-width:20px;font-size:10px;font-weight:700;color:#bbb;padding-top:2px;flex-shrink:0}
.step-item.target .step-num{color:#4caf50}
.step-label{font-size:12px;font-weight:600;color:#333;line-height:1.4}
.step-def{font-size:10px;color:#888;margin-top:2px;line-height:1.4}
.step-kind{display:inline-block;padding:0 5px;border-radius:8px;font-size:9px;font-weight:700;margin-left:4px}
#path-count{font-size:10px;color:#aaa;margin-top:3px}
/* ── Graph panel ── */
#graph-panel{
  grid-column:2;grid-row:1;
  position:relative;background:#fff;
  border-bottom:2px solid #dde;
}
#graph-container{width:100%;height:100%}
/* ── Explanation panel ── */
#explain-panel{
  grid-column:2;grid-row:2;
  background:#fff;overflow-y:auto;
  padding:16px 20px;
}
#explain-panel .empty{color:#aaa;font-size:13px;padding:20px 0;text-align:center}
#explain-panel .node-title{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
#explain-panel .node-title h2{font-size:16px;color:#1e3a5f}
.badge{
  display:inline-block;padding:2px 8px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.badge.primitive{background:#e8f5e9;color:#2e7d32}
.badge.concept{background:#e3f2fd;color:#1565c0}
.badge.application{background:#fff3e0;color:#ef6c00}
.tier-tag{font-size:11px;color:#999;margin-left:auto}
#explain-panel .defines{
  font-size:14px;color:#333;line-height:1.6;margin-bottom:12px;
  padding:10px 12px;background:#f8f9fb;border-radius:6px;
  border-left:3px solid #90b4e8;
}
#explain-panel .section-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:#999;margin-bottom:6px;
}
#explain-panel .prereq-list{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prereq-chip{
  padding:3px 9px;border-radius:12px;font-size:11px;
  background:#e3f2fd;color:#1565c0;cursor:pointer;
  border:1px solid #90caf9;transition:background .12s;
}
.prereq-chip:hover{background:#bbdefb}
#explain-panel .meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{font-size:12px;color:#555}
.meta-item b{color:#1e3a5f}
#explain-panel .play-hint{
  font-size:12px;color:#5a5a5a;line-height:1.6;
  padding:8px 12px;background:#fffde7;border-radius:6px;
  border-left:3px solid #ffd54f;margin-bottom:8px;
}
/* ── Notes sidebar ── */
#notes-sidebar{
  grid-column:3;grid-row:1/3;
  background:#fafaf8;
  border-left:2px solid #e8e8e0;
  display:flex;flex-direction:column;
  overflow:hidden;
}
#notes-header{
  padding:10px 12px 8px;
  border-bottom:1px solid #e0e0d8;
  flex-shrink:0;
}
#notes-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
#notes-header h2{font-size:12px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;margin:0}
#notes-node-label{font-size:11px;color:#999;margin-top:2px}
.nb-btn{font-size:10px;padding:2px 7px;border-radius:3px;
  border:1px solid #ddd;background:#f0f0ea;cursor:pointer;color:#777;
  font-family:system-ui,sans-serif}
.nb-btn:hover{background:#e0e0d8;color:#444}
#notes-textarea{
  flex:0 0 auto;height:100px;border:none;resize:none;
  padding:12px;font-size:12px;line-height:1.6;
  font-family:inherit;background:#fafaf8;color:#333;
  outline:none;
}
#notes-with-entries{
  border-top:1px solid #e8e8e0;flex:1;min-height:0;overflow-y:auto;
}
.note-entry{
  padding:6px 12px;cursor:pointer;
  border-bottom:1px solid #f0f0e8;
  font-size:11px;
}
.note-entry:hover{background:#f0efe8}
.note-entry .note-node{font-weight:600;color:#555;display:flex;justify-content:space-between;align-items:center}
.note-entry .note-ts{font-weight:400;color:#bbb;font-size:10px}
.note-entry .note-preview{color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* ── kind badge colours in sidebar ── */
.primitive-k{background:#e8f5e9;color:#2e7d32}
.concept-k{background:#e3f2fd;color:#1565c0}
.application-k{background:#fff3e0;color:#ef6c00}
</style>
</head>
<body>
<div class="app">

<!-- LEFT: learning path sidebar -->
<aside id="path-sidebar">
  <div id="path-header">
    <h1>Learning Path</h1>
    <div class="domain-name">graph</div>
    <div id="path-count"></div>
  </div>
  <div id="path-steps">
    <div class="hint">Click any node in the graph<br>to see its learning path</div>
  </div>
</aside>

<!-- CENTRE TOP: concept graph -->
<div id="graph-panel">
  <div id="graph-container"></div>
</div>

<!-- CENTRE BOTTOM: explanation panel -->
<div id="explain-panel">
  <div class="empty">Select a node to see its definition, prerequisites, and learning context.</div>
</div>

<!-- RIGHT: notes sidebar -->
<aside id="notes-sidebar">
  <div id="notes-header">
    <div id="notes-header-top">
      <h2>Notes</h2>
      <div>
        <button class="nb-btn" id="nb-clear-btn" onclick="clearNote()">Clear</button>
        <button class="nb-btn" onclick="exportNotes()">Export</button>
      </div>
    </div>
    <div id="notes-node-label">no node selected</div>
  </div>
  <textarea id="notes-textarea" placeholder="Type notes here&#10;(auto-saved per node)"></textarea>
  <div id="notes-with-entries"></div>
</aside>

</div><!-- .app -->

<script>
const RAW = {"nodes": [{"id": "real_number", "label": "real number", "kind": "primitive", "tier": 0, "defines": "first radical — the continuum; every point on the number line, rational or irrational; the stage on which all of calculus plays out; its completeness (no holes) is what makes limits meaningful", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "function", "label": "function", "kind": "primitive", "tier": 0, "defines": "first radical — a rule assigning exactly one output to each input; the object calculus studies; not the formula but the mapping; sin, exp, polynomials and piecewise definitions are all functions", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "limit", "label": "limit", "kind": "primitive", "tier": 0, "defines": "second radical — what f(x) approaches as x gets arbitrarily close to a (without equalling a); the single operation from which derivative, integral, and series all derive; made precise by the ε-δ definition", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "infinity", "label": "infinity", "kind": "primitive", "tier": 0, "defines": "second radical — the concept of unbounded growth (x→∞) and of arbitrarily small scale (ε→0); not a number but a direction; appears in every limit at the boundary of the finite world and in every infinite sum", "prereqs": [], "verifier": "", "lab": "", "play": "", "color": {"background": "#e8f5e9", "border": "#2e7d32"}, "font": {"size": 13}}, {"id": "continuity", "label": "continuity", "kind": "concept", "tier": 1, "defines": "f is continuous at a when lim_{x→a} f(x) = f(a) — the limit exists, equals the function value, and no jump or hole interrupts the graph; the prerequisite for the Intermediate Value Theorem and for differentiability", "prereqs": ["function", "limit"], "verifier": "sympy", "lab": "sympy (check continuity of abs(x) at 0 by computing left and right limits; confirm they agree)", "play": "test f(x) = sin(x)/x at x=0; the limit is 1 but f(0) is undefined — extend it to make it continuous", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "derivative", "label": "derivative", "kind": "concept", "tier": 2, "defines": "f'(x) = lim_{h→0} [f(x+h) − f(x)] / h — the instantaneous rate of change; the slope of the tangent line; the key that unlocks velocity from position and marginal cost from total cost", "prereqs": ["function", "limit"], "verifier": "sympy", "lab": "sympy (compute derivative of x**n from the limit definition; verify result is n*x**(n-1))", "play": "differentiate f(x) = x² from the definition; expand (x+h)²-x², divide by h, then take h→0 and watch 2x appear", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "riemann_sum", "label": "riemann sum", "kind": "concept", "tier": 2, "defines": "partition [a,b] into n subintervals and sum f(xᵢ*)·Δx — an approximation of the area under f; as n→∞ and Δx→0, the sum converges to the exact area; the constructive definition of the integral", "prereqs": ["function", "real_number", "infinity"], "verifier": "python", "lab": "python (compute left, right, and midpoint Riemann sums for f=x**2 on [0,1]; verify convergence to 1/3 as n grows)", "play": "approximate ∫₀¹ x² dx with n=4 midpoint rectangles; compute each term f(0.125)·0.25+… and compare to the exact 1/3", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "differentiation_rules", "label": "differentiation rules", "kind": "concept", "tier": 3, "defines": "the power rule (d/dx xⁿ = nxⁿ⁻¹), product rule (fg)' = f'g+fg', chain rule (f∘g)' = f'(g)·g' — systematic machinery so you never need the limit definition again; every derivative in physics, ML, and economics is one of these rules applied", "prereqs": ["derivative"], "verifier": "sympy", "lab": "sympy (differentiate x**3 * sin(x) with product rule; verify against sympy.diff)", "play": "differentiate sin(x²) using the chain rule; outer = sin, inner = x²; result is cos(x²)·2x — confirm with sympy", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "antiderivative", "label": "antiderivative", "kind": "concept", "tier": 3, "defines": "F is an antiderivative of f when F'(x) = f(x); undoing the derivative; not unique — any two antiderivatives differ by a constant C; also called the indefinite integral ∫ f(x) dx = F(x) + C", "prereqs": ["derivative"], "verifier": "sympy", "lab": "sympy (integrate x**n and verify derivative of result equals x**n)", "play": "find the antiderivative of 3x²; guess F(x) = x³; check F'(x) = 3x²; add +C to cover all solutions", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "definite_integral", "label": "definite integral", "kind": "concept", "tier": 3, "defines": "∫_a^b f(x) dx — the limit of Riemann sums as the partition refines; the signed area between the curve and the x-axis; positive where f>0, negative where f<0; the accumulation of f over [a,b]", "prereqs": ["riemann_sum", "limit"], "verifier": "sympy", "lab": "sympy (compute ∫₀^π sin(x) dx exactly; verify the result is 2)", "play": "evaluate ∫₀¹ x dx as the area of a right triangle with base 1 and height 1; confirm geometrically that the answer is 1/2", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "fundamental_theorem", "label": "fundamental theorem", "kind": "concept", "tier": 4, "defines": "∫_a^b f(x) dx = F(b) − F(a) where F'=f — the single equation that unifies differentiation and integration; Part 1: d/dx ∫_a^x f = f(x); Part 2: definite integrals compute via antiderivatives; calculus becomes computable", "prereqs": ["definite_integral", "antiderivative"], "verifier": "sympy", "lab": "sympy (verify ∫₀^x sin(t) dt differentiated returns sin(x); compute ∫₀^π cos(x) dx = sin(π)-sin(0))", "play": "compute ∫₁^e (1/x) dx using F(x)=ln(x); F(e)-F(1) = 1-0 = 1; confirm with sympy", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "optimization", "label": "optimization", "kind": "concept", "tier": 4, "defines": "a local maximum or minimum of f occurs where f'(x)=0 (critical point) or f' is undefined; the second derivative test distinguishes them; on a closed interval the extreme value theorem guarantees a global max and min exist", "prereqs": ["derivative", "continuity"], "verifier": "sympy", "lab": "sympy (find and classify critical points of f=x**3 - 3*x; verify local max at x=-1, local min at x=1)", "play": "minimize f(x) = x² - 4x + 5; set f'=2x-4=0; solve x=2; confirm it is a minimum by checking f''(2)=2>0", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "series", "label": "series", "kind": "concept", "tier": 3, "defines": "an infinite sum Σ aₙ = a₁ + a₂ + a₃ + … — not the act of adding infinitely many times, but the limit of partial sums S_N = Σ_{n=1}^N aₙ; the geometric series Σ rⁿ = 1/(1-r) for |r|<1 is the prototype", "prereqs": ["real_number", "infinity"], "verifier": "python", "lab": "python (compute partial sums of geometric series with r=0.5; verify convergence to 2; measure error vs N)", "play": "sum 1 + 1/2 + 1/4 + 1/8 + … by computing S₁, S₂, S₃, S₄; watch the partial sums approach 2", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "convergence", "label": "convergence", "kind": "concept", "tier": 4, "defines": "a series converges if its partial sums approach a finite limit; diverges otherwise; the ratio test (lim|aₙ₊₁/aₙ| < 1 implies convergence) and comparison test are the main tools; the harmonic series Σ 1/n diverges despite aₙ→0", "prereqs": ["series", "limit"], "verifier": "python", "lab": "python (apply ratio test to Σ xⁿ/n!; verify radius of convergence is ∞; compare partial sums to exp(x))", "play": "show Σ 1/n diverges by grouping 1 + 1/2 + (1/3+1/4) + (1/5…1/8) + …; each group exceeds 1/2", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "taylor_series", "label": "taylor series", "kind": "concept", "tier": 5, "defines": "f(x) = Σ f⁽ⁿ⁾(a)/n! · (x-a)ⁿ — every infinitely differentiable function is locally a polynomial; e^x = 1+x+x²/2!+…, sin x = x-x³/3!+…; the key link between algebra and analysis; used in every numerical computation", "prereqs": ["convergence", "derivative"], "verifier": "sympy", "lab": "sympy (compute Taylor series of sin(x) to order 7 around 0; verify coefficients match (-1)^n/(2n+1)!)", "play": "approximate sin(0.1) using the first two nonzero terms 0.1 - 0.001/6; compare to the true value 0.09983…; error is ~10⁻⁷", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "partial_derivative", "label": "partial derivative", "kind": "concept", "tier": 4, "defines": "∂f/∂x — differentiate f(x,y,…) with respect to x while holding all other variables fixed; the rate of change in one direction through the landscape of f; the first step from single-variable to multivariable calculus", "prereqs": ["derivative", "function"], "verifier": "sympy", "lab": "sympy (compute ∂/∂x and ∂/∂y of f=x**2 + x*y + y**3; verify mixed partials are equal)", "play": "for f(x,y)=x²y, compute ∂f/∂x = 2xy and ∂f/∂y = x²; check that differentiating either result in the mixed order gives the same answer 2x", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "gradient", "label": "gradient", "kind": "concept", "tier": 5, "defines": "∇f = (∂f/∂x, ∂f/∂y, …) — the vector of all partial derivatives; points in the direction of steepest ascent; its magnitude is the slope in that direction; moving opposite to ∇f descends fastest — the geometry behind gradient descent", "prereqs": ["partial_derivative"], "verifier": "sympy", "lab": "sympy (compute gradient of f=x**2+y**2; verify it equals (2x, 2y) and points radially outward)", "play": "at the point (1,2) on f(x,y)=x²+y², compute ∇f=(2,4); confirm this direction is steeper than (1,0) by comparing directional derivatives", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "differential_equation", "label": "differential equation", "kind": "concept", "tier": 5, "defines": "an equation relating f and its derivatives — y' = ky has solution y = Ce^(kt); every law of physics (Newton's F=ma, Maxwell's equations, Schrödinger's equation) is a differential equation; the language in which nature writes its rules", "prereqs": ["derivative", "function"], "verifier": "sympy", "lab": "sympy (solve y' = -y symbolically; verify solution is C*exp(-x); check initial condition y(0)=1 gives C=1)", "play": "verify that y = e^(-t) satisfies y' = -y by differentiating and substituting; the equation eats its own solution", "color": {"background": "#e3f2fd", "border": "#1565c0"}, "font": {"size": 13}}, {"id": "physics_kinematics", "label": "physics kinematics", "kind": "application", "tier": 0, "defines": "position x(t), velocity v=x'(t), acceleration a=x''(t) — calculus is the native language of motion; ∫v dt recovers displacement; every equation in mechanics_graph is a differential equation in disguise", "prereqs": ["derivative", "definite_integral", "differential_equation"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "gradient_descent", "label": "gradient descent", "kind": "application", "tier": 0, "defines": "update parameters θ ← θ − α∇L iteratively to minimize loss L; the algorithm that trains every neural network; convergence guaranteed near convex minima; the gradient does the geometry, the learning rate sets the step", "prereqs": ["gradient", "optimization"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "fourier_analysis", "label": "fourier analysis", "kind": "application", "tier": 0, "defines": "any periodic function decomposes as Σ aₙ cos(nωt) + bₙ sin(nωt) where coefficients are definite integrals; the FFT algorithm executes this in O(n log n); every audio codec, image compressor, and PDE solver uses it", "prereqs": ["definite_integral", "series", "convergence"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "continuous_probability", "label": "continuous probability", "kind": "application", "tier": 0, "defines": "a probability density f satisfies ∫_{-∞}^∞ f(x)dx = 1 and P(a≤X≤b) = ∫_a^b f(x)dx; the normal, exponential, and beta distributions are all integrals; calculus is what makes continuous probability precise", "prereqs": ["definite_integral", "convergence"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}, {"id": "population_dynamics", "label": "population dynamics", "kind": "application", "tier": 0, "defines": "logistic growth dP/dt = rP(1−P/K) models population with a carrying capacity K; the SIR epidemic model is three coupled differential equations; equilibrium and stability are optimization questions in disguise", "prereqs": ["differential_equation", "optimization"], "verifier": "", "lab": "", "play": "", "color": {"background": "#fff3e0", "border": "#ef6c00"}, "font": {"size": 13}}], "edges": [{"from": "real_number", "to": "riemann_sum"}, {"from": "real_number", "to": "series"}, {"from": "function", "to": "continuity"}, {"from": "function", "to": "derivative"}, {"from": "function", "to": "riemann_sum"}, {"from": "function", "to": "partial_derivative"}, {"from": "function", "to": "differential_equation"}, {"from": "limit", "to": "continuity"}, {"from": "limit", "to": "derivative"}, {"from": "limit", "to": "definite_integral"}, {"from": "limit", "to": "convergence"}, {"from": "infinity", "to": "riemann_sum"}, {"from": "infinity", "to": "series"}, {"from": "continuity", "to": "optimization"}, {"from": "derivative", "to": "differentiation_rules"}, {"from": "derivative", "to": "antiderivative"}, {"from": "derivative", "to": "optimization"}, {"from": "derivative", "to": "taylor_series"}, {"from": "derivative", "to": "partial_derivative"}, {"from": "derivative", "to": "differential_equation"}, {"from": "derivative", "to": "physics_kinematics"}, {"from": "riemann_sum", "to": "definite_integral"}, {"from": "antiderivative", "to": "fundamental_theorem"}, {"from": "definite_integral", "to": "fundamental_theorem"}, {"from": "definite_integral", "to": "physics_kinematics"}, {"from": "definite_integral", "to": "fourier_analysis"}, {"from": "definite_integral", "to": "continuous_probability"}, {"from": "optimization", "to": "gradient_descent"}, {"from": "optimization", "to": "population_dynamics"}, {"from": "series", "to": "convergence"}, {"from": "series", "to": "fourier_analysis"}, {"from": "convergence", "to": "taylor_series"}, {"from": "convergence", "to": "fourier_analysis"}, {"from": "convergence", "to": "continuous_probability"}, {"from": "partial_derivative", "to": "gradient"}, {"from": "gradient", "to": "gradient_descent"}, {"from": "differential_equation", "to": "physics_kinematics"}, {"from": "differential_equation", "to": "population_dynamics"}]};
const DOMAIN_KEY = "graph";

// ── index ──────────────────────────────────────────────────────────────────
const nodeIndex = {};
RAW.nodes.forEach(n => nodeIndex[n.id] = n);

const prereqOf  = {};  // id → ids that are direct prerequisites OF id
const dependsOn = {};  // id → ids that id feeds into
RAW.nodes.forEach(n => { prereqOf[n.id] = []; dependsOn[n.id] = []; });
RAW.edges.forEach(e => {
  prereqOf[e.to].push(e.from);
  dependsOn[e.from].push(e.to);
});

// ── BFS longest-path levels (fixes application nodes at wrong tier) ─────────
const bfsLevels = (() => {
  const levels = {};
  const successors = {};
  RAW.nodes.forEach(n => { levels[n.id] = -1; successors[n.id] = []; });
  RAW.edges.forEach(e => successors[e.from].push(e.to));
  const sources = RAW.nodes.filter(n => !RAW.edges.some(e => e.to === n.id));
  const queue = sources.map(n => n.id);
  queue.forEach(n => levels[n] = 0);
  let i = 0;
  while (i < queue.length) {
    const cur = queue[i++];
    for (const succ of successors[cur]) {
      const nl = levels[cur] + 1;
      if (levels[succ] < nl) { levels[succ] = nl; queue.push(succ); }
    }
  }
  return levels;
})();

// ── graph algorithms ────────────────────────────────────────────────────────
function getAncestors(targetId) {
  const visited = new Set();
  const queue = [targetId];
  while (queue.length) {
    const cur = queue.shift();
    for (const p of prereqOf[cur])
      if (!visited.has(p)) { visited.add(p); queue.push(p); }
  }
  return visited;
}

function topoSort(nodeSet) {
  const inDeg = {};
  nodeSet.forEach(n => inDeg[n] = 0);
  nodeSet.forEach(n => { for (const p of prereqOf[n]) if (nodeSet.has(p)) inDeg[n]++; });
  const reach = {};
  nodeSet.forEach(n => {
    let r = 0;
    nodeSet.forEach(m => { if (m !== n && getAncestors(m).has(n)) r++; });
    reach[n] = r;
  });
  const heap = [];
  nodeSet.forEach(n => { if (inDeg[n] === 0) heap.push(n); });
  heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
  const result = [];
  while (heap.length) {
    const node = heap.shift();
    result.push(node);
    for (const succ of dependsOn[node]) {
      if (!nodeSet.has(succ)) continue;
      if (--inDeg[succ] === 0) {
        heap.push(succ);
        heap.sort((a, b) => (reach[b] - reach[a]) || a.localeCompare(b));
      }
    }
  }
  return result;
}

// ── vis.js network ──────────────────────────────────────────────────────────
const container = document.getElementById('graph-container');
const visNodes = new vis.DataSet(RAW.nodes.map(n => ({
  id: n.id,
  label: n.label.replace(/ /g, '\n'),
  level: bfsLevels[n.id] !== undefined ? bfsLevels[n.id] : n.tier,
  color: n.color,
  font: n.font,
  title: `<b>${n.label}</b> [${n.kind}]<br>${n.defines || ''}`,
  shape: n.kind === 'concept' ? 'ellipse' : 'box',
})));
const visEdges = new vis.DataSet(RAW.edges.map((e, i) => ({
  id: i, from: e.from, to: e.to,
  arrows: 'to', color: {color: '#c8ccd4'}, width: 1,
})));
const network = new vis.Network(container, {nodes: visNodes, edges: visEdges}, {
  layout: { hierarchical: {
    enabled: true, direction: 'UD',
    sortMethod: 'directed', levelSeparation: 85, nodeSpacing: 130,
  } },
  physics: { enabled: false },
  interaction: { hover: true, tooltipDelay: 150 },
  edges: { smooth: { type: 'cubicBezier', forceDirection: 'vertical' } },
});

// Compact layout: group by tier, sort alphabetically, left-align all nodes.
network.once('afterDrawing', function() {
  const pos = network.getPositions();
  const spacing = 140;

  // Group nodes by their BFS tier
  const byTier = {};
  RAW.nodes.forEach(n => {
    const tier = bfsLevels[n.id] ?? n.tier ?? 0;
    if (!byTier[tier]) byTier[tier] = [];
    byTier[tier].push(n.id);
  });

  // Sort each tier alphabetically, assign X starting from 0
  const tiers = Object.keys(byTier).map(Number).sort((a, b) => a - b);
  const tierSep = 85;
  tiers.forEach((tier, ti) => {
    const ids = byTier[tier].sort();
    const y = ti * tierSep;
    ids.forEach((id, i) => {
      network.moveNode(id, i * spacing, y);
    });
  });

  network.fit({ animation: false });
});

const C_PATH   = {background: '#fff9c4', border: '#f9a825'};
const C_TARGET = {background: '#ffe082', border: '#e65100'};

function resetColors() {
  visNodes.update(RAW.nodes.map(n => ({id: n.id, color: n.color})));
  visEdges.update(RAW.edges.map((e, i) => ({id: i, color: {color: '#c8ccd4'}, width: 1})));
}

// ── explanation panel ───────────────────────────────────────────────────────
function renderExplanation(node) {
  const kclass = node.kind;
  const prereqChips = (node.prereqs || []).map(p =>
    `<span class="prereq-chip" onclick="selectNode('${p}')">${p.replace(/_/g,' ')}</span>`
  ).join('');
  const metaItems = [
    node.verifier ? `<span class="meta-item"><b>Verifier:</b> ${node.verifier}</span>` : '',
    node.lab      ? `<span class="meta-item"><b>Lab:</b> ${node.lab}</span>` : '',
  ].filter(Boolean).join('');
  const playHtml = node.play
    ? `<div class="section-label">Try it</div><div class="play-hint">${node.play}</div>`
    : '';

  document.getElementById('explain-panel').innerHTML = `
    <div class="node-title">
      <h2>${node.label}</h2>
      <span class="badge ${kclass}">${kclass}</span>
      <span class="tier-tag">BFS level ${bfsLevels[node.id] ?? node.tier}</span>
    </div>
    ${node.defines ? `<div class="defines">${node.defines}</div>` : ''}
    ${prereqChips ? `<div class="section-label">Prerequisites</div><div class="prereq-list">${prereqChips}</div>` : ''}
    ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
    ${playHtml}
  `;
}

// ── learning path sidebar ───────────────────────────────────────────────────
function renderPathSidebar(orderedPath, targetId) {
  const stepsEl = document.getElementById('path-steps');
  const countEl = document.getElementById('path-count');
  countEl.textContent = orderedPath.length
    ? `${orderedPath.length} step${orderedPath.length !== 1 ? 's' : ''} to learn first`
    : 'Root concept — no prerequisites';

  const target = nodeIndex[targetId];
  const kc = k => `${k.charAt(0).toUpperCase() + k.slice(1)}`;

  stepsEl.innerHTML = orderedPath.map((n, i) => {
    const nd = nodeIndex[n];
    return `<div class="step-item" onclick="selectNode('${n}')">
      <span class="step-num">${i + 1}.</span>
      <div>
        <div class="step-label">${nd.label}
          <span class="step-kind ${nd.kind}-k">${nd.kind}</span>
        </div>
        ${nd.defines ? `<div class="step-def">${nd.defines}</div>` : ''}
      </div>
    </div>`;
  }).join('') + `<div class="step-item target">
    <span class="step-num">▶</span>
    <div>
      <div class="step-label">${target.label}
        <span class="step-kind ${target.kind}-k">${target.kind}</span>
      </div>
      ${target.defines ? `<div class="step-def">${target.defines}</div>` : ''}
    </div>
  </div>`;
}

// ── notes (localStorage) ────────────────────────────────────────────────────
let currentNodeId = null;

function noteKey(nodeId) { return `concept_notes_${DOMAIN_KEY}_${nodeId}`; }

function loadNote(nodeId) {
  const parsed = _parseNote(localStorage.getItem(noteKey(nodeId)));
  return parsed ? parsed.text : '';
}

function saveNote(nodeId, text) {
  if (text.trim()) {
    const data = JSON.stringify({ text, ts: new Date().toISOString() });
    localStorage.setItem(noteKey(nodeId), data);
  } else {
    localStorage.removeItem(noteKey(nodeId));
  }
  renderNotesList();
}

function _parseNote(raw) {
  if (!raw) return null;
  try { const d = JSON.parse(raw); return { text: d.text || '', ts: d.ts || '' }; }
  catch (_) { return { text: raw, ts: '' }; }
}

function _fmtTs(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const yy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${yy}-${mm}-${dd} ${hh}:${mi}`;
}

function renderNotesList() {
  const container = document.getElementById('notes-with-entries');
  const entries = RAW.nodes
    .filter(n => localStorage.getItem(noteKey(n.id)))
    .map(n => {
      const parsed = _parseNote(localStorage.getItem(noteKey(n.id)));
      return {id: n.id, label: n.label, preview: (parsed?.text || '').slice(0, 60), ts: parsed?.ts || ''};
    });
  if (!entries.length) { container.innerHTML = ''; return; }
  container.innerHTML = entries.map(e =>
    `<div class="note-entry" onclick="selectNode('${e.id}')">
      <div class="note-node">${e.label}<span class="note-ts">${_fmtTs(e.ts)}</span></div>
      <div class="note-preview">${e.preview}</div>
    </div>`
  ).join('');
}

function switchNotes(nodeId) {
  if (currentNodeId !== null) {
    saveNote(currentNodeId, document.getElementById('notes-textarea').value);
  }
  currentNodeId = nodeId;
  document.getElementById('notes-textarea').value = loadNote(nodeId);
  document.getElementById('notes-node-label').textContent =
    nodeIndex[nodeId]?.label || nodeId;
}

function clearNote() {
  if (!currentNodeId) return;
  document.getElementById('notes-textarea').value = '';
  saveNote(currentNodeId, '');
  const btn = document.getElementById('nb-clear-btn');
  if (btn) { btn.textContent = 'Cleared!'; setTimeout(() => { btn.textContent = 'Clear'; }, 1000); }
}

function exportNotes() {
  const notes = {};
  RAW.nodes.forEach(n => {
    const v = localStorage.getItem(noteKey(n.id));
    if (v) notes[n.id] = v;
  });
  const blob = new Blob([JSON.stringify(notes, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${DOMAIN_KEY}_notes.json`;
  a.click();
}

document.getElementById('notes-textarea').addEventListener('input', () => {
  if (currentNodeId) saveNote(currentNodeId, document.getElementById('notes-textarea').value);
});

// ── unified node select ─────────────────────────────────────────────────────
function selectNode(nodeId) {
  if (!nodeIndex[nodeId]) return;
  network.selectNodes([nodeId]);
  handleSelect(nodeId);
}

function handleSelect(targetId) {
  const node = nodeIndex[targetId];

  renderExplanation(node);
  switchNotes(targetId);

  const ancestors = getAncestors(targetId);
  const pathSet = new Set([...ancestors]);
  const orderedPath = topoSort(pathSet);

  renderPathSidebar(orderedPath, targetId);

  resetColors();
  visNodes.update(orderedPath.map(n => ({id: n, color: C_PATH})));
  visNodes.update([{id: targetId, color: C_TARGET}]);
  visEdges.update(RAW.edges.map((e, i) => {
    const inPath = pathSet.has(e.from) && (pathSet.has(e.to) || e.to === targetId);
    return {id: i, color: {color: inPath ? '#f9a825' : '#c8ccd4'}, width: inPath ? 2 : 1};
  }));
}

network.on('click', params => {
  if (params.nodes.length) handleSelect(params.nodes[0]);
});

// initialise notes list on load
renderNotesList();

// When viewed directly (not in an iframe), inject a back link next to the
// "Learning Path" heading so it doesn't look like a title-bar element.
if (window.parent === window) {
  var h1 = document.querySelector('#path-header h1');
  if (h1) {
    var backLink = document.createElement('a');
    backLink.href = '../../';
    backLink.textContent = '← App';
    backLink.style.cssText = [
      'font-size:10px','color:#2563eb','font-family:system-ui,sans-serif',
      'text-decoration:none','font-weight:400','letter-spacing:normal',
      'text-transform:none','white-space:nowrap','flex-shrink:0'
    ].join(';');
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:baseline;gap:8px;';
    h1.parentNode.insertBefore(row, h1);
    row.appendChild(h1);
    row.appendChild(backLink);
  }
}
</script>
