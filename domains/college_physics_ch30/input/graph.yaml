domain: college_physics_2e_ch30
primitives:
  atom:
    defines: The basic unit of elements, consisting of a central positively charged nucleus surrounded
      by negatively charged electrons.
    tier: 0
  electric_charge:
    defines: A fundamental property of matter that causes it to experience electromagnetic forces.
    tier: 0
  coulomb_force:
    defines: The electrostatic force between charged particles, proportional to the product of charges
      and inversely proportional to the square of the distance.
    tier: 0
  photon:
    defines: A quantum of electromagnetic radiation with energy directly proportional to its frequency.
    tier: 0
  de_broglie_wavelength:
    defines: The wavelength associated with a moving particle, given by Planck's constant divided by its
      momentum.
    tier: 0
  planck_constant:
    defines: The fundamental constant h that relates photon energy to frequency and sets the scale of
      quantum effects.
    tier: 0
  electromagnetic_radiation:
    defines: Energy propagated as oscillating electric and magnetic fields, including visible light, UV,
      IR, and x rays.
    tier: 0
  classical_angular_momentum:
    defines: The rotational analog of linear momentum for a body in orbit, equal to mvr.
    tier: 0
concepts:
  electron:
    defines: A negatively charged subatomic particle with mass 9.11e-31 kg.
    composed_of:
    - atom
    - electric_charge
    tier: 1
  atomic_nucleus:
    defines: The very small, dense, positively charged core of an atom containing nearly all of its mass.
    composed_of:
    - atom
    - electric_charge
    tier: 1
  atomic_spectra:
    defines: The discrete set of wavelengths of electromagnetic radiation emitted or absorbed by atoms.
    composed_of:
    - atom
    - electromagnetic_radiation
    tier: 1
  charge_to_mass_ratio:
    defines: The ratio e/m measured by Thomson using crossed electric and magnetic fields to deflect cathode
      rays.
    composed_of:
    - electron
    tier: 2
  electron_charge:
    defines: The fundamental unit of electric charge, 1.60e-19 C, with all charges found to be integer
      multiples of this value.
    composed_of:
    - electron
    tier: 2
  planetary_model:
    defines: Rutherford's model in which electrons orbit a small massive nucleus, analogous to planets
      orbiting the sun.
    composed_of:
    - electron
    - atomic_nucleus
    - coulomb_force
    tier: 2
  rydberg_formula:
    defines: Empirical equation predicting hydrogen spectrum wavelengths as 1/lambda = R(1/n_f^2 - 1/n_i^2).
    composed_of:
    - atomic_spectra
    tier: 2
  bremsstrahlung:
    defines: A continuous spectrum of x rays produced by the deceleration of electrons striking a material.
    composed_of:
    - electron
    - photon
    tier: 2
  atomic_excitation:
    defines: The process by which an atom absorbs energy to promote electrons to higher energy states.
    composed_of:
    - atomic_spectra
    - photon
    tier: 2
  bohr_model:
    defines: Semiclassical model with quantized circular orbits and angular momentum L = n*hbar, predicting
      the hydrogen spectrum.
    composed_of:
    - planetary_model
    - classical_angular_momentum
    - planck_constant
    - atomic_spectra
    tier: 3
  atomic_de_excitation:
    defines: The process by which an excited atom transitions to a lower energy state by emitting a photon.
    composed_of:
    - atomic_excitation
    tier: 3
  orbital_magnetic_field:
    defines: The magnetic field generated by the current loop of an electron's orbital motion.
    composed_of:
    - planetary_model
    tier: 3
  quantized_orbits:
    defines: Allowed electron orbits with discrete energy values, with transitions involving photon emission
      or absorption of energy hf.
    composed_of:
    - bohr_model
    tier: 4
  bohr_radius:
    defines: The radius of the lowest electron orbit in hydrogen, a_B = 0.529e-10 m, with allowed radii
      scaling as n^2/Z.
    composed_of:
    - bohr_model
    tier: 4
  hydrogen_like_atom:
    defines: Any atom with Z protons and a single electron, with energies shifted by Z^2 relative to hydrogen.
    composed_of:
    - bohr_model
    tier: 4
  principal_quantum_number:
    defines: The quantum number n = 1, 2, 3, ... labeling basic energy states and determining energy and
      average distance from nucleus.
    composed_of:
    - bohr_model
    tier: 4
  fluorescence:
    defines: De-excitation by emitting multiple lower-energy photons through intermediate steps after
      high-energy photon absorption.
    composed_of:
    - atomic_de_excitation
    tier: 4
  metastable_state:
    defines: An excited energy level with long lifetime because quantum numbers inhibit rapid de-excitation.
    composed_of:
    - atomic_de_excitation
    tier: 4
  stimulated_emission:
    defines: Photon emission triggered by an incoming photon of the same energy, producing an identical
      second photon.
    composed_of:
    - atomic_de_excitation
    tier: 4
  orbital_energies:
    defines: Quantized energies E_n = -Z^2 E_0/n^2, where E_0 = 13.6 eV is the hydrogen ground-state energy.
    composed_of:
    - hydrogen_like_atom
    - quantized_orbits
    tier: 5
  energy_level_diagram:
    defines: A vertical plot of allowed quantized energy states, with ground state at bottom and excited
      states above.
    composed_of:
    - quantized_orbits
    tier: 5
  angular_momentum_quantum_number:
    defines: Quantum number l determining orbital angular momentum magnitude L = sqrt(l(l+1))*hbar, with
      l = 0 to n-1.
    composed_of:
    - principal_quantum_number
    tier: 5
  space_quantization:
    defines: Quantization of the direction of orbital angular momentum to discrete angles relative to
      an external axis.
    composed_of:
    - quantized_orbits
    tier: 5
  wave_nature_quantization:
    defines: Quantization arising because only orbits fitting an integer number of de Broglie wavelengths
      allow constructive interference.
    composed_of:
    - de_broglie_wavelength
    - quantized_orbits
    tier: 5
  phosphorescence:
    defines: Slow light emission from de-excitation of a metastable state, long after initial excitation.
    composed_of:
    - metastable_state
    tier: 5
  population_inversion:
    defines: Condition where most atoms occupy a metastable excited state rather than the ground state,
      required for laser operation.
    composed_of:
    - metastable_state
    - stimulated_emission
    tier: 5
  laser:
    defines: Device producing coherent single-wavelength radiation through light amplification by stimulated
      emission, requiring population inversion.
    composed_of:
    - population_inversion
    tier: 6
  characteristic_x_rays:
    defines: Discrete-energy x rays emitted when inner-shell vacancies are filled, with energies scaling
      as Z^2.
    composed_of:
    - orbital_energies
    - atomic_de_excitation
    tier: 6
  magnetic_quantum_number:
    defines: Quantum number m_l specifying the z-component of orbital angular momentum L_z = m_l*hbar,
      from -l to +l.
    composed_of:
    - angular_momentum_quantum_number
    - space_quantization
    tier: 6
  intrinsic_spin:
    defines: Internal angular momentum of an electron, quantized with s = 1/2 and spin-up or spin-down
      direction.
    composed_of:
    - space_quantization
    tier: 6
  probability_cloud:
    defines: Quantum mechanical description of electron position as a probability distribution rather
      than a definite orbit.
    composed_of:
    - wave_nature_quantization
    tier: 6
  zeeman_effect:
    defines: Splitting of spectral lines in an external magnetic field due to interaction with quantized
      orbital magnetic moment.
    composed_of:
    - orbital_magnetic_field
    - space_quantization
    tier: 6
  spin_quantum_number:
    defines: Quantum numbers s = 1/2 and m_s = +/-1/2 specifying magnitude and z-component of intrinsic
      spin.
    composed_of:
    - intrinsic_spin
    tier: 7
  fine_structure:
    defines: Splitting of spectral lines into doublets from interaction between spin and orbital magnetic
      fields.
    composed_of:
    - intrinsic_spin
    - orbital_magnetic_field
    tier: 7
  pauli_exclusion_principle:
    defines: No two electrons in an atom can share the same set of quantum numbers (n, l, m_l, m_s).
    composed_of:
    - magnetic_quantum_number
    - spin_quantum_number
    tier: 8
  electron_shells:
    defines: Groupings by n (shells) and l (subshells), with max occupancies 2(2l+1) per subshell and
      2n^2 per shell.
    composed_of:
    - pauli_exclusion_principle
    tier: 9
  electron_configuration:
    defines: Arrangement of electrons in shells and subshells (e.g. 1s^2 2s^2 2p^6), determining chemical
      properties.
    composed_of:
    - electron_shells
    tier: 10
applications:
  x_ray_diffraction:
    defines: X-ray scattering from crystal lattices to determine atomic arrangements and molecular structures.
    needs:
    - electromagnetic_radiation
    - atom
    tier: 1
  millikan_oil_drop_experiment:
    defines: Measurement of electron charge by balancing gravitational and electric forces on charged
      oil drops.
    needs:
    - electron_charge
    tier: 3
  ct_scanner:
    defines: Computed tomography using x rays through body slices from many angles to produce cross-sectional
      images.
    needs:
    - bremsstrahlung
    tier: 3
  holography:
    defines: Recording and reconstructing three-dimensional images using laser light interference patterns.
    needs:
    - laser
    tier: 7
  periodic_table:
    defines: Organization of elements by atomic number into groups with similar chemical properties, explained
      by sequential shell filling.
    needs:
    - electron_configuration
    tier: 11
